name = "fitness-platform"
main = "src/worker.js"
compatibility_date = "2025-01-15"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "fitness-platform"
database_id = "6769529b-ebf8-4014-9614-20f4d978f53c"
migrations_dir = "migrations"

[vars]
APP_NAME = "Fitness Platform"
GEMINI_MODEL = "gemini-2.5-flash"
# GEMINI_API_KEY — set this as a Secret in the Cloudflare dashboard (never put real keys here)
COOKIE_SECURE = "true"
APP_URL = "https://your-cloudflare-domain.workers.dev"
EMAIL_FROM = "GymLog Coaching <onboarding@gymlog.app>"
GEMINI_TIMEOUT_MS = "30000"
# Nutrition search: get a free key at https://fdc.nal.usda.gov/api-guide.html
# If unset, falls back to Open Food Facts (no key required)
USDA_API_KEY = "ythQnzQCC5gU9YeU9BbOCFqvnfqkHoyfa2M9Kt2b"
