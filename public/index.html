<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6bff8f">
  <title>GymLog · Fitness Platform</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        credentials: "include",
        ...options
      });
      const text = await res.text();
      let json = {};
      try { json = text ? JSON.parse(text) : {}; } catch {}
      if (!res.ok) throw new Error(json.error || "Request failed. Check your internet connection.");
      return json;
    }

    // --- Helper: Safely parse AI JSON from the Database ---
    const getPlanData = (appData) => {
      if (!appData?.plan?.generated_json) return null;
      let data = appData.plan.generated_json;
      if (typeof data === 'string') {
        try { data = JSON.parse(data); } catch(e) { return null; }
      }
      return data;
    };

    // --- Helper: Get Local Date string (YYYY-MM-DD) avoiding UTC mismatch ---
    const getLocalDate = () => {
      const d = new Date();
      const offset = d.getTimezoneOffset() * 60000;
      return new Date(d.getTime() - offset).toISOString().split('T')[0];
    };

    // --- Helper: Get Formatted Local Date string (e.g. Monday, Oct 24) ---
    const getFormattedDate = () => {
      return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    };

    // --- Helper: Robustly extract the first number from a string (e.g. "1800-2000 kcal" -> 1800) ---
    const parseFirstNumber = (val) => {
      if (!val) return 0;
      const str = String(val).replace(/,/g, ''); // Remove commas
      const match = str.match(/\d+/); // Find first sequence of digits
      return match ? parseInt(match[0], 10) : 0;
    };

    const GlobalStyles = () => (
      <style>{`
        :root {
          --bg: #060d18; --surface: #0b1628; --surface-2: #0f1e35;
          --surface-3: #142642; --border: #1a2e48; --border-bright: #243d60;
          --text: #e2eeff; --text-2: #7a9abf; --accent: #6bff8f;
          --radius: 14px; --radius-lg: 20px;
        }
        body {
          background: var(--bg); color: var(--text);
          font-family: 'Plus Jakarta Sans', sans-serif;
          margin: 0; padding: 0; min-height: 100vh;
          background-image:
            radial-gradient(ellipse 60% 40% at 0% 0%, rgba(255,92,40,.07) 0%, transparent 60%),
            radial-gradient(ellipse 50% 40% at 100% 0%, rgba(107,255,143,.03) 0%, transparent 55%);
        }
        .kinetic-gradient { background: linear-gradient(135deg, #6bff8f 0%, #0abc56 100%); }
        .action-btn {
          background: linear-gradient(135deg, var(--accent) 0%, #ff7a40 100%);
          color: #fff; border: none; padding: 12px 20px; border-radius: var(--radius);
          font-weight: 700; cursor: pointer; transition: all 0.2s;
          box-shadow: 0 4px 16px rgba(255,92,40,.28);
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(255,92,40,.4); }
        .action-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
        .ghost-btn {
          background: var(--surface-2); border: 1px solid var(--border-bright);
          color: var(--text); padding: 10px 18px; border-radius: var(--radius);
          font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        input, select, textarea {
          background: var(--surface-2); color: var(--text);
          border: 1px solid var(--border-bright); border-radius: var(--radius);
          padding: 12px 16px; width: 100%; outline: none; transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      `}</style>
    );

    const FlashMessage = ({ error, message }) => {
      if (!error && !message) return null;
      return (
        <div className={`p-4 rounded-xl flex items-center gap-3 mb-6 ${error ? 'bg-red-500/10 border border-red-500/30 text-red-400' : 'bg-green-500/10 border border-green-500/30 text-green-400'}`}>
          <i className={`fa-solid ${error ? 'fa-triangle-exclamation' : 'fa-circle-check'} text-lg`}></i>
          <span className="text-sm font-medium">{error || message}</span>
        </div>
      );
    };

    // --- Login View ---
    const LoginView = ({ setMe, setFlash }) => {
      const [isBootstrap, setIsBootstrap] = useState(false);
      useEffect(() => { api('/api/bootstrap-admin-check').then(res => setIsBootstrap(res.needsAdminBootstrap)).catch(() => {}); }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        try {
          const res = await api('/api/auth/login', {
            method: 'POST', body: JSON.stringify({ username: e.target.username.value, password: e.target.password.value })
          });
          setMe(res.user);
          setFlash({ msg: "Logged in successfully." });
        } catch (err) { setFlash({ err: err.message }); }
      };

      const handleBootstrap = async (e) => {
        e.preventDefault();
        try {
          await api('/api/bootstrap-admin', {
            method: 'POST',
            body: JSON.stringify({
              username: e.target.username.value,
              password: e.target.password.value,
              superadmin: e.target.superadmin.checked
            })
          });
          setFlash({ msg: "Account created. You can log in now." });
          setIsBootstrap(false);
        } catch (err) {
          setFlash({ err: err.message });
        }
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6">
          <div className="w-full max-w-md">
            <div className="text-center mb-10">
              <div className="inline-flex items-center justify-center w-20 h-20 kinetic-gradient rounded-2xl shadow-[0_0_40px_rgba(107,255,143,0.3)] mb-6">
                <i className="fa-solid fa-dumbbell text-4xl text-[#003a12]"></i>
              </div>
              <h1 className="text-3xl font-black text-white tracking-tight mb-2">GYMLOG</h1>
            </div>
            <div className="bg-[#1a1919] border border-[#6bff8f]/20 rounded-3xl p-8 shadow-2xl">
              <h2 className="text-xl font-bold text-white mb-2">Access Code</h2>
              <p className="text-xs text-gray-400 mb-8">Enter your login details below.</p>
              <form onSubmit={handleLogin} className="flex flex-col gap-5">
                <input name="username" placeholder="Username" required className="bg-[#262626] border-[#6bff8f]/20 text-white" />
                <input type="password" name="password" placeholder="Password" required className="bg-[#262626] border-[#6bff8f]/20 text-white" />
                <button type="submit" className="action-btn w-full mt-2">Unlock My Plan <i className="fa-solid fa-arrow-right ml-2"></i></button>
              </form>

              {isBootstrap && (
                <div className="mt-8 pt-8 border-t border-gray-800">
                  <h3 className="text-lg font-bold text-white mb-2">First Time Setup</h3>
                  <p className="text-xs text-gray-400 mb-6">Create the app owner account.</p>
                  <form onSubmit={handleBootstrap} className="flex flex-col gap-4">
                    <input name="username" placeholder="Admin Username" required className="bg-[#262626] text-white text-sm py-2 px-3" />
                    <input type="password" name="password" placeholder="Secure Password" required className="bg-[#262626] text-white text-sm py-2 px-3" />
                    <label className="flex items-center gap-3 text-sm text-gray-300">
                      <input type="checkbox" name="superadmin" className="w-4 h-4" /> I am the app owner
                    </label>
                    <button type="submit" className="ghost-btn w-full text-sm">Create Platform Account</button>
                  </form>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --- Client Views ---
    const ClientDashboard = ({ appData, setActiveTab }) => {
      const { client, dailyLog } = appData || {};
      const planData = getPlanData(appData);
      
      // FIXED: Use parseFirstNumber to handle ranges like "1800 - 2000" correctly
      const targetCalories = parseFirstNumber(planData?.calorieTarget || planData?.nutrition?.calories || planData?.calories) || 2000;
      const targetProtein = parseFirstNumber(planData?.macros?.protein || planData?.nutrition?.protein) || 150;

      // Dynamically calculate consumed amounts from the log
      const loggedFoods = dailyLog?.meals_json?.loggedFoods || dailyLog?.diet_json?.loggedFoods || [];
      const consumedCalories = loggedFoods.reduce((sum, f) => sum + (parseInt(f.calories) || 0), 0);
      const consumedProtein = loggedFoods.reduce((sum, f) => sum + (parseInt(f.protein) || 0), 0);

      const isWorkoutLogged = dailyLog?.workout_json?.completed;
      const isDietLogged = loggedFoods.length > 0;

      const calPercent = Math.min(Math.round((consumedCalories / targetCalories) * 100), 100);
      const proPercent = Math.min(Math.round((consumedProtein / targetProtein) * 100), 100);

      const hasPlan = !!planData;

      return (
        <div className="p-5 space-y-6">
          <section>
            <h2 className="text-2xl font-black text-white tracking-tight">
              Good {new Date().getHours() < 12 ? 'morning' : 'evening'}, {client?.full_name?.split(' ')[0] || 'there'} 💪
            </h2>
            <p className="text-sm text-gray-400 mt-1">Ready to crush your goals today?</p>
          </section>

          {/* Today's Mission Quick Actions */}
          <section>
            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Today's Mission</h3>
            <div className="grid grid-cols-2 gap-4">
              <button 
                onClick={() => setActiveTab('workout')} 
                className={`p-4 rounded-2xl border text-left transition-all ${isWorkoutLogged ? 'bg-[#00cba8]/10 border-[#00cba8]/30' : 'bg-[#1a1919] border-white/5 hover:border-[#6bff8f]/30'}`}
              >
                <div className={`w-8 h-8 rounded-full flex items-center justify-center mb-3 ${isWorkoutLogged ? 'bg-[#00cba8] text-white' : 'bg-[#262626] text-gray-400'}`}>
                  <i className={`fa-solid ${isWorkoutLogged ? 'fa-check' : 'fa-dumbbell'}`}></i>
                </div>
                <div className="font-bold text-white text-sm">Workout</div>
                <div className={`text-[10px] mt-1 uppercase tracking-widest font-bold ${isWorkoutLogged ? 'text-[#00cba8]' : 'text-gray-500'}`}>
                  {isWorkoutLogged ? 'Completed' : 'Pending'}
                </div>
              </button>

              <button 
                onClick={() => setActiveTab('diet')} 
                className={`p-4 rounded-2xl border text-left transition-all ${isDietLogged ? 'bg-[#ffc940]/10 border-[#ffc940]/30' : 'bg-[#1a1919] border-white/5 hover:border-[#ffc940]/30'}`}
              >
                <div className={`w-8 h-8 rounded-full flex items-center justify-center mb-3 ${isDietLogged ? 'bg-[#ffc940] text-[#0b1628]' : 'bg-[#262626] text-gray-400'}`}>
                  <i className={`fa-solid ${isDietLogged ? 'fa-check' : 'fa-utensils'}`}></i>
                </div>
                <div className="font-bold text-white text-sm">Diet</div>
                <div className={`text-[10px] mt-1 uppercase tracking-widest font-bold ${isDietLogged ? 'text-[#ffc940]' : 'text-gray-500'}`}>
                  {isDietLogged ? `${loggedFoods.length} items logged` : 'Pending'}
                </div>
              </button>
            </div>
          </section>

          {/* Nutrition Summary */}
          <section className="bg-[#1a1919] border border-white/5 rounded-3xl p-6">
            <div className="flex justify-between items-center mb-5">
              <h4 className="text-lg font-bold text-white">Daily Fuel Target</h4>
              <i className="fa-solid fa-fire text-[#ffc940]"></i>
            </div>
            
            {hasPlan ? (
              <div className="space-y-5">
                <div>
                  <div className="flex justify-between text-xs mb-2">
                    <span className="text-gray-400 font-bold uppercase tracking-widest">Calories</span>
                    <span className="font-bold text-white">{consumedCalories} / {targetCalories} kcal</span>
                  </div>
                  <div className="h-2 bg-[#262626] rounded-full overflow-hidden">
                    <div className="h-full kinetic-gradient rounded-full transition-all duration-500" style={{ width: `${calPercent}%` }}></div>
                  </div>
                </div>
                <div>
                  <div className="flex justify-between text-xs mb-2">
                    <span className="text-gray-400 font-bold uppercase tracking-widest">Protein</span>
                    <span className="font-bold text-[#00cba8]">{consumedProtein} / {targetProtein}g</span>
                  </div>
                  <div className="h-2 bg-[#262626] rounded-full overflow-hidden">
                    <div className="h-full bg-[#00cba8] rounded-full transition-all duration-500" style={{ width: `${proPercent}%` }}></div>
                  </div>
                </div>
              </div>
            ) : (
              <p className="text-sm text-gray-500">Submit your intake form to receive your custom macro targets and daily plan.</p>
            )}
          </section>

          {/* Weekly Check-in Promo */}
          <section className="bg-gradient-to-r from-[#0b1628] to-[#142642] border border-[#1a2e48] rounded-3xl p-6 flex items-center justify-between shadow-xl">
            <div>
              <h4 className="text-sm font-bold text-white mb-1">Weekly Check-in</h4>
              <p className="text-xs text-[#7a9abf]">Update your coach on progress.</p>
            </div>
            <button onClick={() => setActiveTab('checkin')} className="bg-[#6bff8f] text-[#003a12] w-10 h-10 rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-lg shadow-[#6bff8f]/20">
              <i className="fa-solid fa-camera"></i>
            </button>
          </section>
        </div>
      );
    };

    const ProgressCharts = ({ appData }) => {
      const [history, setHistory] = useState(null);
      const weightCanvasRef = useRef(null);
      const calCanvasRef = useRef(null);
      const weightChartRef = useRef(null);
      const calChartRef = useRef(null);

      useEffect(() => {
        api('/api/app/progress-history').then(res => setHistory(res)).catch(() => setHistory({ logs: [], checkins: [] }));
      }, []);

      useEffect(() => {
        if (!history || !window.Chart) return;
        const CHART_DEFAULTS = {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#7a9abf', font: { size: 9 }, maxRotation: 45 }, grid: { color: '#1a2e48' } },
            y: { ticks: { color: '#7a9abf', font: { size: 9 } }, grid: { color: '#1a2e48' } }
          }
        };
        const checkins = [...(history.checkins || [])].reverse();
        if (checkins.length > 1 && weightCanvasRef.current) {
          if (weightChartRef.current) weightChartRef.current.destroy();
          weightChartRef.current = new window.Chart(weightCanvasRef.current, {
            type: 'line',
            data: {
              labels: checkins.map(c => c.checkin_date),
              datasets: [
                { label: 'Weight', data: checkins.map(c => c.weight), borderColor: '#6bff8f', backgroundColor: 'rgba(107,255,143,0.08)', tension: 0.4, fill: true, pointRadius: 4, pointBackgroundColor: '#6bff8f' },
                ...(checkins.some(c => c.body_fat) ? [{ label: 'Body Fat %', data: checkins.map(c => c.body_fat), borderColor: '#00cba8', backgroundColor: 'transparent', tension: 0.4, pointRadius: 3, pointBackgroundColor: '#00cba8', yAxisID: 'y2' }] : [])
              ]
            },
            options: { ...CHART_DEFAULTS, scales: { ...CHART_DEFAULTS.scales, ...(checkins.some(c => c.body_fat) ? { y2: { position: 'right', ticks: { color: '#00cba8', font: { size: 9 } }, grid: { drawOnChartArea: false } } } : {}) } }
          });
        }
        const logs = [...(history.logs || [])].reverse();
        if (logs.length > 0 && calCanvasRef.current) {
          if (calChartRef.current) calChartRef.current.destroy();
          calChartRef.current = new window.Chart(calCanvasRef.current, {
            type: 'bar',
            data: {
              labels: logs.map(l => l.log_date),
              datasets: [{ label: 'Calories', data: logs.map(l => l.macros_json?.calories || 0), backgroundColor: 'rgba(255,201,64,0.7)', borderColor: '#ffc940', borderWidth: 1, borderRadius: 4 }]
            },
            options: CHART_DEFAULTS
          });
        }
        return () => {
          if (weightChartRef.current) { weightChartRef.current.destroy(); weightChartRef.current = null; }
          if (calChartRef.current) { calChartRef.current.destroy(); calChartRef.current = null; }
        };
      }, [history]);

      const planData = getPlanData(appData);
      const targetCalories = parseFirstNumber(planData?.calorieTarget) || 0;
      const checkins = history?.checkins || [];
      const latestWeight = checkins[0]?.weight;
      const prevWeight = checkins[1]?.weight;
      const weightDelta = (latestWeight && prevWeight) ? (latestWeight - prevWeight).toFixed(1) : null;

      return (
        <div className="p-5 space-y-6 pb-10">
          <section>
            <h2 className="text-2xl font-black text-white tracking-tight">Progress</h2>
            <p className="text-sm text-gray-400 mt-1">Your trends over time.</p>
          </section>

          {!history ? (
            <div className="flex items-center justify-center py-16"><i className="fa-solid fa-spinner fa-spin text-3xl text-[#6bff8f]"></i></div>
          ) : (
            <>
              {/* Stat pills */}
              <div className="grid grid-cols-3 gap-3">
                <div className="bg-[#1a1919] border border-white/5 rounded-2xl p-4 text-center">
                  <div className="text-xl font-black text-white">{latestWeight ? `${latestWeight}` : '—'}</div>
                  <div className="text-[9px] text-gray-500 uppercase tracking-widest mt-1 font-bold">kg now</div>
                </div>
                <div className="bg-[#1a1919] border border-white/5 rounded-2xl p-4 text-center">
                  <div className={`text-xl font-black ${weightDelta === null ? 'text-gray-500' : weightDelta > 0 ? 'text-[#ffc940]' : 'text-[#6bff8f]'}`}>{weightDelta !== null ? (weightDelta > 0 ? `+${weightDelta}` : weightDelta) : '—'}</div>
                  <div className="text-[9px] text-gray-500 uppercase tracking-widest mt-1 font-bold">kg change</div>
                </div>
                <div className="bg-[#1a1919] border border-white/5 rounded-2xl p-4 text-center">
                  <div className="text-xl font-black text-[#ffc940]">{history.logs.filter(l => l.macros_json?.calories > 0).length}</div>
                  <div className="text-[9px] text-gray-500 uppercase tracking-widest mt-1 font-bold">days logged</div>
                </div>
              </div>

              {/* Weight + Body Fat chart */}
              <div className="bg-[#1a1919] border border-white/5 rounded-3xl p-5">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-sm font-bold text-white">Weight Trend</h3>
                  {checkins.some(c => c.body_fat) && <div className="flex gap-3 text-[9px] font-bold uppercase tracking-widest"><span className="text-[#6bff8f]">— Weight</span><span className="text-[#00cba8]">— Body Fat %</span></div>}
                </div>
                {checkins.length > 1 ? (
                  <canvas ref={weightCanvasRef} height="140"></canvas>
                ) : (
                  <div className="flex flex-col items-center justify-center py-8 text-center">
                    <i className="fa-solid fa-scale-balanced text-3xl text-gray-700 mb-3"></i>
                    <p className="text-xs text-gray-500">Log at least 2 check-ins to see your weight trend.</p>
                  </div>
                )}
              </div>

              {/* Calorie adherence chart */}
              <div className="bg-[#1a1919] border border-white/5 rounded-3xl p-5">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-sm font-bold text-white">Calorie Log (30 days)</h3>
                  {targetCalories > 0 && <span className="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Target: {targetCalories} kcal</span>}
                </div>
                {history.logs.length > 0 ? (
                  <canvas ref={calCanvasRef} height="140"></canvas>
                ) : (
                  <div className="flex flex-col items-center justify-center py-8 text-center">
                    <i className="fa-solid fa-chart-bar text-3xl text-gray-700 mb-3"></i>
                    <p className="text-xs text-gray-500">Start logging meals to see your calorie history.</p>
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      );
    };

    const ClientIntakeView = ({ appData, setFlash }) => {
      const [saving, setSaving] = useState(false);
      const a = appData?.intake?.answers_json || {};

      const handleSubmit = async (e) => {
        e.preventDefault();
        setSaving(true);
        const data = Object.fromEntries(new FormData(e.target).entries());
        try {
          await api('/api/app/intake', { method: 'POST', body: JSON.stringify({ answers: data, complete: true }) });
          setFlash({ msg: "Intake form submitted! Your coach will generate your plan shortly." });
        } catch (err) { setFlash({ err: err.message }); }
        setSaving(false);
      };

      const SectionHeader = ({ icon, title, subtitle }) => (
        <div className="flex items-center gap-3 mb-5 pb-3 border-b border-white/5">
          <div className="w-9 h-9 rounded-xl bg-[#6bff8f]/10 flex items-center justify-center text-[#6bff8f] shrink-0">
            <i className={`fa-solid ${icon} text-sm`}></i>
          </div>
          <div>
            <div className="text-sm font-black text-white">{title}</div>
            {subtitle && <div className="text-[10px] text-gray-500 mt-0.5">{subtitle}</div>}
          </div>
        </div>
      );

      const Field = ({ label, required, children }) => (
        <label className="block">
          <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-2">
            {label}{required && <span className="text-red-400 ml-1">*</span>}
          </span>
          {children}
        </label>
      );

      const inp = "bg-[#262626] border-white/10 text-white w-full";
      const sel = "bg-[#262626] border-white/10 text-white w-full";

      return (
        <div className="p-5 space-y-6 pb-28">
          <div>
            <h2 className="text-2xl font-black text-white">Intake Form</h2>
            <p className="text-sm text-gray-400 mt-1">Complete all sections so your coach can build the perfect plan for you.</p>
          </div>

          <form onSubmit={handleSubmit} className="space-y-5">

            {/* ── 1. Personal Profile ── */}
            <div className="bg-[#1a1919] border border-white/5 rounded-3xl p-6 space-y-4">
              <SectionHeader icon="fa-user" title="Personal Profile" subtitle="Basic information" />
              <Field label="Full Name" required>
                <input name="fullName" defaultValue={a.fullName} required placeholder="Your full name" className={inp} />
              </Field>
              <div className="grid grid-cols-2 gap-4">
                <Field label="Age" required>
                  <input type="number" name="age" defaultValue={a.age} required min="10" max="80" placeholder="e.g. 28" className={inp} />

    const ClientPlanView = ({ appData }) => {
      const [planTab, setPlanTab] = useState('workout'); 
      const plan = getPlanData(appData);
      
      if (!plan) {
        return (
          <div className="p-5 text-center mt-20">
            <i className="fa-solid fa-clipboard-list text-gray-700 text-5xl mb-4"></i>
            <h3 className="text-lg font-bold text-white mb-2">Plan Pending</h3>
            <p className="text-sm text-gray-400">Your coach is currently building your personalized plan. Check back soon!</p>
          </div>
        );
      }

      // --- Workout Extraction (Robust Array Parsing) ---
      let daysRaw = plan?.workoutSplit || plan?.workout_plan || plan?.workouts || plan?.routine || [];
      let days = [];
      if (Array.isArray(daysRaw)) {
        days = daysRaw;
      } else if (typeof daysRaw === 'object' && daysRaw !== null) {
        days = Object.entries(daysRaw).map(([k, v]) => ({
          day: k,
          ...(typeof v === 'object' && v !== null && !Array.isArray(v) ? v : { exercises: Array.isArray(v) ? v : [v] })
        }));
      }

      // --- Diet Extraction ---
      let meals = [];
      const source = plan.nutrition ? { ...plan, ...plan.nutrition } : plan;
      const dietKeys = ['meals', 'mealPlan', 'diet', 'dietPlan', 'guidelines', 'familyMeals', 'sharedMeals', 'householdMeals', 'householdPlan', 'familyPlan', 'sharedDiet', 'partnerPlan'];
      
      let extracted = [];
      for (const key of Object.keys(source)) {
          const kLower = key.toLowerCase();
          if (dietKeys.includes(key) || kLower.includes('meal') || kLower.includes('diet') || kLower.includes('food') || kLower.includes('family') || kLower.includes('share') || kLower.includes('breakfast') || kLower.includes('lunch') || kLower.includes('dinner') || kLower.includes('snack')) {
              const val = source[key];
              if (Array.isArray(val)) {
                  extracted = [...extracted, ...val.map(item => typeof item === 'string' ? { name: key, details: item } : item)];
              } else if (typeof val === 'object' && val !== null) {
                  extracted = [...extracted, ...Object.entries(val).map(([k, v]) => ({ name: k, details: v }))];
              } else if (typeof val === 'string') {
                  extracted.push({ name: key, details: val });
              }
          }
      }
      
      const seen = new Set();
      meals = extracted.filter(m => {
          const nameStr = String(m.name || '').toLowerCase();
          const detailStr = m.details ? (typeof m.details === 'string' ? m.details : JSON.stringify(m.details)).toLowerCase() : '';
          
          if (nameStr.includes('structure') || nameStr.includes('guideline') || nameStr.includes('weekly meal')) return false;
          if (detailStr.includes('(choice)')) return false;

          const str = JSON.stringify(m);
          if (seen.has(str)) return false;
          seen.add(str);
          return true;
      });

      const renderMealNode = (rawNode) => {
        let node = rawNode;
        if (typeof node === 'string') {
          let trimmed = node.trim();
          if (trimmed.toLowerCase().startsWith('options:')) trimmed = trimmed.substring(8).trim();
          if ((trimmed.startsWith('[') && trimmed.endsWith(']')) || (trimmed.startsWith('{') && trimmed.endsWith('}'))) {
            try { node = JSON.parse(trimmed); } catch(e) {}
          }
        }
        if (node === null || node === undefined) return null;
        if (typeof node === 'string' || typeof node === 'number') {
          if (String(node).toLowerCase().includes('weekly meal structure')) return null;
          return <div className="text-sm text-gray-300 leading-relaxed">{node}</div>;
        }
        if (Array.isArray(node)) {
          return (
            <div className="space-y-3 mt-3">
              {node.map((item, idx) => (
                <div key={idx} className="bg-[#0b1628] p-4 rounded-xl border border-white/5 shadow-sm">
                  {renderMealNode(item)}
                </div>
              ))}
            </div>
          );
        }
        if (typeof node === 'object') {
          if (node.label || node.food || node.name || node.option || node.title) {
            const title = node.label || node.food || node.name || node.option || node.title;
            if (typeof title === 'string' && title.toLowerCase().includes('weekly meal structure')) return null;
            
            const macros = [
               node.calories && `${node.calories} kcal`,
               node.protein && `${node.protein}g Pro`,
               node.carbs && `${node.carbs}g Carb`,
               (node.fat || node.fats) && `${node.fat || node.fats}g Fat`
            ].filter(Boolean).join(' • ');

            return (
              <div>
                <div className="text-sm font-bold text-white mb-1 leading-snug">{title}</div>
                {macros && <div className="text-[10px] text-[#00cba8] font-mono uppercase tracking-widest font-bold mt-2">{macros}</div>}
                {Object.entries(node).map(([k, v], idx) => {
                   if (['label', 'food', 'name', 'option', 'title', 'calories', 'protein', 'carbs', 'fat', 'fats'].includes(k)) return null;
                   if (k.toLowerCase().includes('weekly meal')) return null;
                   return (
                     <div key={idx} className="mt-2 pt-2 border-t border-white/5">
                       <span className="text-[10px] text-[#ffc940] font-bold uppercase tracking-widest">{k.replace(/([A-Z])/g, ' $1').trim()}:</span> 
                       <div className="mt-1">{renderMealNode(v)}</div>
                     </div>
                   );
                })}
              </div>
            );
          }
          return (
            <div className="space-y-2 mt-2">
              {Object.entries(node).map(([k, v], idx) => {
                if (k === 'meal' || k === 'name' || k === 'type') return null;
                if (k.toLowerCase().includes('weekly meal')) return null;
                
                if (k.toLowerCase() === 'options' && (Array.isArray(v) || (typeof v === 'string' && v.trim().startsWith('[')))) {
                   return <div key={idx}>{renderMealNode(v)}</div>;
                }
                return (
                  <div key={idx}>
                    <div className="text-[10px] text-[#ffc940] font-bold uppercase tracking-widest mb-1">{k.replace(/([A-Z])/g, ' $1').trim()}</div>
                    <div className="pl-2 border-l border-white/10">{renderMealNode(v)}</div>
                  </div>
                );
              })}
            </div>
          );
        }
        return null;
      };

      const caloriesStr = plan?.calorieTarget || plan?.nutrition?.calories || plan?.calories || "N/A";
      const proteinStr = plan?.macros?.protein || plan?.nutrition?.protein || "N/A";

      return (
        <div className="p-5 space-y-6">
          <div>
            <h2 className="text-2xl font-black text-white">Your Plan</h2>
            <p className="text-sm text-gray-400 mt-1">Review your custom protocols.</p>
          </div>

          {/* Toggle Buttons */}
          <div className="flex gap-2 p-1 bg-[#1a1919] rounded-xl border border-white/5">
            <button 
              type="button"
              onClick={() => setPlanTab('workout')} 
              className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${planTab === 'workout' ? 'bg-[#6bff8f] text-[#003a12]' : 'text-gray-400 hover:text-white'}`}
            >
              Workout Plan
            </button>
            <button 
              type="button"
              onClick={() => setPlanTab('diet')} 
              className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${planTab === 'diet' ? 'bg-[#ffc940] text-[#003a12]' : 'text-gray-400 hover:text-white'}`}
            >
              Diet Plan
            </button>
          </div>

          <div className="bg-[#1a1919] border border-[#6bff8f]/20 rounded-3xl p-6">
            <h3 className="text-[#6bff8f] text-xs font-bold uppercase tracking-widest mb-3">Profile Summary</h3>
            <p className="text-sm text-gray-300 leading-relaxed">{plan.profileSummary || plan.summary || "Your AI-generated plan is active."}</p>
          </div>

          {planTab === 'workout' && (
            <div className="bg-[#1a1919] border border-white/5 rounded-3xl p-6">
              <h3 className="text-white font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-dumbbell text-[#6bff8f]"></i> Weekly Workout Split</h3>
              <div className="space-y-4">
                {days.map((day, i) => (
                  <div key={i} className="border-b border-white/5 pb-4 last:border-0 last:pb-0">
                    <div className="text-sm font-bold text-[#6bff8f] mb-2">{day.day || `Day ${i+1}`}</div>
                    {day.warmup && <div className="text-xs text-[#ffc940] mb-2"><i className="fa-solid fa-fire mr-1"></i> {Array.isArray(day.warmup) ? day.warmup.join(', ') : day.warmup}</div>}
                    <ul className="text-sm text-gray-300 space-y-1">
                      {(() => {
                         const rawExercises = day.exercises || day.workout || [];
                         const exArray = Array.isArray(rawExercises) ? rawExercises : (rawExercises ? [rawExercises] : []);
                         return exArray.map((ex, j) => {
                            const exName = typeof ex === 'string' ? ex : (ex?.name || ex?.exercise || "Unknown Exercise");
                            return <li key={j}>• {exName}</li>;
                         });
                      })()}
                    </ul>
                    {(day.cooldown || day.stretches) && <div className="text-xs text-[#00cba8] mt-2"><i className="fa-solid fa-wind mr-1"></i> {Array.isArray(day.cooldown || day.stretches) ? (day.cooldown || day.stretches).join(', ') : (day.cooldown || day.stretches)}</div>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {planTab === 'diet' && (
             <div className="bg-[#1a1919] border border-[#ffc940]/20 rounded-3xl p-6 space-y-4">
              <h3 className="font-bold text-white flex items-center gap-2"><i className="fa-solid fa-fire text-[#ffc940]"></i> AI Diet Blueprint</h3>
              {meals.length === 0 ? (
                <p className="text-sm text-gray-300">Hit your macro targets! No strict meals prescribed.</p>
              ) : (
                <div className="space-y-4">
                  {meals.map((m, i) => {
                    let mealName = `Meal ${i+1}`;
                    let mealDetails = m;
                    
                    if (typeof m === 'object' && m !== null) {
                      mealName = m.meal || m.name || m.type || m.time || m.title || `Meal ${i+1}`;
                      mealDetails = m.details || m.description || m.food || m.options || m.items || m.ingredients || m;
                    }
                    
                    const mealNameStr = String(mealName);
                    if (mealNameStr.toLowerCase().includes('weekly meal') || mealNameStr.toLowerCase().includes('structure')) return null;

                    return (
                      <div key={i} className="border-b border-white/5 pb-5 mb-5 last:border-0 last:pb-0 last:mb-0">
                        <div className="text-lg font-black text-[#ffc940] capitalize mb-3">{mealNameStr.replace(/([A-Z])/g, ' $1').trim()}</div>
                        {renderMealNode(mealDetails)}
                      </div>
                    )
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    const ClientDietView = ({ appData, setFlash, onSaved }) => {
      const [selectedAiFood, setSelectedAiFood] = useState("");
      const [isCustom, setIsCustom] = useState(false);
      const [mealPickerOpen, setMealPickerOpen] = useState(false);
      const [expandedGroup, setExpandedGroup] = useState(null);
      const [loggedFoods, setLoggedFoods] = useState([]);
      const [saving, setSaving] = useState(false);
      const [hasSynced, setHasSynced] = useState(false);
      // Nutrition search state
      const [searchQuery, setSearchQuery] = useState("");
      const [searchResults, setSearchResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [searchDone, setSearchDone] = useState(false);
      const [searchError, setSearchError] = useState(false);
      const [searchSource, setSearchSource] = useState(null);
      const [selectedNutrition, setSelectedNutrition] = useState(null); // {name,calories,protein,carbs,fat,per}
      const [servingGrams, setServingGrams] = useState(100);
      const debounceRef = useRef(null);

      useEffect(() => {
        const loadedMeals = appData?.dailyLog?.meals_json?.loggedFoods || appData?.dailyLog?.diet_json?.loggedFoods;
        if (loadedMeals && !hasSynced) {
          setLoggedFoods(loadedMeals);
          setHasSynced(true);
        }
      }, [appData, hasSynced]);

      const planData = getPlanData(appData);
      
      const calories = planData?.calorieTarget || planData?.nutrition?.calories || planData?.calories || "N/A";
      const protein = planData?.macros?.protein || planData?.nutrition?.protein || "N/A";
      const carbs = planData?.macros?.carbs || planData?.nutrition?.carbs || "N/A";
      const fats = planData?.macros?.fats || planData?.nutrition?.fats || "N/A";
      
      // Build food options ONLY from mealOptions - no more leaking exercise/supplement strings
      const aiFoodOptions = useMemo(() => {
        if (!planData?.mealOptions || !Array.isArray(planData.mealOptions)) return [];
        const groups = [];
        planData.mealOptions.forEach(mealGroup => {
          const groupLabel = String(mealGroup.meal || mealGroup.name || 'Meal').trim();
          const rawOptions = mealGroup.options || mealGroup.items || mealGroup.foods || [];
          const optionsList = Array.isArray(rawOptions) ? rawOptions : [];
          const items = [];
          optionsList.forEach(opt => {
            let label = '';
            let cals = 0, prot = 0, carb = 0, fat = 0;
            if (typeof opt === 'string') {
              label = opt.trim();
            } else if (typeof opt === 'object' && opt !== null) {
              label = String(opt.label || opt.name || opt.food || opt.option || '').trim();
              cals  = Number(opt.calories || 0);
              prot  = Number(opt.protein  || 0);
              carb  = Number(opt.carbs    || 0);
              fat   = Number(opt.fat || opt.fats || 0);
            }
            if (label.length >= 3 && label.length <= 160) {
              items.push({ label, calories: cals, protein: prot, carbs: carb, fat });
            }
          });
          if (items.length > 0) groups.push({ groupLabel, items });
        });
        return groups;
      }, [planData]);

      // Flat list for lookup when user selects an option
      const aiFoodFlat = useMemo(() =>
        aiFoodOptions.flatMap(g => g.items),
      [aiFoodOptions]);

      const handleSearchInput = (val) => {
        setSearchQuery(val);
        setSelectedNutrition(null);
        setSearchResults([]);
        setSearchDone(false);
        setSearchError(false);
        if (debounceRef.current) clearTimeout(debounceRef.current);
        if (val.trim().length < 2) { setSearching(false); return; }
        setSearching(true);
        debounceRef.current = setTimeout(async () => {
          try {
            const res = await api(`/api/nutrition/search?q=${encodeURIComponent(val.trim())}`);
            setSearchResults(res.results || []);
            setSearchSource(res.source);
            setSearchDone(true);
            setSearchError(false);
          } catch {
            setSearchResults([]);
            setSearchError(true);
            setSearchDone(true);
          }
          setSearching(false);
        }, 300);
      };

      const handleSelectNutritionResult = (item) => {
        setSelectedNutrition(item);
        setSearchQuery(item.name);
        setSearchResults([]);
        setSearchDone(false);
        setServingGrams(100);
      };

      const scaledMacros = selectedNutrition ? {
        calories: Math.round(selectedNutrition.calories * servingGrams / 100),
        protein:  Math.round(selectedNutrition.protein  * servingGrams / 100 * 10) / 10,
        carbs:    Math.round(selectedNutrition.carbs    * servingGrams / 100 * 10) / 10,
        fat:      Math.round(selectedNutrition.fat      * servingGrams / 100 * 10) / 10,
      } : null;

      const handleAddFood = (e) => {
        e.preventDefault();
        let newFoods;
        if (isCustom) {
          if (selectedNutrition && scaledMacros) {
            newFoods = [...loggedFoods, { name: `${searchQuery} (${servingGrams}g)`, type: 'nutrition', calories: scaledMacros.calories, protein: scaledMacros.protein, carbs: scaledMacros.carbs, fat: scaledMacros.fat }];
          } else if (searchQuery.trim()) {
            newFoods = [...loggedFoods, { name: searchQuery.trim(), type: 'custom', calories: 0, protein: 0, carbs: 0, fat: 0 }];
          } else return;
          setSearchQuery(""); setSelectedNutrition(null); setSearchResults([]);
        } else {
          const match = aiFoodFlat.find(o => o.label === selectedAiFood);
          if (!match) return;
          newFoods = [...loggedFoods, { name: match.label, type: 'ai', calories: match.calories, protein: match.protein, carbs: match.carbs || 0, fat: match.fat || 0 }];
          setSelectedAiFood("");
        }
        setIsCustom(false);
        setLoggedFoods(newFoods);
        handleSaveLog(newFoods, true);
      };

      const handleSaveLog = async (foods = loggedFoods, silent = false) => {
        setSaving(true);
        try {
          const date = getLocalDate();
          const existingWorkout = appData?.dailyLog?.workout_json || {};
          const macroTotals = foods.reduce((acc, f) => ({
            calories: acc.calories + (f.calories || 0),
            protein:  Math.round((acc.protein  + (f.protein  || 0)) * 10) / 10,
            carbs:    Math.round((acc.carbs    + (f.carbs    || 0)) * 10) / 10,
            fat:      Math.round((acc.fat      + (f.fat      || 0)) * 10) / 10,
          }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
          await api(`/api/app/daily-log/${date}`, {
            method: 'PUT',
            body: JSON.stringify({ meals: { loggedFoods: foods }, workout: existingWorkout, macros: macroTotals })
          });
          if (!silent) setFlash({ msg: "Diet log saved!" });
          if (onSaved) onSaved();
        } catch (err) { setFlash({ err: err.message }); }
        setSaving(false);
      };

      return (
        <div className="p-5 space-y-6">
          <div>
            <h2 className="text-2xl font-black text-white">Diet Log</h2>
            <p className="text-sm text-gray-400 mt-1">Track your macros and daily meals.</p>
            <div className="inline-block bg-[#6bff8f]/10 text-[#6bff8f] px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mt-3">
              <i className="fa-regular fa-calendar mr-1"></i> {getFormattedDate()}
            </div>
          </div>

          <div className="grid grid-cols-4 gap-3">
            <div className="bg-[#1a1919] border border-white/5 rounded-2xl p-3 text-center">
              <div className="text-sm font-black text-[#ffc940]">{calories}</div>
              <div className="text-[9px] text-gray-400 uppercase mt-1 tracking-widest">Cals</div>
            </div>
            <div className="bg-[#1a1919] border border-white/5 rounded-2xl p-3 text-center">
              <div className="text-sm font-black text-[#00cba8]">{protein}</div>
              <div className="text-[9px] text-gray-400 uppercase mt-1 tracking-widest">Pro</div>
            </div>
            <div className="bg-[#1a1919] border border-white/5 rounded-2xl p-3 text-center">
              <div className="text-sm font-black text-[#6ba4ff]">{carbs}</div>
              <div className="text-[9px] text-gray-400 uppercase mt-1 tracking-widest">Carb</div>
            </div>
            <div className="bg-[#1a1919] border border-white/5 rounded-2xl p-3 text-center">
              <div className="text-sm font-black text-[#ff6b6b]">{fats}</div>
              <div className="text-[9px] text-gray-400 uppercase mt-1 tracking-widest">Fat</div>
            </div>
          </div>

          <div className="bg-[#1a1919] border border-[#6bff8f]/20 rounded-3xl p-6 space-y-4">
            <h3 className="font-bold text-white mb-2"><i className="fa-solid fa-plus text-[#6bff8f] mr-2"></i> Track Your Food</h3>
            <form onSubmit={handleAddFood} className="flex flex-col gap-3">
              {/* Custom meal picker — replaces native <select> */}
              <div className="relative">
                {/* Trigger button */}
                <button type="button"
                  onClick={() => { setMealPickerOpen(o => !o); setExpandedGroup(null); }}
                  className="w-full flex items-center justify-between bg-[#262626] border border-white/10 rounded-xl px-4 py-3 text-sm text-left transition-colors hover:border-[#6bff8f]/40 focus:outline-none focus:border-[#6bff8f]/60">
                  <span className={isCustom ? 'text-[#6bff8f]' : selectedAiFood ? 'text-white' : 'text-gray-500'}>
                    {isCustom ? '✏️ Custom food entry' : selectedAiFood ? (selectedAiFood.length > 45 ? selectedAiFood.slice(0,45)+'…' : selectedAiFood) : '🍽 Pick a meal from your plan'}
                  </span>
                  <i className={`fa-solid fa-chevron-down text-gray-500 text-xs transition-transform duration-200 ${mealPickerOpen ? 'rotate-180' : ''}`}></i>
                </button>

                {/* Dropdown panel */}
                {mealPickerOpen && (
                  <div className="absolute z-30 left-0 right-0 top-full mt-1 bg-[#1a1919] border border-white/10 rounded-2xl shadow-2xl overflow-hidden max-h-[420px] overflow-y-auto">
                    {/* Meal groups as accordion */}
                    {aiFoodOptions.map((group) => (
                      <div key={group.groupLabel} className="border-b border-white/5 last:border-0">
                        {/* Group header */}
                        <button type="button"
                          onClick={() => setExpandedGroup(expandedGroup === group.groupLabel ? null : group.groupLabel)}
                          className="w-full flex items-center justify-between px-4 py-3 hover:bg-white/5 transition-colors text-left">
                          <span className="text-xs font-bold text-[#6bff8f] uppercase tracking-widest">🍽 {group.groupLabel}</span>
                          <i className={`fa-solid fa-chevron-right text-gray-600 text-xs transition-transform duration-200 ${expandedGroup === group.groupLabel ? 'rotate-90' : ''}`}></i>
                        </button>
                        {/* Food items */}
                        {expandedGroup === group.groupLabel && (
                          <div className="pb-1">
                            {group.items.map((opt) => (
                              <button key={opt.label} type="button"
                                onClick={() => { setSelectedAiFood(opt.label); setIsCustom(false); setMealPickerOpen(false); }}
                                className={`w-full text-left px-4 py-3 transition-colors hover:bg-[#6bff8f]/10 border-l-2 ${selectedAiFood === opt.label ? 'border-l-[#6bff8f] bg-[#6bff8f]/10' : 'border-l-transparent'}`}>
                                <div className="text-sm text-white font-medium leading-snug">
                                  {opt.label.length > 55 ? opt.label.slice(0,55)+'…' : opt.label}
                                </div>
                                <div className="flex gap-2 mt-1.5 flex-wrap">
                                  {opt.calories > 0 && <span className="text-[9px] font-bold bg-[#ffc940]/15 text-[#ffc940] px-2 py-0.5 rounded-full">{opt.calories} kcal</span>}
                                  {opt.protein > 0 && <span className="text-[9px] font-bold bg-[#00cba8]/15 text-[#00cba8] px-2 py-0.5 rounded-full">{opt.protein}g P</span>}
                                  {opt.carbs > 0 && <span className="text-[9px] font-bold bg-[#6ba4ff]/15 text-[#6ba4ff] px-2 py-0.5 rounded-full">{opt.carbs}g C</span>}
                                  {opt.fat > 0 && <span className="text-[9px] font-bold bg-[#ff6b6b]/15 text-[#ff6b6b] px-2 py-0.5 rounded-full">{opt.fat}g F</span>}
                                </div>
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    ))}
                    {/* Custom entry option */}
                    <button type="button"
                      onClick={() => { setIsCustom(true); setSelectedAiFood(''); setMealPickerOpen(false); }}
                      className={`w-full text-left px-4 py-3 flex items-center gap-3 transition-colors hover:bg-white/5 ${isCustom ? 'bg-[#6bff8f]/10' : ''}`}>
                      <div className="w-7 h-7 rounded-lg bg-[#262626] flex items-center justify-center shrink-0">
                        <i className="fa-solid fa-pen text-[#6bff8f] text-xs"></i>
                      </div>
                      <div>
                        <div className="text-sm text-white font-medium">Custom food entry</div>
                        <div className="text-[10px] text-gray-500 mt-0.5">Search nutrition database</div>
                      </div>
                    </button>
                  </div>
                )}
              </div>

              {isCustom && (
                <div className="flex flex-col gap-2">
                  {/* Search input */}
                  <div className="relative">
                    <input
                      value={searchQuery}
                      onChange={e => handleSearchInput(e.target.value)}
                      placeholder="Search food (e.g. chicken breast, oats...)"
                      className="bg-[#0b1628] border-white/10 text-white text-sm focus:border-[#6bff8f] transition-colors w-full pr-8"
                      autoFocus
                      autoComplete="off"
                    />
                    {searching && <i className="fa-solid fa-spinner fa-spin absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>}
                  </div>

                  {/* Search results / feedback */}
                  {searchResults.length > 0 && (
                    <div className="bg-[#0b1628] border border-[#1a2e48] rounded-xl overflow-hidden shadow-xl">
                      <div className="px-4 py-2 bg-[#142642] text-[9px] text-[#7a9abf] uppercase tracking-widest font-bold">
                        Tap a result to select it and set your portion
                      </div>
                      {searchResults.map((r, i) => (
                        <button key={i} type="button" onClick={() => handleSelectNutritionResult(r)}
                          className="w-full text-left px-4 py-3 hover:bg-[#142642] transition-colors border-b border-[#1a2e48] last:border-0">
                          <div className="text-sm text-white font-medium truncate">{r.name}</div>
                          <div className="text-[10px] text-gray-400 mt-0.5 font-mono">
                            {r.calories} kcal · {r.protein}g P · {r.carbs}g C · {r.fat}g F <span className="text-gray-600">per 100g</span>
                          </div>
                        </button>
                      ))}
                      <div className="px-4 py-2 bg-[#060d18] text-[9px] text-gray-600 uppercase tracking-widest font-bold">
                        {searchSource === 'usda' ? 'Source: USDA FoodData Central' : searchSource === 'openfoodfacts' ? 'Source: Open Food Facts' : 'Nutrition data'}
                      </div>
                    </div>
                  )}
                  {!searching && searchDone && searchResults.length === 0 && !searchError && (
                    <div className="bg-[#0b1628] border border-[#1a2e48] rounded-xl px-4 py-4 text-center">
                      <div className="text-sm text-gray-400 font-medium">No results found</div>
                      <div className="text-[10px] text-gray-600 mt-1">Try a simpler term — e.g. "rice" instead of "basmati rice pilaf"</div>
                      <button type="button" onClick={() => { const nf = [...loggedFoods, { name: searchQuery.trim(), type: 'custom', calories: 0, protein: 0, carbs: 0, fat: 0 }]; setLoggedFoods(nf); handleSaveLog(nf, true); setSearchQuery(''); setSearchDone(false); setIsCustom(false); }}
                        className="mt-3 text-[10px] text-[#6bff8f] border border-[#6bff8f]/30 px-4 py-1.5 rounded-full hover:bg-[#6bff8f]/10 transition-colors">
                        Add "{searchQuery}" without macros
                      </button>
                    </div>
                  )}
                  {!searching && searchError && (
                    <div className="bg-[#1a0a0a] border border-red-900/40 rounded-xl px-4 py-3 text-center">
                      <div className="text-xs text-red-400"><i className="fa-solid fa-triangle-exclamation mr-1"></i>Search unavailable — check your connection</div>
                      <div className="text-[10px] text-gray-600 mt-1">You can still add food manually by name.</div>
                    </div>
                  )}

                  {/* Serving size + scaled macros — shown immediately after selecting a result */}
                  {selectedNutrition && scaledMacros && (
                    <div className="bg-[#0b1628] border border-[#6bff8f]/30 rounded-xl p-4 space-y-3">
                      <div className="flex items-center justify-between">
                        <span className="text-xs text-white font-bold truncate pr-2">{selectedNutrition.name}</span>
                        <button type="button" onClick={() => { setSelectedNutrition(null); setSearchDone(false); setSearchResults([]); }} className="text-gray-500 hover:text-white text-xs shrink-0">✕ Change</button>
                      </div>

                      {/* Portion quick-select buttons */}
                      <div>
                        <div className="text-[9px] text-gray-400 uppercase tracking-widest font-bold mb-2">Portion size</div>
                        <div className="flex gap-2 flex-wrap mb-2">
                          {[50, 100, 150, 200, 250].map(g => (
                            <button key={g} type="button"
                              onClick={() => setServingGrams(g)}
                              className={`px-3 py-1 rounded-full text-[10px] font-bold border transition-all ${servingGrams === g ? 'bg-[#6bff8f] text-[#003a12] border-[#6bff8f]' : 'bg-transparent text-gray-400 border-white/10 hover:border-[#6bff8f]/40'}`}>
                              {g}g
                            </button>
                          ))}
                          <div className="flex items-center gap-1">
                            <input
                              type="number" min="1" max="5000" value={servingGrams}
                              onChange={e => setServingGrams(Math.max(1, Number(e.target.value) || 100))}
                              className="bg-[#1a1919] border-white/10 text-white text-xs w-16 text-center py-1 rounded-full"
                            />
                            <span className="text-[10px] text-gray-400 font-bold">g</span>
                          </div>
                        </div>
                      </div>

                      {/* Scaled macro tiles */}
                      <div className="grid grid-cols-4 gap-2 text-center">
                        {[['Kcal','calories','text-[#ffc940]'],['Protein','protein','text-[#00cba8]'],['Carbs','carbs','text-[#6ba4ff]'],['Fat','fat','text-[#ff6b6b]']].map(([label, key, color]) => (
                          <div key={key} className="bg-[#1a1919] rounded-xl p-2">
                            <div className={`text-sm font-black ${color}`}>{scaledMacros[key]}</div>
                            <div className="text-[9px] text-gray-500 uppercase tracking-widest mt-0.5">{label}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}
              <button type="submit" disabled={(!isCustom && !selectedAiFood) || (isCustom && !searchQuery.trim())} className="action-btn w-full text-sm py-3 mt-1">Add to Daily Log</button>
            </form>
          </div>

          <div className="space-y-3">
            <h3 className="text-sm font-bold text-gray-400 uppercase tracking-widest pl-2">Logged Today</h3>
            {loggedFoods.map((f, i) => (
              <div key={i} className="bg-[#1a1919] border-l-4 border-l-[#6bff8f] rounded-xl p-4 flex justify-between items-center">
                <div className="flex flex-col">
                  <span className="text-white text-sm font-medium">{f.name}</span>
                  {f.calories > 0 && (
                    <span className="text-[10px] text-gray-500 font-bold uppercase mt-0.5">
                      {f.calories} kcal
                      {f.protein > 0 && <span className="text-[#00cba8]"> · {f.protein}g P</span>}
                      {f.carbs > 0 && <span className="text-[#6ba4ff]"> · {f.carbs}g C</span>}
                      {f.fat > 0 && <span className="text-[#ff6b6b]"> · {f.fat}g F</span>}
                    </span>
                  )}
                </div>
                <button type="button" onClick={() => { const updated = loggedFoods.filter((_, idx) => idx !== i); setLoggedFoods(updated); handleSaveLog(updated, true); }} className="text-red-400 p-2 hover:bg-red-500/10 rounded-lg transition-colors"><i className="fa-solid fa-trash text-xs"></i></button>
              </div>
            ))}
            {loggedFoods.length === 0 && <p className="text-xs text-gray-500 pl-2">Nothing tracked yet.</p>}
          </div>
          
          <div className="flex items-center justify-center gap-2 mt-2">
            {saving
              ? <span className="text-[10px] text-gray-500"><i className="fa-solid fa-spinner fa-spin mr-1"></i>Saving…</span>
              : <button onClick={() => handleSaveLog()} disabled={loggedFoods.length === 0} className="text-[10px] text-gray-600 hover:text-gray-400 transition-colors disabled:opacity-30">
                  <i className="fa-solid fa-rotate mr-1"></i>Force sync
                </button>
            }
          </div>
        </div>
      );
    };

    const ClientWorkoutView = ({ appData, setFlash }) => {
      const [completed, setCompleted] = useState(false);
      const [saving, setSaving] = useState(false);
      const [selectedDayIdx, setSelectedDayIdx] = useState(0);
      
      const planData = getPlanData(appData);
      let daysRaw = planData?.workoutSplit || planData?.workout_plan || planData?.workouts || planData?.routine || [];
      let days = [];
      if (Array.isArray(daysRaw)) {
        days = daysRaw;
      } else if (typeof daysRaw === 'object' && daysRaw !== null) {
        days = Object.entries(daysRaw).map(([k, v]) => ({
          day: k,
          ...(typeof v === 'object' && v !== null && !Array.isArray(v) ? v : { exercises: Array.isArray(v) ? v : [v] })
        }));
      }
      
      const currentDay = days[selectedDayIdx] || null;
      const rawExercises = currentDay?.exercises || currentDay?.workout || currentDay?.movements;
      const exercisesRaw = Array.isArray(rawExercises) ? rawExercises : (rawExercises ? [rawExercises] : []);

      const todayWorkout = exercisesRaw.map((ex, i) => {
        const isObj = typeof ex === 'object' && ex !== null;
        const name = isObj ? (ex.name || ex.exercise || "Unknown Exercise") : String(ex);
        // If the exercise has sets or reps data, it is definitively a strength exercise
        const isCardio = (() => {
          if (isObj && (ex.sets != null || ex.reps != null)) return false;
          // Only match explicit cardio — do NOT match ambiguous words like "row" or "step"
          return /\b(running|jogging|treadmill|sprinting|cycling|stationary bike|cardio session|brisk walk|walking|elliptical|swimming|swim laps|jump rope|skipping rope|stair climber|hiit session|rower machine|air bike|assault bike)\b/i.test(name)
              || /^(cardio|run |jog |walk |swim )/i.test(name);
        })();
        return {
           id: i, name, type: isCardio ? "cardio" : "strength", 
           targetSets: isObj ? (ex.sets || 3) : 3, 
           targetReps: isObj ? (ex.reps || (isCardio ? "N/A" : "10")) : (isCardio ? "N/A" : "10"),
           duration: isObj ? (ex.duration || "") : ""
        };
      });

      const handleSaveLog = async (e) => {
        e.preventDefault();
        setSaving(true);
        const data = Object.fromEntries(new FormData(e.target).entries());
        data.completed = completed;
        data.dayLogged = currentDay?.day || `Day ${selectedDayIdx+1}`;
        try {
          const date = getLocalDate();
          const existingMeals = appData?.dailyLog?.meals_json || {};
          await api(`/api/app/daily-log/${date}`, {
            method: 'PUT', body: JSON.stringify({ meals: existingMeals, workout: data })
          });
          setFlash({ msg: "Workout log saved!" });
        } catch (err) { setFlash({ err: err.message }); }
        setSaving(false);
      };

      if (days.length === 0) return <div className="p-8 text-center text-gray-400 mt-10">No active workout plan found.</div>;

      const warmup = currentDay?.warmup;
      const cooldown = currentDay?.cooldown || currentDay?.stretches;

      return (
        <form onSubmit={handleSaveLog} className="p-5 space-y-6">
          <div>
            <h2 className="text-2xl font-black text-white">Workout Log</h2>
            <div className="inline-block bg-[#6bff8f]/10 text-[#6bff8f] px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mt-3">
              <i className="fa-regular fa-calendar mr-1"></i> {getFormattedDate()}
            </div>
          </div>

          <div className="flex gap-2 overflow-x-auto pb-2 mb-2 scrollbar-hide">
            {days.map((d, i) => (
              <button 
                key={i} type="button" onClick={() => setSelectedDayIdx(i)}
                className={`whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold transition-colors ${selectedDayIdx === i ? 'bg-[#6bff8f] text-[#003a12]' : 'bg-[#1a1919] text-gray-400 border border-white/5'}`}
              >
                {d.day || `Day ${i+1}`}
              </button>
            ))}
          </div>

          {warmup && (
            <div className="bg-[#1a1919] border border-[#ffc940]/20 rounded-2xl p-4">
               <h3 className="text-[#ffc940] text-xs font-bold uppercase tracking-widest mb-2"><i className="fa-solid fa-fire mr-1"></i> Warm-up Routine</h3>
               <p className="text-sm text-gray-300 whitespace-pre-wrap">{Array.isArray(warmup) ? warmup.join(', ') : warmup}</p>
            </div>
          )}

          <div className="space-y-4">
            {todayWorkout.length === 0 ? (
              <p className="text-sm text-gray-500 italic">Rest day or no exercises planned.</p>
            ) : todayWorkout.map((ex) => (
              <div key={ex.id} className="bg-[#1a1919] border border-white/5 rounded-3xl overflow-hidden">
                <div className="bg-[#262626]/50 p-4 border-b border-white/5 flex justify-between items-center">
                  <h3 className="font-bold text-white text-sm pr-2">{ex.name}</h3>
                  <span className="text-[10px] uppercase font-bold text-[#6bff8f] bg-[#6bff8f]/10 px-2 py-1 rounded">
                    {ex.type === 'cardio' ? 'Cardio' : 'Strength'}
                  </span>
                </div>

                            <div className="text-xs text-[#ffc940] mb-2">

                                <li key={j} className="flex justify-between items-center gap-2">
                                  <span>• {name}</span>
                                  {detail && <span className="text-[10px] text-[#00cba8] font-mono shrink-0">{detail}</span>}

                          {day.cooldown && (
                            <div className="text-xs text-[#00cba8] mt-2">
                              <i className="fa-solid fa-wind mr-1"></i>
                              Cool-down: {Array.isArray(day.cooldown) ? day.cooldown.join(' • ') : day.cooldown}
                            </div>
                          )}
                        </div>
                      ))}
                      {ep.periodisation && (
                        <div className="bg-[#0b1628] rounded-xl p-4 border border-white/5">
                          <div className="text-[10px] text-[#ffc940] font-bold uppercase tracking-widest mb-1">Periodisation</div>
                          <p className="text-xs text-gray-300">{ep.periodisation}</p>
                        </div>
                      )}
                      {ep.progressionProtocol && (
                        <div className="bg-[#0b1628] rounded-xl p-4 border border-white/5">
                          <div className="text-[10px] text-[#ffc940] font-bold uppercase tracking-widest mb-1">Progression Protocol</div>
                          <p className="text-xs text-gray-300">{ep.progressionProtocol}</p>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Diet / meal options */}
                  {planViewTab === 'diet' && (
                    <div className="space-y-4">
                      {mealGroups.length === 0 ? (
                        <p className="text-sm text-gray-400">No meal options found in plan.</p>
                      ) : mealGroups.map((mg, i) => (
                        <div key={i} className="bg-[#0b1628] rounded-xl p-4 border border-[#ffc940]/15">
                          <div className="text-sm font-bold text-[#ffc940] mb-3">{mg.meal || mg.name || `Meal ${i+1}`}</div>
                          <div className="space-y-2">
                            {(mg.options || mg.items || []).map((opt, j) => {
                              const label = typeof opt === 'string' ? opt : (opt?.label || opt?.name || opt?.food || '');
                              const macros = typeof opt === 'object' ? [
                                opt.calories && `${opt.calories} kcal`,
                                opt.protein  && `${opt.protein}g P`,
                                opt.carbs    && `${opt.carbs}g C`,
                                (opt.fat||opt.fats) && `${opt.fat||opt.fats}g F`,
                              ].filter(Boolean).join(' · ') : '';
                              return (
                                <div key={j} className="flex justify-between items-start gap-3 py-2 border-b border-white/5 last:border-0">
                                  <span className="text-sm text-gray-200">• {label}</span>
                                  {macros && <span className="text-[10px] text-[#00cba8] font-mono shrink-0">{macros}</span>}

                          </div>

                      {ep.weeklyMealStructure && Array.isArray(ep.weeklyMealStructure) && (

                            {ep.weeklyMealStructure.map((s, i) => <li key={i}>• {s}</li>)}
                          </ul>
                        </div>
                      )}
                      {ep.supplements && ep.supplements.length > 0 && (
                        <div className="bg-[#0b1628] rounded-xl p-4 border border-white/5">
                          <div className="text-[10px] text-[#ffc940] font-bold uppercase tracking-widest mb-2">Supplements</div>
                          <ul className="text-xs text-gray-300 space-y-1">
                            {ep.supplements.map((s, i) => <li key={i}>• {s}</li>)}
                          </ul>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Milestones & cautions */}
                  {(ep.progressMilestones?.length > 0 || ep.cautions?.length > 0) && (
                    <div className="grid grid-cols-2 gap-3 pt-2">
                      {ep.progressMilestones?.length > 0 && (
                        <div className="bg-[#0b1628] rounded-xl p-4 border border-[#6bff8f]/15">
                          <div className="text-[10px] text-[#6bff8f] font-bold uppercase tracking-widest mb-2">Milestones</div>
                          <ul className="text-xs text-gray-300 space-y-1">{ep.progressMilestones.map((m,i) => <li key={i}>• {m}</li>)}</ul>

                        <div className="bg-[#0b1628] rounded-xl p-4 border border-red-500/15">
                          <div className="text-[10px] text-red-400 font-bold uppercase tracking-widest mb-2">Cautions</div>
                          <ul className="text-xs text-gray-300 space-y-1">{ep.cautions.map((c,i) => <li key={i}>⚠ {c}</li>)}</ul>

                    </div>
