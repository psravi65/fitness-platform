<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6bff8f">
  <title>GymLog · Fitness Platform</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        credentials: "include",
        ...options
      });
      const text = await res.text();
      let json = {};
      try { json = text ? JSON.parse(text) : {}; } catch {}
      if (!res.ok) throw new Error(json.error || "Request failed");
      return json;
    }

    const GlobalStyles = () => (
      <style>{`
        :root {
          --bg: #060d18; --surface: #0b1628; --surface-2: #0f1e35;
          --surface-3: #142642; --border: #1a2e48; --border-bright: #243d60;
          --text: #e2eeff; --text-2: #7a9abf; --accent: #6bff8f;
          --radius: 14px; --radius-lg: 20px;
        }
        body {
          background: var(--bg); color: var(--text);
          font-family: 'Plus Jakarta Sans', sans-serif;
          margin: 0; padding: 0; min-height: 100vh;
          background-image:
            radial-gradient(ellipse 60% 40% at 0% 0%, rgba(255,92,40,.07) 0%, transparent 60%),
            radial-gradient(ellipse 50% 40% at 100% 0%, rgba(107,255,143,.03) 0%, transparent 55%);
        }
        .kinetic-gradient { background: linear-gradient(135deg, #6bff8f 0%, #0abc56 100%); }
        .action-btn {
          background: linear-gradient(135deg, var(--accent) 0%, #ff7a40 100%);
          color: #fff; border: none; padding: 12px 20px; border-radius: var(--radius);
          font-weight: 700; cursor: pointer; transition: all 0.2s;
          box-shadow: 0 4px 16px rgba(255,92,40,.28);
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(255,92,40,.4); }
        .action-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
        .ghost-btn {
          background: var(--surface-2); border: 1px solid var(--border-bright);
          color: var(--text); padding: 10px 18px; border-radius: var(--radius);
          font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        input, select, textarea {
          background: var(--surface-2); color: var(--text);
          border: 1px solid var(--border-bright); border-radius: var(--radius);
          padding: 12px 16px; width: 100%; outline: none; transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
      `}</style>
    );

    const FlashMessage = ({ error, message }) => {
      if (!error && !message) return null;
      return (
        <div className={`p-4 rounded-xl flex items-center gap-3 mb-6 ${error ? 'bg-red-500/10 border border-red-500/30 text-red-400' : 'bg-green-500/10 border border-green-500/30 text-green-400'}`}>
          <i className={`fa-solid ${error ? 'fa-triangle-exclamation' : 'fa-circle-check'} text-lg`}></i>
          <span className="text-sm font-medium">{error || message}</span>
        </div>
      );
    };

    // --- Login View ---
    const LoginView = ({ setMe, setFlash }) => {
      const [isBootstrap, setIsBootstrap] = useState(false);
      useEffect(() => { api('/api/bootstrap-admin-check').then(res => setIsBootstrap(res.needsAdminBootstrap)).catch(() => {}); }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        try {
          const res = await api('/api/auth/login', {
            method: 'POST', body: JSON.stringify({ username: e.target.username.value, password: e.target.password.value })
          });
          setMe(res.user);
          setFlash({ msg: "Logged in successfully." });
        } catch (err) { setFlash({ err: err.message }); }
      };

      const handleBootstrap = async (e) => {
        e.preventDefault();
        try {
          await api('/api/bootstrap-admin', {
            method: 'POST',
            body: JSON.stringify({
              username: e.target.username.value,
              password: e.target.password.value,
              superadmin: e.target.superadmin.checked
            })
          });
          setFlash({ msg: "Account created. You can log in now." });
          setIsBootstrap(false);
        } catch (err) {
          setFlash({ err: err.message });
        }
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6">
          <div className="w-full max-w-md">
            <div className="text-center mb-10">
              <div className="inline-flex items-center justify-center w-20 h-20 kinetic-gradient rounded-2xl shadow-[0_0_40px_rgba(107,255,143,0.3)] mb-6">
                <i className="fa-solid fa-dumbbell text-4xl text-[#003a12]"></i>
              </div>
              <h1 className="text-3xl font-black text-white tracking-tight mb-2">GYMLOG</h1>
            </div>
            <div className="bg-[#1a1919] border border-[#6bff8f]/20 rounded-3xl p-8 shadow-2xl">
              <h2 className="text-xl font-bold text-white mb-2">Access Code</h2>
              <p className="text-xs text-gray-400 mb-8">Enter your login details below.</p>
              <form onSubmit={handleLogin} className="flex flex-col gap-5">
                <input name="username" placeholder="Username" required className="bg-[#262626] border-[#6bff8f]/20 text-white" />
                <input type="password" name="password" placeholder="Password" required className="bg-[#262626] border-[#6bff8f]/20 text-white" />
                <button type="submit" className="action-btn w-full mt-2">Unlock My Plan <i className="fa-solid fa-arrow-right ml-2"></i></button>
              </form>

              {isBootstrap && (
                <div className="mt-8 pt-8 border-t border-gray-800">
                  <h3 className="text-lg font-bold text-white mb-2">First Time Setup</h3>
                  <p className="text-xs text-gray-400 mb-6">Create the app owner account.</p>
                  <form onSubmit={handleBootstrap} className="flex flex-col gap-4">
                    <input name="username" placeholder="Admin Username" required className="bg-[#262626] text-white text-sm py-2 px-3" />
                    <input type="password" name="password" placeholder="Secure Password" required className="bg-[#262626] text-white text-sm py-2 px-3" />
                    <label className="flex items-center gap-3 text-sm text-gray-300">
                      <input type="checkbox" name="superadmin" className="w-4 h-4" /> I am the app owner
                    </label>
                    <button type="submit" className="ghost-btn w-full text-sm">Create Platform Account</button>
                  </form>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --- Client Views ---
    const ClientDashboard = ({ appData }) => {
      const { client, plan } = appData || {};
      return (
        <div className="p-5 space-y-6">
          <section>
            <h2 className="text-2xl font-black text-white">Hello, {client?.full_name?.split(' ')[0] || 'there'} 💪</h2>
            <p className="text-sm text-gray-400 mt-1">Ready for today's session?</p>
          </section>
          <section className="bg-[#1a1919] border border-white/5 rounded-3xl p-6">
            <div className="flex justify-between items-center mb-4">
              <h4 className="text-lg font-bold text-white">Daily Fuel</h4>
              <i className="fa-solid fa-fire text-[#ffc940]"></i>
            </div>
            <div>
              <div className="flex justify-between text-xs mb-2">
                <span className="text-gray-400 font-bold">CALORIES</span>
                <span className="font-bold text-white">0 / {plan?.effectivePlan?.calorieTarget || 'N/A'} kcal</span>
              </div>
              <div className="h-2 bg-[#262626] rounded-full overflow-hidden">
                <div className="h-full w-[15%] kinetic-gradient rounded-full"></div>
              </div>
            </div>
          </section>
        </div>
      );
    };

    const ClientDietView = () => {
      const [customFood, setCustomFood] = useState("");
      const [loggedFoods, setLoggedFoods] = useState([]);

      const handleAddCustom = (e) => {
        e.preventDefault();
        if(!customFood.trim()) return;
        setLoggedFoods([...loggedFoods, { name: customFood, type: 'custom' }]);
        setCustomFood("");
      };

      return (
        <div className="p-5 space-y-6">
          <div>
            <h2 className="text-2xl font-black text-white">Diet Log</h2>
            <p className="text-sm text-gray-400 mt-1">Track your meals and macros.</p>
          </div>

          <div className="bg-[#1a1919] border border-white/5 rounded-3xl p-6 space-y-4">
            <h3 className="font-bold text-white mb-2"><i className="fa-solid fa-plus text-[#6bff8f] mr-2"></i> Add Custom Food</h3>
            <form onSubmit={handleAddCustom} className="flex gap-2">
              <input 
                value={customFood}
                onChange={e => setCustomFood(e.target.value)}
                placeholder="e.g. 1 Apple, 2 slices of pizza..." 
                className="bg-[#262626] border-white/10 text-white text-sm"
              />
              <button type="submit" className="bg-[#6bff8f] text-[#003a12] font-bold px-4 rounded-xl text-sm transition-transform hover:scale-105">Add</button>
            </form>
          </div>

          <div className="space-y-3">
            <h3 className="text-sm font-bold text-gray-400 uppercase tracking-widest pl-2">Today's Log</h3>
            {loggedFoods.length === 0 ? (
              <div className="bg-[#1a1919] border border-white/5 rounded-2xl p-6 text-center text-sm text-gray-500">
                No food logged yet.
              </div>
            ) : (
              loggedFoods.map((f, i) => (
                <div key={i} className="bg-[#1a1919] border border-[#6bff8f]/20 border-l-4 border-l-[#6bff8f] rounded-xl p-4 flex justify-between items-center">
                  <span className="text-white text-sm font-medium">{f.name}</span>
                  <button onClick={() => setLoggedFoods(loggedFoods.filter((_, idx) => idx !== i))} className="text-red-400 hover:text-red-300">
                    <i className="fa-solid fa-trash text-xs"></i>
                  </button>
                </div>
              ))
            )}
          </div>

          <button className="action-btn w-full mt-4">Save Diet Log</button>
        </div>
      );
    };

    const ClientWorkoutView = () => {
      const todayWorkout = [
        { id: 1, name: "Barbell Squats", type: "strength", targetSets: 3, targetReps: "8-10" },
        { id: 2, name: "Dumbbell Lunges", type: "strength", targetSets: 3, targetReps: "12 / leg" },
        { id: 3, name: "Treadmill Sprints", type: "cardio", duration: "15 mins" }
      ];

      return (
        <div className="p-5 space-y-6">
          <div>
            <h2 className="text-2xl font-black text-white">Today's Workout</h2>
            <p className="text-sm text-gray-400 mt-1">Lower Body & Cardio</p>
          </div>

          <div className="space-y-4">
            {todayWorkout.map((ex) => {
              const isCardio = ex.type === 'cardio';
              return (
                <div key={ex.id} className="bg-[#1a1919] border border-white/5 rounded-3xl overflow-hidden">
                  <div className="bg-[#262626]/50 p-4 border-b border-white/5 flex justify-between items-center">
                    <h3 className="font-bold text-white text-sm">{ex.name}</h3>
                    <span className="text-[10px] uppercase font-bold text-[#6bff8f] bg-[#6bff8f]/10 px-2 py-1 rounded">
                      {isCardio ? 'Cardio' : 'Strength'}
                    </span>
                  </div>
                  
                  <div className="p-4">
                    {isCardio ? (
                      <div className="flex gap-4 items-end">
                        <div className="flex-1">
                          <label className="text-[10px] text-gray-400 font-bold uppercase block mb-1">Duration (Minutes)</label>
                          <input type="number" placeholder="e.g. 15" className="bg-[#0b1628] text-white text-sm border-white/10" />
                        </div>
                        <div className="flex-1">
                          <label className="text-[10px] text-gray-400 font-bold uppercase block mb-1">Notes</label>
                          <input type="text" placeholder="Intensity/Speed" className="bg-[#0b1628] text-white text-sm border-white/10" />
                        </div>
                      </div>
                    ) : (
                      <div className="space-y-3">
                        <div className="flex justify-between text-xs text-gray-400 mb-2 px-1">
                          <span>Target: {ex.targetSets} sets × {ex.targetReps}</span>
                        </div>
                        {Array.from({ length: ex.targetSets }).map((_, i) => (
                          <div key={i} className="flex gap-3 items-center">
                            <span className="text-gray-500 font-mono text-xs w-10">Set {i+1}</span>
                            <div className="flex-1 relative">
                              <input type="number" placeholder="Weight" className="bg-[#0b1628] text-white text-sm border-white/10 pl-2 pr-8" />
                              <span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-500">kg</span>
                            </div>
                            <div className="flex-1">
                              <input type="number" placeholder="Actual Reps" className="bg-[#0b1628] text-white text-sm border-white/10 pl-2" />
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          <div className="bg-[#1a1919] border border-white/5 rounded-3xl p-6">
            <label className="flex items-center gap-4 cursor-pointer">
              <input type="checkbox" className="w-5 h-5 accent-[#6bff8f]" />
              <span className="text-sm font-bold text-white">Mark workout as fully completed</span>
            </label>
          </div>

          <button className="action-btn w-full">Submit Workout Log</button>
        </div>
      );
    };

    const ClientShell = ({ me, setMe }) => {
      const [activeTab, setActiveTab] = useState('home');
      const [appData, setAppData] = useState(null);

      useEffect(() => {
        api('/api/app/bootstrap').then(res => setAppData(res)).catch(() => {});
      }, []);

      return (
        <div className="max-w-md mx-auto min-h-screen bg-[#0e0e0e] pb-24">
          <header className="sticky top-0 z-40 bg-[#0d0d0d]/90 backdrop-blur-md border-b border-[#6bff8f]/10 p-4 flex justify-between items-center">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 kinetic-gradient rounded-xl flex items-center justify-center shadow-lg">🔥</div>
              <div>
                <div className="text-[9px] text-[#6bff8f] font-bold uppercase tracking-widest">{me.username}</div>
                <div className="text-lg font-black text-white leading-none">GymLog</div>
              </div>
            </div>
            <button onClick={() => { api('/api/auth/logout', { method: 'POST' }).then(() => setMe(null)) }} className="text-xs text-gray-400 border border-gray-800 px-3 py-1.5 rounded-lg hover:text-white transition-colors">Sign Out</button>
          </header>

          <main>
            {activeTab === 'home' && <ClientDashboard appData={appData} />}
            {activeTab === 'diet' && <ClientDietView appData={appData} />}
            {activeTab === 'workout' && <ClientWorkoutView appData={appData} />}
          </main>

          <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-[#131313]/90 backdrop-blur-xl border-t border-white/5 rounded-t-[20px] p-2 flex z-50">
            {[
              { id: 'home', icon: 'fa-bolt', label: 'Home' },
              { id: 'diet', icon: 'fa-utensils', label: 'Diet' },
              { id: 'workout', icon: 'fa-dumbbell', label: 'Workout' }
            ].map(tab => (
              <button 
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`flex-1 flex flex-col items-center gap-1 p-2 rounded-xl transition-all ${activeTab === tab.id ? 'text-[#6bff8f] bg-[#1a1919]' : 'text-gray-500 hover:text-gray-300'}`}
              >
                <i className={`fa-solid ${tab.icon} text-lg`}></i>
                <span className="text-[9px] font-bold uppercase tracking-widest">{tab.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    };

    // --- Admin Views ---
    const AdminRoster = ({ clients, onOpenClient, onAddClient }) => {
      const [showModal, setShowModal] = useState(false);
      const [saving, setSaving] = useState(false);

      const handleAdd = async (e) => {
        e.preventDefault();
        setSaving(true);
        try {
          await onAddClient({
            fullName: e.target.fullName.value,
            username: e.target.username.value,
            email: e.target.email.value
          });
          setShowModal(false);
        } catch (err) { alert(err.message); }
        setSaving(false);
      };

      return (
        <div className="card relative">
          <div className="flex justify-between items-center mb-6">
            <div>
              <h2 className="text-xl font-bold text-white">Client Roster</h2>
              <p className="text-sm text-gray-400">Manage your clients.</p>
            </div>
            <button onClick={() => setShowModal(true)} className="action-btn text-sm py-2 px-4">+ Add Client</button>
          </div>
          <div className="overflow-hidden rounded-xl border border-[#1a2e48]">
            <table className="w-full text-left text-sm">
              <thead className="bg-[#142642] text-[#7a9abf] text-[10px] uppercase tracking-widest font-semibold">
                <tr><th className="p-4">Client</th><th className="p-4">Status</th><th className="p-4"></th></tr>
              </thead>
              <tbody className="divide-y divide-[#1a2e48]">
                {clients.length === 0 ? <tr><td colSpan="3" className="p-8 text-center text-gray-400">No clients yet.</td></tr> : clients.map(c => (
                  <tr key={c.id} className="hover:bg-[#142642] transition-colors">
                    <td className="p-4"><div className="font-bold text-white">{c.full_name}</div><div className="text-xs text-gray-500 font-mono mt-1">@{c.username}</div></td>
                    <td className="p-4"><span className="bg-[#00cba8]/10 text-[#00cba8] border border-[#00cba8]/30 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">{c.status}</span></td>
                    <td className="p-4 text-right"><button onClick={() => onOpenClient(c)} className="text-xs font-semibold text-[#6bff8f] hover:text-white transition-colors">Open <i className="fa-solid fa-arrow-right ml-1"></i></button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {showModal && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-[#0b1628] border border-[#1a2e48] p-6 rounded-2xl w-full max-w-md">
                <h3 className="text-lg font-bold text-white mb-4">Add New Client</h3>
                <form onSubmit={handleAdd} className="flex flex-col gap-4">
                  <label><span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Full Name</span><input name="fullName" required placeholder="e.g. Jane Doe" className="bg-[#0f1e35] border-[#1a2e48] text-white" /></label>
                  <label><span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Username</span><input name="username" required placeholder="e.g. janedoe123" className="bg-[#0f1e35] border-[#1a2e48] text-white" /></label>
                  <label><span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Email</span><input type="email" name="email" required placeholder="e.g. client@email.com" className="bg-[#0f1e35] border-[#1a2e48] text-white" /></label>
                  <div className="flex justify-end gap-3 mt-4"><button type="button" onClick={() => setShowModal(false)} className="ghost-btn">Cancel</button><button type="submit" disabled={saving} className="action-btn">{saving ? 'Adding...' : 'Create'}</button></div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    const AdminClientDetail = ({ client, onBack, setFlash }) => {
      const [details, setDetails] = useState(null);
      const [generatingPlan, setGeneratingPlan] = useState(false);

      const fetchDetails = async () => {
        try { const res = await api(`/api/admin/clients/${client.id}`); setDetails(res); } catch (err) { setFlash({ err: "Failed to load details." }); }
      };

      useEffect(() => { fetchDetails(); }, [client.id]);

      const handleGeneratePlan = async () => {
        setGeneratingPlan(true);
        setFlash({ msg: "Initializing AI Agents..." });
        try {
          await api('/api/admin/plans/generate', { method: 'POST', body: JSON.stringify({ client_id: client.id }) });
          setFlash({ msg: "AI Plan generated!" }); fetchDetails();
        } catch (err) { setFlash({ err: err.message }); }
        setGeneratingPlan(false);
      };

      const handlePublishPlan = async (planId) => {
        try {
          await api(`/api/admin/plans/${planId}/publish`, { method: 'POST' });
          setFlash({ msg: "Plan published to client!" });
          fetchDetails();
        } catch (err) {
          setFlash({ err: err.message });
        }
      };

      if (!details) return <div className="text-center p-10"><i className="fa-solid fa-spinner fa-spin text-3xl text-[#6bff8f]"></i></div>;

      return (
        <div className="space-y-6">
          <button onClick={onBack} className="text-xs text-[#7a9abf] hover:text-white flex items-center gap-2 mb-4"><i className="fa-solid fa-arrow-left"></i> Back</button>
          <div className="card flex justify-between items-center">
            <div><h2 className="text-2xl font-black text-white">{client.full_name}</h2><p className="text-sm text-[#7a9abf] font-mono">@{client.username}</p></div>
            <div className="text-right"><div className="text-[10px] text-gray-400 uppercase tracking-widest">Status</div><div className="text-[#00cba8] font-bold text-sm">{client.status}</div></div>
          </div>
          <div className="grid md:grid-cols-2 gap-6">
            <div className="card">
              <h3 className="text-lg font-bold text-white mb-4"><i className="fa-solid fa-brain text-[#ffc940] mr-2"></i> Coaching Plan</h3>
              {!details.plan ? (
                <div className="text-center py-6">
                  <p className="text-sm text-gray-400 mb-4">No plan exists.</p>
                  <button onClick={handleGeneratePlan} disabled={!details.intake || generatingPlan} className="action-btn w-full">{generatingPlan ? 'Generating...' : 'Generate AI Plan'}</button>
                </div>
              ) : (
                <div className="space-y-4">
                  <div className="flex justify-between items-center bg-[#0b1628] p-3 rounded-lg border border-[#1a2e48]">
                    <span className="text-xs font-bold text-gray-400 uppercase">Status</span>
                    <span className={`text-xs font-bold px-2 py-1 rounded ${details.plan.status === 'published' ? 'bg-[#00cba8]/20 text-[#00cba8]' : 'bg-[#ffc940]/20 text-[#ffc940]'}`}>
                      {details.plan.status}
                    </span>
                  </div>
                  <p className="text-xs text-gray-400 mb-2">Plan Details (Raw JSON):</p>
                  <div className="bg-[#0b1628] border border-[#1a2e48] p-3 rounded-lg text-xs font-mono text-gray-300 max-h-[300px] overflow-y-auto whitespace-pre-wrap">
                    {JSON.stringify(details.plan.generated_json, null, 2)}
                  </div>
                  {details.plan.status === 'draft' && (
                    <button onClick={() => handlePublishPlan(details.plan.id)} className="action-btn w-full mt-2">
                      <i className="fa-solid fa-paper-plane mr-2"></i> Publish Plan to Client
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const AdminShell = ({ me, setMe, setFlash }) => {
      const [clients, setClients] = useState([]);
      const [activeClient, setActiveClient] = useState(null);

      const fetchClients = async () => {
        try { const res = await api('/api/admin/clients'); setClients(res.clients || []); } catch (err) { setFlash({ err: "Failed to load clients." }); }
      };

      useEffect(() => { fetchClients(); }, []);

      const handleAddClient = async (data) => {
        await api('/api/admin/clients', { method: 'POST', body: JSON.stringify(data) });
        setFlash({ msg: "Client added! Email sent." }); fetchClients();
      };

      return (
        <div className="max-w-7xl mx-auto p-6 lg:p-10">
          <div className="flex justify-between items-center mb-10">
            <h1 className="text-3xl font-black text-white">Coach Dashboard</h1>
            <button onClick={() => { api('/api/auth/logout', { method: 'POST' }).then(() => setMe(null)) }} className="ghost-btn text-sm">Sign Out</button>
          </div>
          <div className="grid lg:grid-cols-[240px_1fr] gap-8">
            <aside className="bg-gradient-to-b from-[#0b1628] to-[#0b1628]/90 border border-[#1a2e48] rounded-2xl p-4 h-fit">
              <nav className="flex flex-col gap-1">
                <button onClick={() => setActiveClient(null)} className={`flex items-center gap-3 w-full p-3 rounded-xl text-sm font-semibold text-left ${!activeClient ? 'text-[#6bff8f] bg-[#6bff8f]/10 border border-[#6bff8f]/30' : 'text-[#7a9abf] hover:bg-[#142642] hover:text-white'}`}>
                  <i className="fa-solid fa-user"></i> Clients
                </button>
              </nav>
            </aside>
            <main>
              {!activeClient ? <AdminRoster clients={clients} onOpenClient={setActiveClient} onAddClient={handleAddClient} /> : <AdminClientDetail client={activeClient} onBack={() => setActiveClient(null)} setFlash={setFlash} />}
            </main>
          </div>
        </div>
      );
    };

    // --- Main App Entry ---
    function App() {
      const [me, setMe] = useState(undefined);
      const [flash, setFlash] = useState({ err: '', msg: '' });

      useEffect(() => {
        if (flash.err || flash.msg) {
          const timer = setTimeout(() => setFlash({ err: '', msg: '' }), 5000);
          return () => clearTimeout(timer);
        }
      }, [flash]);

      useEffect(() => {
        api('/api/me').then(res => setMe(res.user)).catch(() => setMe(null));
      }, []);

      if (me === undefined) return <div className="min-h-screen bg-[#060d18] flex items-center justify-center"><i className="fa-solid fa-spinner fa-spin text-4xl text-[#6bff8f]"></i></div>;

      return (
        <React.Fragment>
          <GlobalStyles />
          <div className="fixed top-4 right-4 z-[9999] w-full max-w-sm px-4">
            <FlashMessage error={flash.err} message={flash.msg} />
          </div>
          {!me ? <LoginView setMe={setMe} setFlash={setFlash} /> : me.role === 'client' ? <ClientShell me={me} setMe={setMe} /> : <AdminShell me={me} setMe={setMe} setFlash={setFlash} />}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
