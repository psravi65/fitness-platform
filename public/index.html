<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitness Platform</title>
  <style>
    :root{
      --bg:#08111f;
      --panel:#13233b;
      --panel-soft:#0e1b2d;
      --line:#243856;
      --text:#eef4ff;
      --muted:#8ea2c7;
      --orange:#ff9350;
      --teal:#37d6c7;
      --lime:#91db5d;
      --red:#ff6b6b;
      --gold:#ffd166;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,147,80,.14), transparent 26%),
        radial-gradient(circle at top right, rgba(55,214,199,.12), transparent 24%),
        linear-gradient(180deg,#08111f 0%,#0c1526 100%);
    }
    a{color:inherit}
    button,input,select,textarea{font:inherit}
    .app-shell{max-width:1200px;margin:0 auto;padding:24px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px}
    .brand h1{font-size:32px;line-height:1}
    .brand p{color:var(--muted);margin-top:8px}
    .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .badge{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:rgba(55,214,199,.08);border:1px solid rgba(55,214,199,.3);color:var(--teal);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    .layout{display:grid;grid-template-columns:260px 1fr;gap:20px}
    .sidebar,.panel{background:linear-gradient(180deg, rgba(19,35,59,.96), rgba(12,21,38,.96));border:1px solid var(--line);border-radius:22px;box-shadow:0 22px 48px rgba(0,0,0,.24)}
    .sidebar{padding:18px;align-self:start;position:sticky;top:24px}
    .sidebar nav{display:grid;gap:8px;margin-top:14px}
    .nav-btn,.action-btn,.ghost-btn{border:none;border-radius:14px;padding:12px 14px;cursor:pointer;text-align:left}
    .nav-btn{background:transparent;color:var(--muted);font-weight:700}
    .nav-btn.active{background:rgba(255,147,80,.12);color:var(--orange);border:1px solid rgba(255,147,80,.25)}
    .panel{padding:20px}
    .panel h2{font-size:24px;margin-bottom:8px}
    .subtle{color:var(--muted)}
    .grid{display:grid;gap:16px}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .card{background:var(--panel-soft);border:1px solid var(--line);border-radius:18px;padding:16px}
    .stat{font-size:28px;font-weight:900;margin-top:6px}
    label{display:block}
    label span{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
    input,select,textarea{width:100%;background:#0c1628;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px 13px;outline:none}
    textarea{min-height:110px;resize:vertical}
    .action-btn{background:linear-gradient(90deg,var(--orange),#ffb06c);color:#09101d;font-weight:900}
    .ghost-btn{background:transparent;border:1px solid var(--line);color:var(--text);font-weight:700}
    .danger{background:linear-gradient(90deg,#ff6b6b,#ff9a7d);color:#190707}
    .success{color:var(--lime)}
    .notice{padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#0c1628}
    .notice.success{background:rgba(145,219,93,.08);border-color:rgba(145,219,93,.28)}
    .notice.warning{background:rgba(255,209,102,.08);border-color:rgba(255,209,102,.28);color:#ffe5a5}
    .error{color:var(--red)}
    .table{width:100%;border-collapse:collapse}
    .table th,.table td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
    .table th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:800}
    .pill.draft{background:rgba(255,209,102,.12);color:var(--gold)}
    .pill.published{background:rgba(145,219,93,.12);color:var(--lime)}
    .pill.active{background:rgba(55,214,199,.12);color:var(--teal)}
    .pill.alert{background:rgba(255,107,107,.12);color:var(--red)}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
    .inline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .split{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
    .hide{display:none!important}
    .empty{padding:32px 18px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px}
    pre{white-space:pre-wrap;word-break:break-word;background:#0b1424;border:1px solid var(--line);padding:14px;border-radius:14px;color:#d8e8ff}
    .plan-section{display:grid;gap:10px}
    .plan-list{display:grid;gap:8px}
    .plan-list div{background:#0c1628;border:1px solid var(--line);border-radius:12px;padding:10px 12px}
    .login-wrap{max-width:460px;margin:8vh auto 0}
    .footer-note{font-size:12px;color:var(--muted)}
    .client-shell{display:grid;gap:18px}
    .hero{padding:20px;border-radius:22px;background:linear-gradient(135deg, rgba(255,147,80,.18), rgba(55,214,199,.12));border:1px solid rgba(255,255,255,.08)}
    .hero h2{margin-bottom:6px}
    .cta-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .segmented{display:grid;gap:10px}
    .mobile-only{display:none}
    .client-app{max-width:480px;margin:0 auto;min-height:100vh;background:#0d1117;color:#c8d0e8;padding-bottom:78px}
    .client-header{position:sticky;top:0;z-index:40;background:#0d1117;border-bottom:1px solid #1e2a3a;padding:12px 16px}
    .client-header-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .client-kicker{font-size:9px;color:var(--orange);letter-spacing:2px;text-transform:uppercase;font-family:ui-monospace,monospace}
    .client-title{font-size:22px;font-weight:800;color:#f0f4ff}
    .client-subtitle{font-size:10px;color:#6b7a99;font-family:ui-monospace,monospace}
    .client-chip{display:inline-flex;align-items:center;gap:6px;margin-top:4px;background:#111827;border:1px solid rgba(55,214,199,.2);border-radius:999px;padding:4px 10px;font-size:10px;color:var(--teal);font-family:ui-monospace,monospace}
    .client-main{padding:12px}
    .client-panel{background:#111827;border:1px solid #1e2a3a;border-radius:14px;padding:14px}
    .client-stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .client-stat-card{background:#111827;border-radius:10px;padding:10px 8px;text-align:center;border:1px solid #1e2a3a}
    .client-stat-value{font-size:16px;font-weight:800;font-family:ui-monospace,monospace}
    .client-stat-label{font-size:8px;color:#6b7a99;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
    .client-list{display:grid;gap:8px}
    .client-list-item{background:#0d1117;border:1px solid #1e2a3a;border-radius:12px;padding:10px 12px}
    .bottom-tabs{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;background:#080c12;border-top:1px solid #1e2a3a;display:flex;z-index:50}
    .bottom-tab{flex:1;border:none;background:transparent;padding:8px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent;color:#3a4560}
    .bottom-tab.active{border-top-color:var(--orange);color:var(--orange)}
    .bottom-tab-icon{font-size:15px}
    .bottom-tab-label{font-size:8px;text-transform:uppercase;letter-spacing:.07em;font-family:ui-monospace,monospace}
    @media (max-width: 900px){
      .layout,.split,.grid.cols-2,.grid.cols-3{grid-template-columns:1fr}
      .sidebar{position:static}
      .app-shell{padding:14px}
      .panel{padding:16px}
      .brand h1{font-size:24px}
      .cta-grid{grid-template-columns:1fr}
      .mobile-only{display:block}
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const state = {
      me: null,
      route: window.location.pathname,
      clients: [],
      selectedClient: null,
      adminClientDetail: null,
      appData: null,
      loading: false,
      message: "",
      error: "",
      draftPassword: "",
      pendingPlanEdit: null,
      needsAdminBootstrap: false,
      autoSaveStatus: ""
    };
    let dailyLogAutoSaveTimer = null;
    let dayRolloverTimer = null;

    const intakeSections = [
      { key: "profile", title: "Profile", fields: [
        ["fullName", "Full name"], ["age", "Age"], ["heightCm", "Height (cm)"], ["weightKg", "Weight (kg)"], ["sex", "Sex"], ["location", "Location"]
      ]},
      { key: "bodyComposition", title: "Body Composition", fields: [
        ["bodyFat", "Body fat %"], ["targetBodyFat", "Target body fat %"], ["goalType", "Goal type"]
      ]},
      { key: "training", title: "Training", fields: [
        ["daysPerWeek", "Days / week"], ["sessionDuration", "Session duration"], ["trainingTime", "Training time"], ["gymAccess", "Gym access"], ["cardioPreference", "Cardio preference"]
      ]},
      { key: "injuriesMedical", title: "Injuries & Medical", fields: [
        ["injuries", "Injuries"], ["rehabConstraints", "Rehab constraints"], ["medications", "Medications"], ["supplements", "Supplements"]
      ]},
      { key: "diet", title: "Diet", fields: [
        ["dietStyle", "Diet style"], ["cuisineStyle", "Cuisine style"], ["mealsPerDay", "Meals / day"], ["allergies", "Allergies"], ["preferences", "Preferences"]
      ]},
      { key: "lifestyle", title: "Lifestyle", fields: [
        ["sleepHours", "Sleep hours"], ["activityLevel", "Activity level"], ["workPattern", "Work pattern"]
      ]},
      { key: "notes", title: "Notes", fields: [
        ["coachNotes", "Notes"]
      ]}
    ];

    function setRoute(path){
      state.route = path;
      history.pushState({}, "", path);
      render();
      void bootstrapForRoute();
    }

    window.addEventListener("popstate", () => {
      state.route = window.location.pathname;
      render();
      void bootstrapForRoute();
    });

    function el(strings, ...values){
      return strings.reduce((acc, str, i) => acc + str + (values[i] ?? ""), "");
    }

    async function api(path, options = {}){
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        credentials: "include",
        ...options
      });
      const text = await res.text();
      let json = {};
      try { json = text ? JSON.parse(text) : {}; } catch {}
      if(!res.ok){
        throw new Error(json.error || "Request failed");
      }
      return json;
    }

    function setFlash(message, isError = false){
      state.message = isError ? "" : message;
      state.error = isError ? message : "";
      render();
    }

    function updateAutoSaveStatus(text){
      state.autoSaveStatus = text;
      const node = document.getElementById("autosave-status");
      if(node) node.textContent = text;
    }

    function requireAuth(role){
      if(!state.me){
        setRoute("/login");
        return false;
      }
      if(role && state.me.role !== role){
        setRoute(state.me.role === "admin" ? "/admin" : "/app");
        return false;
      }
      return true;
    }

    async function bootstrap(){
      try{
        const res = await api("/api/me", { method: "GET", headers: {} });
        state.me = res.user;
        if(!state.me){
          const bootstrap = await api("/api/bootstrap-admin-check", { method: "GET", headers: {} });
          state.needsAdminBootstrap = !!bootstrap.needsAdminBootstrap;
        } else {
          state.needsAdminBootstrap = false;
        }
      }catch{
        state.me = null;
        try{
          const bootstrap = await api("/api/bootstrap-admin-check", { method: "GET", headers: {} });
          state.needsAdminBootstrap = !!bootstrap.needsAdminBootstrap;
        }catch{}
      }
      render();
      await bootstrapForRoute();
    }

    async function bootstrapForRoute(){
      const path = state.route;
      if(path === "/login") return;
      if(state.me?.mustChangePassword) return;
      if(path.startsWith("/admin")){
        if(!requireAuth("admin")) return;
        state.clients = (await api("/api/admin/clients", { method: "GET", headers: {} })).clients;
        const match = path.match(/^\/admin\/clients\/([^/]+)$/);
        if(match){
          state.adminClientDetail = await api("/api/admin/clients/" + match[1], { method: "GET", headers: {} });
          state.pendingPlanEdit = normalizeEditablePlan(state.adminClientDetail.plan?.effectivePlan || state.adminClientDetail.plan?.generated_json || {});
        } else {
          state.adminClientDetail = null;
        }
      } else if(path.startsWith("/app")){
        if(!requireAuth("client")) return;
        state.appData = await api("/api/app/bootstrap", { method: "GET", headers: {} });
      } else {
        if(state.me){
          setRoute(state.me.role === "admin" ? "/admin" : "/app");
          return;
        }
        setRoute("/login");
        return;
      }
      render();
    }

    async function handleLogin(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      try{
        const res = await api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            username: form.get("username"),
            password: form.get("password")
          })
        });
        state.me = res.user;
        setFlash("Logged in.");
        setRoute(state.me.mustChangePassword ? "/app/password" : (state.me.role === "admin" ? "/admin" : "/app"));
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function bootstrapAdmin(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      try{
        await api("/api/bootstrap-admin", {
          method: "POST",
          body: JSON.stringify({
            username: form.get("username"),
            password: form.get("password")
          })
        });
        setFlash("Admin created. You can log in now.");
        state.needsAdminBootstrap = false;
        render();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function logout(){
      await api("/api/auth/logout", { method: "POST", body: "{}" });
      state.me = null;
      state.clients = [];
      state.adminClientDetail = null;
      state.appData = null;
      setRoute("/login");
    }

    async function createClient(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      try{
        const res = await api("/api/admin/clients", {
          method: "POST",
          body: JSON.stringify({
            fullName: form.get("fullName"),
            username: form.get("username")
          })
        });
        state.draftPassword = res.temporaryPassword;
        setFlash("Client created. Save the temporary password now.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function resetPassword(clientId){
      try{
        const res = await api("/api/admin/clients/" + clientId + "/reset-password", {
          method: "POST",
          body: "{}"
        });
        state.draftPassword = res.temporaryPassword;
        setFlash("Temporary password reset. Save it now.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function saveIntake(ev, clientId){
      ev.preventDefault();
      const form = new FormData(ev.target);
      const payload = {};
      for (const section of intakeSections){
        payload[section.key] = {};
        for (const [field] of section.fields){
          payload[section.key][field] = form.get(section.key + "." + field) || "";
        }
      }
      try{
        if(clientId){
          await api("/api/clients/" + clientId + "/intake", { method: "POST", body: JSON.stringify({ answers: payload, complete: true }) });
        } else {
          await api("/api/app/intake", { method: "POST", body: JSON.stringify({ answers: payload, complete: true }) });
        }
        setFlash("Intake saved.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function generatePlan(clientId){
      try{
        await api("/api/admin/clients/" + clientId + "/generate-plan", { method: "POST", body: "{}" });
        setFlash("Plan draft generated.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function savePlanEdits(clientId){
      try{
        const edited = collectPlanEditForm();
        await api("/api/admin/clients/" + clientId + "/plan", {
          method: "PATCH",
          body: JSON.stringify({ editedPlan: edited })
        });
        setFlash("Plan edits saved.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message || "Plan edits could not be saved.", true);
      }
    }

    async function publishPlan(clientId, publish){
      try{
        await api("/api/admin/clients/" + clientId + "/publish-plan", {
          method: "POST",
          body: JSON.stringify({ publish })
        });
        setFlash(publish ? "Plan published." : "Plan unpublished.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    function currentDailyPayload(date){
      const current = state.appData?.dailyLog || {};
      return {
        log_date: date || current.log_date || new Date().toISOString().slice(0, 10),
        meals_json: current.meals_json || {},
        workout_json: current.workout_json || {},
        macros_json: current.macros_json || {},
        hydration: Number(current.hydration || 0),
        steps: Number(current.steps || 0),
        cardio: current.cardio || "",
        notes: current.notes || ""
      };
    }

    async function persistDailyLog(date, next, showFlash, successMessage){
      try{
        await api("/api/app/daily-log/" + date, {
          method: "PUT",
          body: JSON.stringify({
            meals: next.meals_json || {},
            workout: next.workout_json || {},
            macros: next.macros_json || {},
            hydration: Number(next.hydration || 0),
            steps: Number(next.steps || 0),
            cardio: next.cardio || "",
            notes: next.notes || ""
          })
        });
        if(state.appData){
          state.appData.dailyLog = { ...(state.appData.dailyLog || {}), ...next, log_date: date };
        }
        if(showFlash){
          setFlash(successMessage);
          await bootstrapForRoute();
        }
      }catch(err){
        if(showFlash) setFlash(err.message, true);
        throw err;
      }
    }

    async function saveDietLog(ev){
      ev.preventDefault();
      const formEl = ev.target;
      const form = new FormData(formEl);
      const date = form.get("logDate");
      const meals = {
        breakfast: form.get("breakfast") || "",
        lunch: form.get("lunch") || "",
        dinner: form.get("dinner") || "",
        snacks: form.get("snacks") || ""
      };
      const autoMacros = calcMealMacros(state.appData?.plan, meals);
      const current = currentDailyPayload(date);
      const next = {
        ...current,
        meals_json: meals,
        macros_json: {
          calories: autoMacros.calories,
          protein: autoMacros.protein,
          carbs: autoMacros.carbs,
          fat: autoMacros.fat
        },
        hydration: Number(form.get("hydration") || 0),
        steps: Number(form.get("steps") || 0),
        notes: form.get("notes") || ""
      };
      try{
        updateAutoSaveStatus("Saved at " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }));
        await persistDailyLog(date, next, true, "Diet log saved.");
      }catch(err){
        updateAutoSaveStatus("Auto-save failed");
      }
    }

    function attachDietLogEnhancements(){
      const form = document.getElementById("diet-log-form");
      if(!form) return;
      if(dailyLogAutoSaveTimer) clearTimeout(dailyLogAutoSaveTimer);
      if(dayRolloverTimer) clearInterval(dayRolloverTimer);
      const scheduleAutoSave = () => {
        updateMacroInputsFromMeals(form);
        updateAutoSaveStatus("Saving...");
        clearTimeout(dailyLogAutoSaveTimer);
        dailyLogAutoSaveTimer = setTimeout(() => {
          const liveForm = document.getElementById("diet-log-form");
          if(liveForm){
            const data = new FormData(liveForm);
            const date = data.get("logDate");
            const meals = {
              breakfast: data.get("breakfast") || "",
              lunch: data.get("lunch") || "",
              dinner: data.get("dinner") || "",
              snacks: data.get("snacks") || ""
            };
            const autoMacros = calcMealMacros(state.appData?.plan, meals);
            const current = currentDailyPayload(date);
            const next = {
              ...current,
              meals_json: meals,
              macros_json: autoMacros,
              hydration: Number(data.get("hydration") || 0),
              steps: Number(data.get("steps") || 0),
              notes: data.get("notes") || ""
            };
            void persistDailyLog(date, next, false, "");
          }
        }, 1200);
      };
      form.querySelectorAll("input, textarea, select").forEach((field) => {
        field.addEventListener("input", scheduleAutoSave);
        field.addEventListener("change", scheduleAutoSave);
      });
      updateMacroInputsFromMeals(form);
      dayRolloverTimer = setInterval(() => {
        const liveForm = document.getElementById("diet-log-form");
        if(!liveForm) return;
        const dateInput = liveForm.querySelector('input[name="logDate"]');
        const today = new Date().toISOString().slice(0, 10);
        if(dateInput && dateInput.value !== today){
          const event = { preventDefault(){}, target: liveForm };
          void saveDietLog(event).finally(async () => { await bootstrapForRoute(); });
        }
      }, 60000);
    }

    async function saveCheckin(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      try{
        await api("/api/app/checkins", {
          method: "POST",
          body: JSON.stringify({
            checkinDate: form.get("checkinDate"),
            weight: Number(form.get("weight") || 0),
            bodyFat: Number(form.get("bodyFat") || 0),
            waist: Number(form.get("waist") || 0),
            hips: Number(form.get("hips") || 0),
            notes: form.get("checkinNotes") || ""
          })
        });
        setFlash("Check-in saved.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function saveWorkoutLog(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      const date = form.get("logDate");
      const workoutSession = form.get("workoutSession") || "";
      const exerciseEntries = {};
      getWorkoutExercises(state.appData?.plan, workoutSession).forEach((exercise) => {
        exerciseEntries[exercise.id] = {
          sets: safeJson(form.get(`sets_${exercise.id}`), Array(exercise.sets).fill(false)) || Array(exercise.sets).fill(false),
          weight: form.get(`weight_${exercise.id}`) || ""
        };
      });
      const current = currentDailyPayload(date);
      const next = {
        ...current,
        cardio: form.get("cardio") || "",
        workout_json: {
          session: workoutSession,
          exercises: getWorkoutSession(state.appData?.plan, workoutSession)?.exercises || [],
          entries: exerciseEntries,
          completed: form.get("workoutCompleted") === "on",
          notes: form.get("workoutNotes") || ""
        }
      };
      try{
        await persistDailyLog(date, next, true, "Workout log saved.");

    function collectPlanEditForm(){
      const form = document.getElementById("plan-edit-form");
      if(!form) return normalizeEditablePlan(state.pendingPlanEdit || {});
      const data = new FormData(form);
      const parseList = (value) => String(value || "").split("\n").map(item => item.trim()).filter(Boolean);
      const parseSectioned = (value, keyName, valueName, mapItem = (item) => item) => String(value || "")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const separator = line.indexOf(":");
          const head = separator >= 0 ? line.slice(0, separator).trim() : line;
          const tail = separator >= 0 ? line.slice(separator + 1) : "";
          return {
            [keyName]: head,
            [valueName]: tail.split("|").map(item => item.trim()).filter(Boolean).map(mapItem)
          };
        })
        .filter(item => item[keyName]);
      const edited = {
        profileSummary: String(data.get("profileSummary") || "").trim(),
        calorieTarget: String(data.get("calorieTarget") || "").trim(),
        macros: {
          protein: String(data.get("macroProtein") || "").trim(),
          carbs: String(data.get("macroCarbs") || "").trim(),
          fat: String(data.get("macroFat") || "").trim()
        },
        mealOptions: parseSectioned(data.get("mealOptions"), "meal", "options", parseMealOptionText),
        weeklyMealStructure: parseList(data.get("weeklyMealStructure")),
        supplements: parseList(data.get("supplements")),
        workoutSplit: parseSectioned(data.get("workoutSplit"), "day", "exercises"),
        progressMilestones: parseList(data.get("progressMilestones")),
        successRules: parseList(data.get("successRules")),
        cautions: parseList(data.get("cautions"))
      };
      state.pendingPlanEdit = edited;
      return edited;
    }

    function escapeHtml(value){
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function normalizeMealSection(section){
      return {
        meal: section?.meal || "",
        options: Array.isArray(section?.options) ? section.options.map(normalizeMealOption).filter(Boolean) : []
      };
    }

    function normalizeMealOption(option){
      if(!option) return null;
      if(typeof option === "string") return { label: option, calories: 0, protein: 0, carbs: 0, fat: 0 };
      return {
        label: option.label || option.name || "",
        calories: Number(option.calories || 0),
        protein: Number(option.protein || 0),
        carbs: Number(option.carbs || 0),
        fat: Number(option.fat || 0)
      };
    }

    function formatMealOptionLine(option){
      const item = normalizeMealOption(option) || { label: "" };
      const macroText = `${item.calories || 0} kcal, P${item.protein || 0} C${item.carbs || 0} F${item.fat || 0}`;
      return `${item.label || ""} [${macroText}]`;
    }

    function parseMealOptionText(text){
      const raw = String(text || "").trim();
      const match = raw.match(/^(.*?)\s*\[(.*?)\]\s*$/);
      if(!match) return { label: raw, calories: 0, protein: 0, carbs: 0, fat: 0 };
      const label = match[1].trim();
      const meta = match[2];
      const read = (pattern) => {
        const found = meta.match(pattern);
        return found ? Number(found[1]) : 0;
      };
      return {
        label,
        calories: read(/(\d+(?:\.\d+)?)\s*kcal/i),
        protein: read(/P\s*(\d+(?:\.\d+)?)/i),
        carbs: read(/C\s*(\d+(?:\.\d+)?)/i),
        fat: read(/F\s*(\d+(?:\.\d+)?)/i)
      };
    }

    function getPlanMealSection(plan, mealName){
      const data = plan?.effectivePlan || plan || {};
      return (data.mealOptions || []).map(normalizeMealSection).find(section => section.meal?.toLowerCase() === mealName.toLowerCase()) || null;
    }

    function renderMealSelect(name, section, selectedValue){
      const options = section?.options || [];
      return `
        <select name="${name}">
          <option value="">Select an option</option>
          ${options.map(option => `<option value="${escapeAttr(option.label)}" ${option.label === selectedValue ? "selected" : ""}>${escapeHtml(formatMealOptionLine(option))}</option>`).join("")}
        </select>
      `;
    }

    function findMealOption(plan, mealName, label){
      const section = getPlanMealSection(plan, mealName);
      if(!section) return null;
      return (section.options || []).find(option => option.label === label) || null;
    }

    function getWorkoutSessions(plan){
      const data = plan?.effectivePlan || plan || {};
      return Array.isArray(data.workoutSplit) ? data.workoutSplit : [];
    }

    function getWorkoutSession(plan, dayName){
      return getWorkoutSessions(plan).find(item => item.day === dayName) || null;
    }

    function slugify(value){
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function parseWorkoutExercise(raw, index){
      const text = String(raw || "").trim();
      const match = text.match(/^(.*?)(?:\s+(\d+)\s*[x×]\s*([0-9A-Za-z+\-\/ ]+))?(?:\s*@\s*(.+))?$/);
      const name = (match?.[1] || text).trim();
      const sets = Number(match?.[2] || 3);
      const reps = (match?.[3] || "8-12").trim();
      const target = (match?.[4] || "").trim();
      return {
        id: `${slugify(name)}-${index}`,
        name,
        sets,
        reps,
        target
      };
    }

    function getWorkoutExercises(plan, dayName){
      const session = getWorkoutSession(plan, dayName);
      if(!session) return [];
      return (session.exercises || []).map((exercise, index) => parseWorkoutExercise(exercise, index));
    }

    function calcMealMacros(plan, meals){
      const totals = { calories: 0, protein: 0, carbs: 0, fat: 0 };
      ["breakfast","lunch","dinner"].forEach((mealName) => {
        const option = findMealOption(plan, mealName, meals?.[mealName] || "");
        if(option){
          totals.calories += Number(option.calories || 0);
          totals.protein += Number(option.protein || 0);
          totals.carbs += Number(option.carbs || 0);
          totals.fat += Number(option.fat || 0);
        }
      });
      return totals;
    }

      const setField = (name, value) => {
        const input = formEl.querySelector(`[name="${name}"]`);
        if(input) input.value = value;
      };
      setField("calories", totals.calories);
      setField("protein", totals.protein);
      setField("carbs", totals.carbs);
      setField("fat", totals.fat);
    }

                <div class="card"><div class="subtle">New Notes</div><div class="stat">${review.newNotes}</div></div>

                  <div class="plan-list">
                    ${state.clients.filter(client => (client.reviewFlags || []).length > 0).map(client => `
                      <div>
                        <strong>${escapeHtml(client.full_name)}</strong>

                  <form class="grid" id="create-client-form" style="margin-top:12px">

                    <label><span>Username</span><input name="username" required/></label>
                    <button class="action-btn" type="submit">Create Client</button>
                  </form>

                          <tr>
                            <td>${escapeHtml(client.full_name)}<div class="subtle">${escapeHtml(client.username)}</div></td>
                            <td><span class="pill active">${formatClientStatus(client.status)}</span></td>
                            <td><span class="pill ${client.plan_status || "draft"}">${client.plan_status || "none"}</span></td>
                            <td>
                              <div class="inline">
                                ${(client.reviewFlags || []).slice(0, 2).map(flag => `<span class="pill alert">${escapeHtml(flag)}</span>`).join("")}
                              </div>
                            </td>
                            <td><button class="ghost-btn open-client" data-client-id="${client.id}">Open</button></td>
                          </tr>
                        `).join("")}
                      </tbody>
                    </table>
                  ` : `<div class="empty" style="margin-top:12px">No clients yet.</div>`}
                </div>
              </div>
            </div>

                  <h2>${escapeHtml(detail.client.full_name)}</h2>

                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }
      } else {
        const today = new Date().toISOString().slice(0,10);
        const dailyLog = app.dailyLog || {};
        const review = app.weeklyReview?.review_json || {};
        if(path === "/app"){
          content = `
            <div class="client-shell">
              ${flash}
              <div class="client-stat-grid">
                <div class="client-stat-card" style="border-color:${app.plan ? '#22c55e33' : '#1e2a3a'}">
                  <div style="font-size:18px">${app.plan ? "✅" : "⏳"}</div>
                  <div class="client-stat-value" style="color:${app.plan ? '#22c55e' : '#FF6B2B'}">${app.plan ? "Ready" : "Pending"}</div>
                  <div class="client-stat-label">Plan</div>
                </div>
                <div class="client-stat-card" style="border-color:${app.canEditIntake ? '#F59E0B33' : '#1e2a3a'}">
                  <div style="font-size:18px">${app.canEditIntake ? "📝" : "🔒"}</div>
                  <div class="client-stat-value" style="color:${app.canEditIntake ? '#F59E0B' : '#3B9EFF'}">${app.canEditIntake ? "Open" : "Locked"}</div>
                  <div class="client-stat-label">Intake</div>
                </div>
                <div class="client-stat-card" style="border-color:${dailyLog.log_date === today ? '#22c55e33' : '#1e2a3a'}">
                  <div style="font-size:18px">${dailyLog.log_date === today ? "📈" : "⌛"}</div>
                  <div class="client-stat-value" style="color:${dailyLog.log_date === today ? '#22c55e' : '#A855F7'}">${dailyLog.log_date === today ? "Saved" : "Pending"}</div>
                  <div class="client-stat-label">Today's Log</div>
                </div>
              </div>
              <div class="client-panel" style="background:linear-gradient(135deg,${app.plan ? 'rgba(34,197,94,.14), rgba(59,158,255,.08)' : 'rgba(255,147,80,.16), rgba(168,85,247,.08)'})">
                <div class="client-kicker">${app.plan ? "Coach Published Plan" : "Waiting For Coach Review"}</div>
                <div style="font-size:26px;font-weight:800;color:#f0f4ff;margin-top:4px">${escapeHtml(app.client?.full_name || "Client")}</div>
                <div class="subtle" style="margin-top:4px">${app.plan ? "Your current plan is live. Follow it and update your log every day." : "Complete your intake and keep your log updated so your coach can review faster."}</div>
                <div class="inline" style="margin-top:12px">
                  <button class="action-btn" data-nav="/app/plan">Open Plan</button>
                  <button class="ghost-btn" data-nav="/app/diet">Open Diet</button>
                  <button class="ghost-btn" data-nav="/app/workout">Open Workout</button>
                </div>
              </div>
              <div class="client-panel">
                <div class="client-kicker" style="color:#6b7a99">Today</div>
                <div class="client-list" style="margin-top:10px">
                  <div class="client-list-item">
                    <strong style="color:#f0f4ff">Next step</strong>
                    <div class="subtle" style="margin-top:4px">${app.plan ? "Choose your meals and log your workout for today." : (app.canEditIntake ? "Submit your intake so the coach can build your plan." : "Wait for your coach to publish the plan, then start logging.")}</div>
                  </div>
                  <div class="client-list-item">
                    <strong style="color:#f0f4ff">Coach note</strong>
                    <div class="subtle" style="margin-top:4px">${app.plan ? "Coach published your plan. Use the Plan tab for guidance and the Diet and Workout tabs for progress tracking." : "Your coach will review your intake and progress before publishing your plan."}</div>
                  </div>
                </div>
              </div>
            </div>
          `;
        } else if(path === "/app/plan"){
          content = `<div class="client-shell">${flash}<div class="client-panel"><div class="client-kicker">Coach Published Plan</div><h2 style="margin-top:8px">Your Plan</h2><p class="subtle">${app.client?.full_name || ""}</p><div style="margin-top:18px">${renderPlan(app.plan, { showMeta: false, coachPublished: true })}</div></div></div>`;
        } else if(path === "/app/intake"){
          content = app.canEditIntake
            ? `<div class="client-shell">${flash}<div class="client-panel"><div class="client-kicker">Intake</div><h2 style="margin-top:8px">Tell Your Coach About You</h2><p class="subtle">Submit this once. After that, your coach controls when it can be edited.</p><div style="margin-top:18px">${renderIntakeForm(app.intake?.answers_json || {}, "Submit Intake", "return false;")}</div></div></div>`
            : `<div class="client-shell">${flash}<div class="client-panel"><div class="notice success">Your intake has been submitted. If you need to change it, ask your coach to enable editing.</div><div style="margin-top:18px">${renderIntakeForm(app.intake?.answers_json || {}, "Submitted", "return false;")}</div></div></div>`;
        } else if(path === "/app/diet"){
          const breakfastSection = getPlanMealSection(app.plan, "Breakfast");
          const lunchSection = getPlanMealSection(app.plan, "Lunch");
          const dinnerSection = getPlanMealSection(app.plan, "Dinner");
          content = `
            <div class="client-shell">
              ${flash}
              <div class="client-panel">
                <div class="client-kicker">Diet Log</div>
                <h2 style="margin-top:8px">Track Meals</h2>
                <p class="subtle">Choose meal options and let calories and macros fill automatically.</p>
              </div>
              <form class="grid" id="diet-log-form">
                <div class="client-panel">
                  <h3>Meals & Macros</h3>
                  <div class="subtle" id="autosave-status" style="margin-top:6px">${state.autoSaveStatus || "Changes auto-save while you type."}</div>
                  <div class="subtle" style="margin-top:6px">Breakfast, lunch, and dinner totals are auto-calculated from the meal option you select.</div>
                  <div class="grid" style="margin-top:12px">
                    <label><span>Date</span><input name="logDate" value="${dailyLog.log_date || today}" required/></label>
                    <label><span>Breakfast</span>${renderMealSelect("breakfast", breakfastSection, dailyLog.meals_json?.breakfast || "")}</label>
                    <label><span>Lunch</span>${renderMealSelect("lunch", lunchSection, dailyLog.meals_json?.lunch || "")}</label>
                    <label><span>Dinner</span>${renderMealSelect("dinner", dinnerSection, dailyLog.meals_json?.dinner || "")}</label>
                    <label><span>Snacks</span><input name="snacks" value="${escapeHtml(dailyLog.meals_json?.snacks || "")}"/></label>
                    <div class="grid cols-2">
                      <label><span>Calories</span><input name="calories" value="${dailyLog.macros_json?.calories || 0}" readonly/></label>
                      <label><span>Protein</span><input name="protein" value="${dailyLog.macros_json?.protein || 0}" readonly/></label>

                      <label><span>Fat</span><input name="fat" value="${dailyLog.macros_json?.fat || 0}" readonly/></label>
                    </div>
                    <div class="grid cols-2">
                      <label><span>Hydration (L)</span><input name="hydration" value="${dailyLog.hydration || 0}"/></label>
                      <label><span>Steps</span><input name="steps" value="${dailyLog.steps || 0}"/></label>
                    </div>
                  </div>
                </div>
                <div class="client-panel">
                  <h3>Diet Notes</h3>
                  <div class="grid">
                    <label><span>General notes</span><textarea name="notes">${escapeHtml(dailyLog.notes || "")}</textarea></label>
                    <button class="action-btn" type="submit">Save Diet Log</button>
                  </div>
                </div>
              </form>
            </div>
          `;
        } else if(path === "/app/workout"){
          const selectedWorkout = dailyLog.workout_json?.session || "";

            <div class="client-shell">
              ${flash}
              <div class="client-panel">
                <div class="client-kicker">Workout Log</div>
                <h2 style="margin-top:8px">Track Training</h2>
                <p class="subtle">Pick today’s session, tap completed sets, and enter weights.</p>
              </div>
              <form class="grid" id="workout-log-form">
                <div class="client-panel">
                  <div class="grid">
                    <label><span>Date</span><input name="logDate" value="${dailyLog.log_date || today}" required/></label>
                    <label><span>Workout Session</span>${renderWorkoutSelect(app.plan, selectedWorkout)}</label>
                    <div id="workout-cards">${renderWorkoutExerciseCards(app.plan, selectedWorkout, dailyLog.workout_json?.entries || {})}</div>
                    <label><span>Cardio</span><input name="cardio" value="${escapeHtml(dailyLog.cardio || "")}"/></label>
                    <label><span>Workout Notes</span><textarea name="workoutNotes">${escapeHtml(dailyLog.workout_json?.notes || "")}</textarea></label>
                    <label><input type="checkbox" name="workoutCompleted" ${dailyLog.workout_json?.completed ? "checked" : ""}/> Workout completed</label>
                    <button class="action-btn" type="submit">Save Workout Log</button>
                  </div>
                </div>
              </form>
              <div class="grid cols-2">
                  <div class="client-panel">
                    <h3>Check-in</h3>
                    <form class="grid" id="checkin-form" style="margin-top:12px">
                      <label><span>Date</span><input name="checkinDate" value="${today}" required/></label>
                      <div class="grid cols-2">
                        <label><span>Weight</span><input name="weight"/></label>
                        <label><span>Body fat %</span><input name="bodyFat"/></label>
                        <label><span>Waist</span><input name="waist"/></label>
                        <label><span>Hips</span><input name="hips"/></label>
                      </div>
                      <label><span>Notes</span><textarea name="checkinNotes"></textarea></label>
                      <button class="action-btn" type="submit">Save Check-in</button>
                    </form>

                    <h3>Account</h3>
                    <form class="grid" id="password-form" style="margin-top:12px">
                      <label><span>Current password</span><input type="password" name="currentPassword" required/></label>

                      <button class="ghost-btn" type="submit">Change Password</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          `;
        }

              </nav>
            </aside>
            <main>${content}</main>
          </div>
        </div>

        <div class="client-app">
          <div class="client-header">
            <div class="client-header-row">

                <div class="client-kicker">${state.me?.username || "client"}</div>
                <div class="client-title">FitnessLog</div>
              </div>

                <div class="client-subtitle">${new Date().toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}</div>
                <div class="client-chip"><span style="width:6px;height:6px;border-radius:50%;background:${app?.plan ? '#22c55e' : '#FF6B2B'};display:inline-block"></span>${app?.plan ? 'Plan Live' : 'Plan Pending'}</div>
                <div style="margin-top:6px"><button class="ghost-btn" id="logout-btn" style="padding:6px 10px;font-size:11px">Logout</button></div>
              </div>
            </div>
          </div>
          <div class="client-main">${content}</div>
          <div class="bottom-tabs">
            ${nav.map(([href, label]) => `<button class="bottom-tab ${path === href ? "active" : ""}" data-nav="${href}"><span class="bottom-tab-icon">${clientTabIcon(href)}</span><span class="bottom-tab-label">${label}</span></button>`).join("")}
          </div>
        </div>
      `;

      document.querySelectorAll("[data-nav]").forEach(btn => btn.onclick = () => setRoute(btn.dataset.nav));
      const logoutBtn = document.getElementById("logout-btn");

      if(isAdmin && path === "/admin"){
        document.getElementById("create-client-form").onsubmit = createClient;
        document.getElementById("export-all").onclick = () => exportSheets(null);
        document.querySelectorAll(".open-client").forEach(btn => btn.onclick = () => setRoute("/admin/clients/" + btn.dataset.clientId));
      }

      if(isAdmin && state.adminClientDetail){
        const clientId = state.adminClientDetail.client.id;
        const intakeForm = document.querySelector("#admin-intake-form form");
        if(intakeForm) intakeForm.onsubmit = (ev) => saveIntake(ev, clientId);
        document.getElementById("toggle-intake-edit").onclick = () => toggleIntakeEdit(clientId, state.adminClientDetail.client.status !== "intake_open");
        document.getElementById("reset-password").onclick = () => resetPassword(clientId);
        document.getElementById("generate-plan").onclick = () => generatePlan(clientId);
        document.getElementById("save-plan").onclick = () => {
          savePlanEdits(clientId);
        };
        document.getElementById("publish-plan").onclick = () => publishPlan(clientId, true);
        const unpublish = document.getElementById("unpublish-plan");
        if(unpublish) unpublish.onclick = () => publishPlan(clientId, false);
        document.getElementById("export-client").onclick = () => exportSheets(clientId);
        document.getElementById("delete-client").onclick = () => deleteClient(clientId, state.adminClientDetail.client.full_name);
        const planEditForm = document.getElementById("plan-edit-form");
        if(planEditForm){
          planEditForm.oninput = () => collectPlanEditForm();
          planEditForm.onchange = () => collectPlanEditForm();
        }
      }

      if(!isAdmin && path === "/app/intake"){
        const intakeForm = document.querySelector("main form");
        if(intakeForm && state.appData?.canEditIntake) intakeForm.onsubmit = saveIntake;
        if(intakeForm && !state.appData?.canEditIntake){
          intakeForm.querySelectorAll("input, textarea, button").forEach(node => node.disabled = true);
        }
      }
      if(!isAdmin && path === "/app/diet"){
        document.getElementById("diet-log-form").onsubmit = saveDietLog;
        attachDietLogEnhancements();
      }
      if(!isAdmin && path === "/app/workout"){
        document.getElementById("workout-log-form").onsubmit = saveWorkoutLog;
        document.getElementById("checkin-form").onsubmit = saveCheckin;
        document.getElementById("review-form").onsubmit = saveWeeklyReview;
        document.getElementById("password-form").onsubmit = changePassword;
        attachWorkoutLogEnhancements();
      }
    }

    bootstrap();
  </script>
