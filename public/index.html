<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitness Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#060d18;
      --surface:#0b1628;
      --surface-2:#0f1e35;
      --surface-3:#142642;
      --surface-4:#192e50;
      --border:#1a2e48;
      --border-bright:#243d60;
      --text:#e2eeff;
      --text-2:#7a9abf;
      --text-3:#3d5a7e;
      --accent:#ff5c28;
      --accent-dim:rgba(255,92,40,.12);
      --accent-border:rgba(255,92,40,.28);
      --teal:#00cba8;
      --teal-dim:rgba(0,203,168,.1);
      --teal-border:rgba(0,203,168,.25);
      --lime:#5fde7a;
      --lime-dim:rgba(95,222,122,.1);
      --gold:#ffc940;
      --gold-dim:rgba(255,201,64,.1);
      --red:#ff4056;
      --red-dim:rgba(255,64,86,.1);
      --purple:#9d7cf4;
      --radius:14px;
      --radius-lg:20px;
      --radius-xl:26px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      min-height:100vh;
      font-family:'Plus Jakarta Sans',sans-serif;
      color:var(--text);
      background:var(--bg);
      background-image:
        radial-gradient(ellipse 60% 40% at 0% 0%, rgba(255,92,40,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 100% 0%, rgba(0,203,168,.06) 0%, transparent 55%),
        radial-gradient(ellipse 40% 60% at 50% 100%, rgba(26,46,72,.4) 0%, transparent 70%);
      -webkit-font-smoothing:antialiased;
    }
    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}

    /* ═══════════════════════════════════════════════
       SCROLLBAR
    ═══════════════════════════════════════════════ */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px}

    /* ═══════════════════════════════════════════════
       LAYOUT SHELL (ADMIN)
    ═══════════════════════════════════════════════ */
    .app-shell{max-width:1280px;margin:0 auto;padding:28px 24px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:32px}
    .brand{}
    .brand-eyebrow{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--teal);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
    .brand-eyebrow::before{content:'';width:18px;height:1px;background:var(--teal);opacity:.5}
    .brand h1{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--text)}
    .brand-sub{margin-top:4px;font-size:13px;color:var(--text-2)}
    .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .layout{display:grid;grid-template-columns:256px 1fr;gap:22px}

    /* ═══════════════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════════════ */
    .sidebar{
      background:linear-gradient(180deg, var(--surface) 0%, rgba(11,22,40,.92) 100%);
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      padding:20px 14px;
      align-self:start;
      position:sticky;
      top:24px;
    }
    .sidebar-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.14em;padding:0 10px;margin-bottom:8px}
    .sidebar nav{display:grid;gap:4px;margin-top:10px}
    .nav-btn{
      border:1px solid transparent;
      border-radius:var(--radius);
      padding:11px 14px;
      cursor:pointer;
      text-align:left;
      background:transparent;
      color:var(--text-2);
      font-weight:600;
      font-size:13.5px;
      transition:all .15s ease;
      display:flex;
      align-items:center;
      gap:9px;
    }
    .nav-btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border)}
    .nav-btn.active{
      background:var(--accent-dim);
      color:var(--accent);
      border-color:var(--accent-border);
    }
    .nav-btn .nav-icon{font-size:15px;opacity:.8;min-width:18px}

    /* ═══════════════════════════════════════════════
       PANEL
    ═══════════════════════════════════════════════ */
    .panel{
      background:linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      padding:26px;
    }
    .panel-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em}
    .panel-sub{margin-top:4px;font-size:13px;color:var(--text-2)}

    /* ═══════════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════════ */
    .action-btn,.ghost-btn,.nav-btn{border:none;cursor:pointer}
    .action-btn{
      display:inline-flex;align-items:center;gap:7px;
      background:linear-gradient(135deg, var(--accent) 0%, #ff7a40 100%);
      color:#fff;
      font-weight:700;
      font-size:13.5px;
      padding:11px 20px;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.08);
      transition:all .15s ease;
      box-shadow:0 4px 16px rgba(255,92,40,.28);
      white-space:nowrap;
    }
    .action-btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(255,92,40,.4)}
    .action-btn:active{transform:translateY(0)}
    .ghost-btn{
      display:inline-flex;align-items:center;gap:7px;
      background:var(--surface-2);
      border:1px solid var(--border-bright);
      color:var(--text);
      font-weight:600;
      font-size:13.5px;
      padding:11px 18px;
      border-radius:var(--radius);
      transition:all .15s ease;
      white-space:nowrap;
    }
    .ghost-btn:hover{background:var(--surface-3);border-color:var(--border-bright)}
    .ghost-btn.teal{color:var(--teal);border-color:var(--teal-border);background:var(--teal-dim)}
    .ghost-btn.teal:hover{background:rgba(0,203,168,.18)}
    .danger{
      background:var(--red-dim) !important;
      border-color:rgba(255,64,86,.3) !important;
      color:var(--red) !important;
      box-shadow:none !important;
    }
    .danger:hover{background:rgba(255,64,86,.2) !important}

    /* ═══════════════════════════════════════════════
       FORMS
    ═══════════════════════════════════════════════ */
    label{display:block}
    label span{
      display:block;
      font-family:'JetBrains Mono',monospace;
      font-size:10px;
      color:var(--text-2);
      margin-bottom:7px;
      text-transform:uppercase;
      letter-spacing:.1em;
      font-weight:500;
    }
    input,select,textarea{
      width:100%;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--border-bright);
      border-radius:var(--radius);
      padding:11px 14px;
      outline:none;
      font-size:14px;
      transition:border-color .15s ease, box-shadow .15s ease;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(255,92,40,.1);
    }
    input[readonly]{color:var(--text-2);background:var(--surface)}
    textarea{min-height:100px;resize:vertical;line-height:1.6}
    select{cursor:pointer}
    select option{background:var(--surface-2)}
    input[type="checkbox"]{
      width:auto;
      width:16px;height:16px;
      accent-color:var(--accent);
      cursor:pointer;
      vertical-align:middle;
      margin-right:6px;
    }
    code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface-3);padding:2px 6px;border-radius:6px;color:var(--gold)}

    /* ═══════════════════════════════════════════════
       CARDS & GRIDS
    ═══════════════════════════════════════════════ */
    .grid{display:grid;gap:16px}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:18px;
      transition:border-color .15s ease;
    }
    .card:hover{border-color:var(--border-bright)}
    .card h3{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;margin-bottom:10px}
    .stat{
      font-family:'Outfit',sans-serif;
      font-size:36px;
      font-weight:900;
      margin-top:6px;
      letter-spacing:-.02em;
    }
    .stat-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.1em}
    .split{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
    .inline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .subtle{color:var(--text-2);font-size:13px;line-height:1.6}
    .hide{display:none!important}

    /* ═══════════════════════════════════════════════
       BADGES / PILLS
    ═══════════════════════════════════════════════ */
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      padding:5px 12px;
      border-radius:999px;
      background:var(--teal-dim);
      border:1px solid var(--teal-border);
      color:var(--teal);
      font-family:'JetBrains Mono',monospace;
      font-size:10px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
    }
    .pill{
      display:inline-flex;align-items:center;gap:4px;
      padding:3px 9px;
      border-radius:999px;
      font-family:'JetBrains Mono',monospace;
      font-size:10px;
      font-weight:700;
      letter-spacing:.05em;
    }
    .pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
    .pill.draft{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(255,201,64,.2)}
    .pill.published{background:var(--lime-dim);color:var(--lime);border:1px solid rgba(95,222,122,.2)}
    .pill.active{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-border)}
    .pill.alert{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,64,86,.2)}
    .pill.none{background:var(--surface-3);color:var(--text-3);border:1px solid var(--border)}

    /* ═══════════════════════════════════════════════
       NOTICES / FLASH
    ═══════════════════════════════════════════════ */
    .notice{
      padding:14px 16px;
      border-radius:var(--radius);
      border:1px solid var(--border);
      background:var(--surface-2);
      font-size:13.5px;
      line-height:1.5;
    }
    .notice.success{background:rgba(95,222,122,.07);border-color:rgba(95,222,122,.25);color:#a8edbc}
    .notice.warning{background:rgba(255,201,64,.07);border-color:rgba(255,201,64,.22);color:#ffe9a0}
    .success{color:var(--lime)}
    .error{color:var(--red);font-size:13.5px}
    .flash-success{
      background:rgba(95,222,122,.09);
      border:1px solid rgba(95,222,122,.25);
      color:#a8edbc;
      padding:12px 16px;
      border-radius:var(--radius);
      font-size:13.5px;
      display:flex;
      align-items:center;
      gap:9px;
    }
    .flash-error{
      background:rgba(255,64,86,.09);
      border:1px solid rgba(255,64,86,.25);
      color:#ff8a96;
      padding:12px 16px;
      border-radius:var(--radius);
      font-size:13.5px;
      display:flex;
      align-items:center;
      gap:9px;
    }

    /* ═══════════════════════════════════════════════
       TABLE
    ═══════════════════════════════════════════════ */
    .table{width:100%;border-collapse:collapse}
    .table th{
      font-family:'JetBrains Mono',monospace;
      font-size:9px;
      color:var(--text-3);
      text-transform:uppercase;
      letter-spacing:.12em;
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      text-align:left;
      font-weight:500;
    }
    .table td{
      padding:13px 12px;
      border-bottom:1px solid var(--border);
      vertical-align:middle;
      font-size:13.5px;
    }
    .table tbody tr{transition:background .1s ease}
    .table tbody tr:hover{background:var(--surface-3)}
    .table td .name{font-weight:700;color:var(--text)}
    .table td .username{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);margin-top:2px}

    /* ═══════════════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════════════ */
    .empty{
      padding:36px 20px;
      text-align:center;
      color:var(--text-3);
      border:1px dashed var(--border-bright);
      border-radius:var(--radius-lg);
      font-size:13px;
      line-height:1.6;
    }
    .empty::before{display:block;font-size:28px;margin-bottom:10px;opacity:.5}

    /* ═══════════════════════════════════════════════
       PRE / CODE BLOCKS
    ═══════════════════════════════════════════════ */
    pre{
      white-space:pre-wrap;word-break:break-word;
      background:var(--surface);
      border:1px solid var(--border);
      padding:16px;border-radius:var(--radius);
      color:#a8c4e8;
      font-family:'JetBrains Mono',monospace;
      font-size:12px;line-height:1.7;
    }

    /* ═══════════════════════════════════════════════
       PLAN DISPLAY
    ═══════════════════════════════════════════════ */
    .plan-section{display:grid;gap:10px}
    .plan-list{display:grid;gap:6px;margin-top:8px}
    .plan-list-item{
      background:var(--surface-3);
      border:1px solid var(--border);
      border-radius:10px;
      padding:9px 13px;
      font-size:13px;
      line-height:1.5;
      transition:border-color .12s;
    }
    .plan-list-item:hover{border-color:var(--border-bright)}
    .plan-section-head{
      font-family:'JetBrains Mono',monospace;
      font-size:10px;
      color:var(--text-2);
      text-transform:uppercase;
      letter-spacing:.1em;
      margin-bottom:4px;
    }
    .macro-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .macro-chip{
      background:var(--surface-3);
      border:1px solid var(--border-bright);
      border-radius:10px;
      padding:8px 14px;
      font-family:'JetBrains Mono',monospace;
      font-size:11px;
    }
    .macro-chip strong{display:block;font-size:20px;font-weight:800;margin-bottom:2px;font-family:'Outfit',sans-serif}

    /* ═══════════════════════════════════════════════
       LOGIN PAGE
    ═══════════════════════════════════════════════ */
    .login-wrap{max-width:440px;margin:10vh auto 0}
    .login-logo{text-align:center;margin-bottom:32px}
    .login-logo-mark{
      display:inline-flex;align-items:center;justify-content:center;
      width:56px;height:56px;
      background:linear-gradient(135deg, var(--accent), #ff7a40);
      border-radius:16px;
      font-size:26px;
      margin-bottom:14px;
      box-shadow:0 8px 24px rgba(255,92,40,.3);
    }
    .login-logo h2{font-family:'Outfit',sans-serif;font-size:26px;font-weight:900;letter-spacing:-.02em}
    .login-logo p{color:var(--text-2);font-size:13px;margin-top:4px}
    .login-card{
      background:linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
      border:1px solid var(--border-bright);
      border-radius:var(--radius-xl);
      padding:32px;
      box-shadow:0 24px 60px rgba(0,0,0,.4);
    }
    .footer-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3);text-align:center;margin-top:16px;line-height:1.6}

    /* ═══════════════════════════════════════════════
       DIVIDER
    ═══════════════════════════════════════════════ */
    .divider{height:1px;background:var(--border);margin:20px 0}
    .divider-label{
      display:flex;align-items:center;gap:12px;
      font-family:'JetBrains Mono',monospace;font-size:10px;
      color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;
      margin:20px 0;
    }
    .divider-label::before,.divider-label::after{content:'';flex:1;height:1px;background:var(--border)}

    /* ═══════════════════════════════════════════════
       SECTION HEADER
    ═══════════════════════════════════════════════ */
    .section-eyebrow{
      font-family:'JetBrains Mono',monospace;
      font-size:9px;
      color:var(--accent);
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:6px;
    }
    .section-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.01em}
    .section-sub{font-size:12.5px;color:var(--text-2);margin-top:3px;line-height:1.5}

    /* ═══════════════════════════════════════════════
       STAT CARDS (ADMIN DASHBOARD)
    ═══════════════════════════════════════════════ */
    .stat-card{
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:20px;
      transition:border-color .15s ease, transform .15s ease;
    }
    .stat-card:hover{border-color:var(--border-bright);transform:translateY(-1px)}
    .stat-card .stat-icon{font-size:22px;margin-bottom:12px}
    .stat-card .stat-value{font-family:'Outfit',sans-serif;font-size:38px;font-weight:900;letter-spacing:-.03em;line-height:1}
    .stat-card .stat-name{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-2);text-transform:uppercase;letter-spacing:.12em;margin-top:6px}

    /* ═══════════════════════════════════════════════
       REVIEW FLAGS (NEEDS REVIEW)
    ═══════════════════════════════════════════════ */
    .review-client-row{
      background:var(--surface-3);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px 16px;
      display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;
      transition:border-color .15s;
    }
    .review-client-row:hover{border-color:var(--border-bright)}
    .review-client-name{font-weight:700;font-size:14px}
    .review-client-user{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);margin-top:2px}
    .review-flags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

    /* ═══════════════════════════════════════════════
       TEMP PASSWORD BOX
    ═══════════════════════════════════════════════ */
    .temp-password-box{
      background:rgba(95,222,122,.08);
      border:1px solid rgba(95,222,122,.22);
      border-radius:var(--radius);
      padding:14px 16px;
      margin-top:14px;
    }
    .temp-password-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--lime);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
    .temp-password-value{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:#cff5d8;letter-spacing:.06em}

    /* ═══════════════════════════════════════════════
       CLIENT APP (MOBILE)
    ═══════════════════════════════════════════════ */
    .client-app{
      max-width:480px;
      margin:0 auto;
      min-height:100vh;
      background:#060d18;
      color:var(--text);
      padding-bottom:82px;
    }
    .client-header{
      position:sticky;top:0;z-index:40;
      background:rgba(6,13,24,.94);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:13px 16px;
    }
    .client-header-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .client-brand{display:flex;align-items:center;gap:10px}
    .client-brand-icon{
      width:34px;height:34px;
      background:linear-gradient(135deg, var(--accent), #ff7a40);
      border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-size:17px;
      box-shadow:0 4px 12px rgba(255,92,40,.3);
    }
    .client-brand-text{}
    .client-kicker{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:.14em;text-transform:uppercase}
    .client-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.01em;line-height:1}
    .client-header-right{text-align:right}
    .client-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3)}
    .client-chip{
      display:inline-flex;align-items:center;gap:5px;
      margin-top:3px;
      background:var(--surface-2);
      border:1px solid var(--border-bright);
      border-radius:999px;
      padding:3px 9px;
      font-family:'JetBrains Mono',monospace;
      font-size:9px;
      color:var(--text-2);
    }
    .chip-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
    .client-logout{
      margin-top:5px;
      background:transparent;
      border:1px solid var(--border);
      color:var(--text-3);
      font-size:10px;
      padding:4px 9px;
      border-radius:8px;
      cursor:pointer;
      font-family:'JetBrains Mono',monospace;
      transition:all .15s;
    }

    /* CLIENT STAT GRID */
    .client-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}

    /* CLIENT PANELS */
    .client-panel{

    .client-panel h3{font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;margin-bottom:10px}

    .client-hero-name{font-family:'Outfit',sans-serif;font-size:24px;font-weight:900;color:var(--text);letter-spacing:-.02em;margin-top:4px}
    .client-hero-sub{font-size:13px;color:var(--text-2);margin-top:4px;line-height:1.5}
    .client-hero-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .client-hero-btn{
      padding:10px 16px;
      border-radius:12px;

    .client-hero-btn.primary{background:linear-gradient(135deg,var(--accent),#ff7a40);color:#fff;box-shadow:0 4px 14px rgba(255,92,40,.3)}
    .client-hero-btn.primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,92,40,.4)}
    .client-hero-btn.secondary{background:var(--surface-2);border:1px solid var(--border-bright);color:var(--text-2)}
    .client-hero-btn.secondary:hover{background:var(--surface-3);color:var(--text)}
    .client-list{display:grid;gap:8px}
    .client-list-item{
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:11px 14px;
      transition:border-color .12s;
    }
    .client-list-item:hover{border-color:var(--border-bright)}
    .client-list-item-head{font-size:13px;font-weight:700;color:var(--text)}
    .client-list-item-sub{font-size:12px;color:var(--text-2);margin-top:3px;line-height:1.5}

    /* BOTTOM TABS */
    .bottom-tabs{
      position:fixed;
      left:50%;transform:translateX(-50%);
      bottom:0;
      width:100%;max-width:480px;
      background:rgba(6,13,24,.96);
      backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      display:flex;
      z-index:50;
      padding:6px 8px 10px;
      gap:4px;
    }
    .bottom-tab{
      flex:1;
      border:none;
      background:transparent;
      padding:8px 0 4px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:3px;
      border-radius:12px;
      transition:all .15s ease;
      color:var(--text-3);
    }
    .bottom-tab:hover{background:var(--surface-2);color:var(--text-2)}
    .bottom-tab.active{background:var(--accent-dim);color:var(--accent)}
    .bottom-tab-icon{font-size:17px}
    .bottom-tab-label{font-family:'JetBrains Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.07em}

    /* ═══════════════════════════════════════════════
       WORKOUT CARDS
    ═══════════════════════════════════════════════ */
    .set-toggle-wrap{position:relative;display:inline-flex}
    .set-check{position:absolute;opacity:0;pointer-events:none}
    .set-toggle-label{
      min-width:44px;
      text-align:center;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      user-select:none;

      align-items:center;
      justify-content:center;
      padding:9px 11px;
      border-radius:10px;
      background:var(--surface-3);
      border:1px solid var(--border);
      color:var(--text-3);
      font-weight:700;
      font-size:12px;
      cursor:pointer;
      transition:all .12s ease;
    }
    .set-toggle-wrap.active .set-toggle-label{
      background:rgba(95,222,122,.14);
      border-color:rgba(95,222,122,.35);
      color:var(--lime);
    }
    .exercise-card{
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      transition:border-color .12s;
    }
    .exercise-card:hover{border-color:var(--border-bright)}
    .exercise-name{font-size:14px;font-weight:700;color:var(--text)}
    .exercise-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);margin-top:3px}
    .exercise-history{display:grid;gap:5px;margin-top:10px}
    .exercise-history-row{display:flex;justify-content:space-between;gap:10px;align-items:center}
    .exercise-sparkline{width:100%;height:30px;display:block}
    .exercise-history-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3)}
    .workout-submit-bar{
      position:sticky;bottom:74px;
      background:rgba(6,13,24,.95);
      backdrop-filter:blur(14px);
      border:1px solid var(--border-bright);
      border-radius:16px;
      padding:12px 14px;
      display:grid;gap:10px;
      margin:10px 0;
    }
    .workout-status{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-2)}

    /* ═══════════════════════════════════════════════
       PROGRESS CHART
    ═══════════════════════════════════════════════ */
    .progress-chart{display:grid;gap:14px}
    .progress-meta{display:flex;justify-content:space-between;gap:10px;align-items:flex-end}
    .progress-metric{display:grid;gap:4px}
    .progress-metric strong{font-family:'Outfit',sans-serif;font-size:22px;font-weight:900;color:var(--text)}
    .progress-chart svg{width:100%;height:auto;display:block}
    .progress-chart-labels{display:grid;grid-template-columns:repeat(auto-fit,minmax(52px,1fr));gap:4px;margin-top:4px}
    .progress-chart-labels div{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-3);text-align:center}

    /* ═══════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════ */
    .mobile-only{display:none}
    @media (max-width:940px){
      .layout,.split,.grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}
      .sidebar{position:static;border-radius:var(--radius-lg)}
      .app-shell{padding:14px}
      .panel{padding:18px}
      .brand h1{font-size:22px}
      .mobile-only{display:block}
      .stat-card .stat-value{font-size:30px}
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const state = {
      me: null,
      route: window.location.pathname,
      clients: [],
      selectedClient: null,
      adminClientDetail: null,
      appData: null,
      loading: false,
      message: "",
      error: "",
      draftPassword: "",
      pendingPlanEdit: null,
      needsAdminBootstrap: false,
      autoSaveStatus: ""
    };
    let dailyLogAutoSaveTimer = null;
    let dayRolloverTimer = null;
    let workoutDraftStatus = "";

    const intakeSections = [
      { key: "profile", title: "Profile", fields: [
        ["fullName", "Full name"], ["age", "Age"], ["heightCm", "Height (cm)"], ["weightKg", "Weight (kg)"], ["sex", "Sex"], ["location", "Location"]
      ]},
      { key: "bodyComposition", title: "Body Composition", fields: [
        ["bodyFat", "Body fat %"], ["targetBodyFat", "Target body fat %"], ["goalType", "Goal type"]
      ]},
      { key: "training", title: "Training", fields: [
        ["daysPerWeek", "Days / week"], ["sessionDuration", "Session duration"], ["trainingTime", "Training time"], ["gymAccess", "Gym access"], ["cardioPreference", "Cardio preference"]
      ]},
      { key: "injuriesMedical", title: "Injuries & Medical", fields: [
        ["injuries", "Injuries"], ["rehabConstraints", "Rehab constraints"], ["medications", "Medications"], ["supplements", "Supplements"]
      ]},
      { key: "diet", title: "Diet", fields: [
        ["dietStyle", "Diet style"], ["cuisineStyle", "Cuisine style"], ["mealsPerDay", "Meals / day"], ["allergies", "Allergies"], ["preferences", "Preferences"]
      ]},
      { key: "lifestyle", title: "Lifestyle", fields: [
        ["sleepHours", "Sleep hours"], ["activityLevel", "Activity level"], ["workPattern", "Work pattern"]
      ]},
      { key: "notes", title: "Notes", fields: [
        ["coachNotes", "Notes"]
      ]}
    ];

    function setRoute(path){
      state.route = path;
      history.pushState({}, "", path);
      render();
      void bootstrapForRoute();
    }

    window.addEventListener("popstate", () => {
      state.route = window.location.pathname;
      render();
      void bootstrapForRoute();
    });

    function el(strings, ...values){
      return strings.reduce((acc, str, i) => acc + str + (values[i] ?? ""), "");
    }

    async function api(path, options = {}){
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        credentials: "include",
        ...options
      });
      const text = await res.text();
      let json = {};
      try { json = text ? JSON.parse(text) : {}; } catch {}
      if(!res.ok){
        throw new Error(json.error || "Request failed");
      }
      return json;
    }

    function setFlash(message, isError = false){
      state.message = isError ? "" : message;
      state.error = isError ? message : "";
      render();
    }

    function updateAutoSaveStatus(text){
      state.autoSaveStatus = text;
      const node = document.getElementById("autosave-status");
      if(node) node.textContent = text;
    }

    function updateWorkoutDraftStatus(text){
      workoutDraftStatus = text;
      const node = document.getElementById("workout-draft-status");
      if(node) node.textContent = text;
    }

    function requireAuth(role){
      if(!state.me){
        setRoute("/login");
        return false;
      }
      if(role && state.me.role !== role){
        setRoute(state.me.role === "admin" ? "/admin" : "/app");
        return false;
      }
      return true;
    }

    async function bootstrap(){
      try{
        const res = await api("/api/me", { method: "GET", headers: {} });
        state.me = res.user;
        if(!state.me){
          const bootstrap = await api("/api/bootstrap-admin-check", { method: "GET", headers: {} });
          state.needsAdminBootstrap = !!bootstrap.needsAdminBootstrap;
        } else {
          state.needsAdminBootstrap = false;
        }
      }catch{
        state.me = null;
        try{
          const bootstrap = await api("/api/bootstrap-admin-check", { method: "GET", headers: {} });
          state.needsAdminBootstrap = !!bootstrap.needsAdminBootstrap;
        }catch{}
      }
      render();
      await bootstrapForRoute();
    }

    async function bootstrapForRoute(){
      const path = state.route;
      if(path === "/login") return;
      if(state.me?.mustChangePassword) return;
      if(path.startsWith("/admin")){
        if(!requireAuth("admin")) return;
        state.clients = (await api("/api/admin/clients", { method: "GET", headers: {} })).clients;
        const match = path.match(/^\/admin\/clients\/([^/]+)$/);
        if(match){
          state.adminClientDetail = await api("/api/admin/clients/" + match[1], { method: "GET", headers: {} });
          state.pendingPlanEdit = normalizeEditablePlan(state.adminClientDetail.plan?.effectivePlan || state.adminClientDetail.plan?.generated_json || {});
        } else {
          state.adminClientDetail = null;
        }
      } else if(path.startsWith("/app")){
        if(!requireAuth("client")) return;
        state.appData = await api("/api/app/bootstrap", { method: "GET", headers: {} });
      } else {
        if(state.me){
          setRoute(state.me.role === "admin" ? "/admin" : "/app");
          return;
        }
        setRoute("/login");
        return;
      }
      render();
    }

    async function handleLogin(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      try{
        const res = await api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            username: form.get("username"),
            password: form.get("password")
          })
        });
        state.me = res.user;
        setFlash("Logged in.");
        setRoute(state.me.mustChangePassword ? "/app/password" : (state.me.role === "admin" ? "/admin" : "/app"));
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function bootstrapAdmin(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      try{
        await api("/api/bootstrap-admin", {
          method: "POST",
          body: JSON.stringify({
            username: form.get("username"),
            password: form.get("password")
          })
        });
        setFlash("Admin created. You can log in now.");
        state.needsAdminBootstrap = false;
        render();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function logout(){
      await api("/api/auth/logout", { method: "POST", body: "{}" });
      state.me = null;
      state.clients = [];
      state.adminClientDetail = null;
      state.appData = null;
      setRoute("/login");
    }

    async function createClient(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      try{
        const res = await api("/api/admin/clients", {
          method: "POST",
          body: JSON.stringify({
            fullName: form.get("fullName"),
            username: form.get("username")
          })
        });
        state.draftPassword = res.temporaryPassword;
        setFlash("Client created. Save the temporary password now.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function resetPassword(clientId){
      try{
        const res = await api("/api/admin/clients/" + clientId + "/reset-password", {
          method: "POST",
          body: "{}"
        });
        state.draftPassword = res.temporaryPassword;
        setFlash("Temporary password reset. Save it now.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function saveIntake(ev, clientId){
      ev.preventDefault();
      const form = new FormData(ev.target);
      const payload = {};
      for (const section of intakeSections){
        payload[section.key] = {};
        for (const [field] of section.fields){
          payload[section.key][field] = form.get(section.key + "." + field) || "";
        }
      }
      try{
        if(clientId){
          await api("/api/clients/" + clientId + "/intake", { method: "POST", body: JSON.stringify({ answers: payload, complete: true }) });
        } else {
          await api("/api/app/intake", { method: "POST", body: JSON.stringify({ answers: payload, complete: true }) });
        }
        setFlash("Intake saved.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function generatePlan(clientId){
      try{
        await api("/api/admin/clients/" + clientId + "/generate-plan", { method: "POST", body: "{}" });
        setFlash("Plan draft generated.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function savePlanEdits(clientId){
      try{
        const edited = collectPlanEditForm();
        await api("/api/admin/clients/" + clientId + "/plan", {
          method: "PATCH",
          body: JSON.stringify({ editedPlan: edited })
        });
        setFlash("Plan edits saved.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message || "Plan edits could not be saved.", true);
      }
    }

    async function publishPlan(clientId, publish){
      try{
        await api("/api/admin/clients/" + clientId + "/publish-plan", {
          method: "POST",
          body: JSON.stringify({ publish })
        });
        setFlash(publish ? "Plan published." : "Plan unpublished.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    function currentDailyPayload(date){
      const current = state.appData?.dailyLog || {};
      return {
        log_date: date || current.log_date || new Date().toISOString().slice(0, 10),
        meals_json: current.meals_json || {},
        workout_json: current.workout_json || {},
        macros_json: current.macros_json || {},
        hydration: Number(current.hydration || 0),
        steps: Number(current.steps || 0),
        cardio: current.cardio || "",
        notes: current.notes || ""
      };
    }

    async function persistDailyLog(date, next, showFlash, successMessage){
      try{
        await api("/api/app/daily-log/" + date, {
          method: "PUT",
          body: JSON.stringify({
            meals: next.meals_json || {},
            workout: next.workout_json || {},
            macros: next.macros_json || {},
            hydration: Number(next.hydration || 0),
            steps: Number(next.steps || 0),
            cardio: next.cardio || "",
            notes: next.notes || ""
          })
        });
        if(state.appData){
          state.appData.dailyLog = { ...(state.appData.dailyLog || {}), ...next, log_date: date };
        }
        if(showFlash){
          setFlash(successMessage);
          await bootstrapForRoute();
        }
      }catch(err){
        if(showFlash) setFlash(err.message, true);
        throw err;
      }
    }

    async function saveDietLog(ev){
      ev.preventDefault();
      const formEl = ev.target;
      const form = new FormData(formEl);
      const date = form.get("logDate");
      const meals = {
        breakfast: form.get("breakfast") || "",
        lunch: form.get("lunch") || "",
        dinner: form.get("dinner") || "",
        snacks: form.get("snacks") || ""
      };
      const autoMacros = calcMealMacros(state.appData?.plan, meals);
      const current = currentDailyPayload(date);
      const next = {
        ...current,
        meals_json: meals,
        macros_json: {
          calories: autoMacros.calories,
          protein: autoMacros.protein,
          carbs: autoMacros.carbs,
          fat: autoMacros.fat
        },
        hydration: Number(form.get("hydration") || 0),
        steps: Number(form.get("steps") || 0),
        notes: form.get("notes") || ""
      };
      try{
        updateAutoSaveStatus("Saved at " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }));
        await persistDailyLog(date, next, true, "Diet log saved.");
      }catch(err){
        updateAutoSaveStatus("Auto-save failed");
      }
    }

    function attachDietLogEnhancements(){
      const form = document.getElementById("diet-log-form");
      if(!form) return;
      if(dailyLogAutoSaveTimer) clearTimeout(dailyLogAutoSaveTimer);
      if(dayRolloverTimer) clearInterval(dayRolloverTimer);
      const scheduleAutoSave = () => {
        updateMacroInputsFromMeals(form);
        updateAutoSaveStatus("Saving...");
        clearTimeout(dailyLogAutoSaveTimer);
        dailyLogAutoSaveTimer = setTimeout(() => {
          const liveForm = document.getElementById("diet-log-form");
          if(liveForm){
            const data = new FormData(liveForm);
            const date = data.get("logDate");
            const meals = {
              breakfast: data.get("breakfast") || "",
              lunch: data.get("lunch") || "",
              dinner: data.get("dinner") || "",
              snacks: data.get("snacks") || ""
            };
            const autoMacros = calcMealMacros(state.appData?.plan, meals);
            const current = currentDailyPayload(date);
            const next = {
              ...current,
              meals_json: meals,
              macros_json: autoMacros,
              hydration: Number(data.get("hydration") || 0),
              steps: Number(data.get("steps") || 0),
              notes: data.get("notes") || ""
            };
            void persistDailyLog(date, next, false, "");
          }
        }, 1200);
      };
      form.querySelectorAll("input, textarea, select").forEach((field) => {
        field.addEventListener("input", scheduleAutoSave);
        field.addEventListener("change", scheduleAutoSave);
      });
      updateMacroInputsFromMeals(form);
      dayRolloverTimer = setInterval(() => {
        const liveForm = document.getElementById("diet-log-form");
        if(!liveForm) return;
        const dateInput = liveForm.querySelector('input[name="logDate"]');
        const today = new Date().toISOString().slice(0, 10);
        if(dateInput && dateInput.value !== today){
          const event = { preventDefault(){}, target: liveForm };
          void saveDietLog(event).finally(async () => { await bootstrapForRoute(); });
        }
      }, 60000);
    }

    async function saveCheckin(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      try{
        await api("/api/app/checkins", {
          method: "POST",
          body: JSON.stringify({
            checkinDate: form.get("checkinDate"),
            weight: Number(form.get("weight") || 0),
            bodyFat: Number(form.get("bodyFat") || 0),
            waist: Number(form.get("waist") || 0),
            hips: Number(form.get("hips") || 0),
            notes: form.get("checkinNotes") || ""
          })
        });
        setFlash("Check-in saved.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function saveWorkoutLog(ev){
      ev.preventDefault();
      const formEl = ev.target;
      syncWorkoutFormToState(formEl);
      const form = new FormData(formEl);
      const date = form.get("logDate");
      const workoutSession = form.get("workoutSession") || "";
      const current = currentDailyPayload(date);
      const currentEntries = current.workout_json?.entries || {};
      const exerciseEntries = { ...currentEntries };
      getWorkoutExercises(state.appData?.plan, workoutSession).forEach((exercise) => {
        exerciseEntries[exercise.id] = {
          sets: readExerciseSetState(formEl, exercise),
          weight: form.get(`weight_${exercise.id}`) || ""
        };
      });
      const next = {
        ...current,
        cardio: form.get("cardio") || "",
        workout_json: {
          session: workoutSession,
          exercises: getWorkoutSession(state.appData?.plan, workoutSession)?.exercises || [],
          entries: exerciseEntries,
          completed: form.get("workoutCompleted") === "on",
          notes: form.get("workoutNotes") || ""
        }
      };
      try{
        updateWorkoutDraftStatus("Submitting workout...");
        await persistDailyLog(date, next, true, "Workout log saved.");
        updateWorkoutDraftStatus("Workout saved at " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }));
      }catch(err){
        updateWorkoutDraftStatus("Workout save failed");
        setFlash(err.message, true);
      }
    }

    async function saveWeeklyReview(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      const weekKey = form.get("weekKey");
      try{
        await api("/api/app/weekly-review/" + weekKey, {
          method: "PUT",
          body: JSON.stringify({
            weight: form.get("reviewWeight") === "on",
            workouts: form.get("reviewWorkouts") === "on",
            protein: form.get("reviewProtein") === "on",
            sleep: form.get("reviewSleep") === "on"
          })
        });
        setFlash("Weekly review saved.");
        await bootstrapForRoute();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function changePassword(ev){
      ev.preventDefault();

    function attachWorkoutLogEnhancements(){
      const form = document.getElementById("workout-log-form");
      if(!form) return;
      const sync = () => {
        syncWorkoutFormToState(form);
        const selected = form.querySelector('[name="workoutSession"]')?.value || "";
        const container = document.getElementById("workout-cards");
        const entries = state.appData?.dailyLog?.workout_json?.entries || {};
        if(container){
          container.innerHTML = renderWorkoutExerciseCards(state.appData?.plan, selected, entries);
          bindWorkoutSetButtons(form);
        }
        updateWorkoutDraftStatus(selected ? "Tap sets and enter weight, then press Submit Workout." : "Select today's workout to start logging.");
      };
      form.querySelector('[name="workoutSession"]')?.addEventListener("change", sync);
      form.addEventListener("input", () => {
        syncWorkoutFormToState(form);
        updateWorkoutDraftStatus("Workout updated. Press Submit Workout to save.");
      });
      form.addEventListener("change", () => {
        syncWorkoutFormToState(form);
        updateWorkoutDraftStatus("Workout updated. Press Submit Workout to save.");
      });
      sync();
    }

    function bindWorkoutSetButtons(form){
      const container = document.getElementById("workout-cards");
      if(!container) return;
      container.onchange = (ev) => {
        const check = ev.target.closest(".set-check");
        if(!check || !container.contains(check)) return;
        check.closest(".set-toggle-wrap")?.classList.toggle("active", check.checked);
        const exerciseId = check.dataset.exerciseId;
        const setIndex = Number(check.dataset.setIndex);
        const hidden = form.querySelector(`[name="sets_${exerciseId}"]`);
        const exercise = getWorkoutExercises(state.appData?.plan, form.querySelector('[name="workoutSession"]')?.value || "").find(item => item.id === exerciseId);
        const current = exercise ? readExerciseSetState(form, exercise) : safeJson(hidden?.value, []);
        if(hidden) hidden.value = JSON.stringify(current);
        syncWorkoutFormToState(form);
        updateWorkoutDraftStatus(`Set ${setIndex + 1} ${check.checked ? "completed" : "cleared"}. Press Submit Workout to save.`);
      };
    }

    function readExerciseSetState(form, exercise){
      return Array.from({ length: exercise.sets }).map((_, idx) => {
        const node = form.querySelector(`[name="set_${exercise.id}_${idx}"]`);
        return !!node?.checked;
      });
    }

    function syncWorkoutFormToState(form){
      if(!form || !state.appData) return;
      const date = form.querySelector('[name="logDate"]')?.value || state.appData.dailyLog?.log_date || new Date().toISOString().slice(0, 10);
      const workoutSession = form.querySelector('[name="workoutSession"]')?.value || "";
      const base = currentDailyPayload(date);
      const existingEntries = { ...(base.workout_json?.entries || {}) };
      getWorkoutExercises(state.appData?.plan, workoutSession).forEach((exercise) => {
        const hidden = form.querySelector(`[name="sets_${exercise.id}"]`);
        const weight = form.querySelector(`[name="weight_${exercise.id}"]`);
        const sets = readExerciseSetState(form, exercise);
        if(hidden) hidden.value = JSON.stringify(sets);
        existingEntries[exercise.id] = {
          sets,
          weight: weight?.value || ""
        };
      });
      state.appData.dailyLog = {
        ...base,
        log_date: date,
        cardio: form.querySelector('[name="cardio"]')?.value || base.cardio || "",
        workout_json: {
          ...(base.workout_json || {}),
          session: workoutSession,
          exercises: getWorkoutSession(state.appData?.plan, workoutSession)?.exercises || [],
          entries: existingEntries,
          completed: !!form.querySelector('[name="workoutCompleted"]')?.checked,
          notes: form.querySelector('[name="workoutNotes"]')?.value || ""
        }
      };
    }

    function collectPlanEditForm(){
      const form = document.getElementById("plan-edit-form");
      if(!form) return normalizeEditablePlan(state.pendingPlanEdit || {});
      const data = new FormData(form);
      const parseList = (value) => String(value || "").split("\n").map(item => item.trim()).filter(Boolean);
      const parseSectioned = (value, keyName, valueName, mapItem = (item) => item) => String(value || "")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const separator = line.indexOf(":");
          const head = separator >= 0 ? line.slice(0, separator).trim() : line;
          const tail = separator >= 0 ? line.slice(separator + 1) : "";
          return {
            [keyName]: head,
            [valueName]: tail.split("|").map(item => item.trim()).filter(Boolean).map(mapItem)
          };
        })
        .filter(item => item[keyName]);
      const edited = {
        profileSummary: String(data.get("profileSummary") || "").trim(),
        calorieTarget: String(data.get("calorieTarget") || "").trim(),
        macros: {
          protein: String(data.get("macroProtein") || "").trim(),
          carbs: String(data.get("macroCarbs") || "").trim(),
          fat: String(data.get("macroFat") || "").trim()
        },
        mealOptions: parseSectioned(data.get("mealOptions"), "meal", "options", parseMealOptionText),
        weeklyMealStructure: parseList(data.get("weeklyMealStructure")),
        supplements: parseList(data.get("supplements")),
        workoutSplit: parseSectioned(data.get("workoutSplit"), "day", "exercises"),
        progressMilestones: parseList(data.get("progressMilestones")),
        successRules: parseList(data.get("successRules")),
        cautions: parseList(data.get("cautions"))
      };
      state.pendingPlanEdit = edited;
      return edited;
    }

    function escapeHtml(value){
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function normalizeMealSection(section){
      return {
        meal: section?.meal || "",
        options: Array.isArray(section?.options) ? section.options.map(normalizeMealOption).filter(Boolean) : []
      };
    }

    function normalizeMealOption(option){
      if(!option) return null;
      if(typeof option === "string") return { label: option, calories: 0, protein: 0, carbs: 0, fat: 0 };
      return {
        label: option.label || option.name || "",
        calories: Number(option.calories || 0),
        protein: Number(option.protein || 0),
        carbs: Number(option.carbs || 0),
        fat: Number(option.fat || 0)
      };
    }

    function formatMealOptionLine(option){
      const item = normalizeMealOption(option) || { label: "" };
      const macroText = `${item.calories || 0} kcal, P${item.protein || 0} C${item.carbs || 0} F${item.fat || 0}`;
      return `${item.label || ""} [${macroText}]`;
    }

    function parseMealOptionText(text){
      const raw = String(text || "").trim();
      const match = raw.match(/^(.*?)\s*\[(.*?)\]\s*$/);
      if(!match) return { label: raw, calories: 0, protein: 0, carbs: 0, fat: 0 };
      const label = match[1].trim();
      const meta = match[2];
      const read = (pattern) => {
        const found = meta.match(pattern);
        return found ? Number(found[1]) : 0;
      };
      return {
        label,
        calories: read(/(\d+(?:\.\d+)?)\s*kcal/i),
        protein: read(/P\s*(\d+(?:\.\d+)?)/i),
        carbs: read(/C\s*(\d+(?:\.\d+)?)/i),
        fat: read(/F\s*(\d+(?:\.\d+)?)/i)
      };
    }

    function getPlanMealSection(plan, mealName){
      const data = plan?.effectivePlan || plan || {};
      return (data.mealOptions || []).map(normalizeMealSection).find(section => section.meal?.toLowerCase() === mealName.toLowerCase()) || null;
    }

    function renderMealSelect(name, section, selectedValue){
      const options = section?.options || [];

        <select name="${name}">
          <option value="">Select an option</option>

        </select>
      `;
    }

    function findMealOption(plan, mealName, label){
      const section = getPlanMealSection(plan, mealName);
      if(!section) return null;
      return (section.options || []).find(option => option.label === label) || null;
    }

    function getWorkoutSessions(plan){
      const data = plan?.effectivePlan || plan || {};
      return Array.isArray(data.workoutSplit) ? data.workoutSplit : [];
    }

    function getWorkoutSession(plan, dayName){
      return getWorkoutSessions(plan).find(item => item.day === dayName) || null;
    }

    function slugify(value){
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function parseWorkoutExercise(raw, index){
      const text = String(raw || "").trim();
      const match = text.match(/^(.*?)(?:\s+(\d+)\s*[x×]\s*([0-9A-Za-z+\-\/ ]+))?(?:\s*@\s*(.+))?$/);
      const name = (match?.[1] || text).trim();
      const sets = Number(match?.[2] || 3);
      const reps = (match?.[3] || "8-12").trim();
      const target = (match?.[4] || "").trim();
      return {
        id: `${slugify(name)}-${index}`,
        name,
        sets,
        reps,
        target
      };
    }

    function getWorkoutExercises(plan, dayName){
      const session = getWorkoutSession(plan, dayName);
      if(!session) return [];
      return (session.exercises || []).map((exercise, index) => parseWorkoutExercise(exercise, index));
    }

    function calcMealMacros(plan, meals){
      const totals = { calories: 0, protein: 0, carbs: 0, fat: 0 };
      ["breakfast","lunch","dinner"].forEach((mealName) => {
        const option = findMealOption(plan, mealName, meals?.[mealName] || "");
        if(option){
          totals.calories += Number(option.calories || 0);
          totals.protein += Number(option.protein || 0);
          totals.carbs += Number(option.carbs || 0);
          totals.fat += Number(option.fat || 0);
        }
      });
      return totals;
    }

    function updateMacroInputsFromMeals(formEl){
      if(!formEl) return;
      const meals = {
        breakfast: formEl.querySelector('[name="breakfast"]')?.value || "",
        lunch: formEl.querySelector('[name="lunch"]')?.value || "",
        dinner: formEl.querySelector('[name="dinner"]')?.value || ""
      };
      const totals = calcMealMacros(state.appData?.plan, meals);
      const setField = (name, value) => {
        const input = formEl.querySelector(`[name="${name}"]`);
        if(input) input.value = value;
      };
      setField("calories", totals.calories);
      setField("protein", totals.protein);
      setField("carbs", totals.carbs);
      setField("fat", totals.fat);
    }

    function currentWeekKey(){
      const now = new Date();
      return now.getFullYear() + "-W" + Math.ceil((((now - new Date(now.getFullYear(),0,1)) / 86400000) + new Date(now.getFullYear(),0,1).getDay() + 1) / 7);
    }

    function weekLabelFromDate(value){
      const date = new Date(value);
      if(Number.isNaN(date.getTime())) return "Week";
      return date.toLocaleDateString("en-IN", { day: "numeric", month: "short" });
    }

    function buildWeeklyProgressSeries(checkins){
      const list = Array.isArray(checkins) ? [...checkins] : [];
      list.sort((a, b) => String(a.checkin_date || "").localeCompare(String(b.checkin_date || "")));
      const byWeek = new Map();
      list.forEach((item) => {
        const date = new Date(item.checkin_date || item.updated_at || "");
        if(Number.isNaN(date.getTime())) return;
        const start = new Date(date);
        const day = start.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        start.setDate(start.getDate() + diff);
        const key = start.toISOString().slice(0, 10);
        byWeek.set(key, {
          key,
          label: weekLabelFromDate(start),
          weight: Number(item.weight || 0),
          bodyFat: Number(item.body_fat || 0),
          sourceDate: item.checkin_date || ""
        });
      });
      return Array.from(byWeek.values()).filter(item => item.weight > 0).slice(-8);
    }

    function renderProgressChart(checkins){
      const series = buildWeeklyProgressSeries(checkins);
      if(series.length < 2){
        return '<div class="empty">Add at least two weekly check-ins to see your progression graph.</div>';
      }
      const weights = series.map(item => item.weight);
      const min = Math.min(...weights);
      const max = Math.max(...weights);
      const pad = Math.max(1, (max - min) * 0.18);
      const chartMin = min - pad;
      const chartMax = max + pad;
      const width = 320;
      const height = 140;
      const points = series.map((item, index) => {
        const x = 18 + (index * ((width - 36) / Math.max(1, series.length - 1)));
        const y = height - 18 - (((item.weight - chartMin) / Math.max(1, chartMax - chartMin)) * (height - 40));
        return { ...item, x, y };
      });
      const polyline = points.map(point => `${point.x},${point.y}`).join(" ");
      const latest = series[series.length - 1];
      const first = series[0];
      const delta = (latest.weight - first.weight).toFixed(1);
      return `
        <div class="progress-chart">
          <div class="progress-meta">
            <div class="progress-metric">
              <span class="subtle">Latest weight</span>
              <strong>${latest.weight.toFixed(1)} kg</strong>
            </div>
            <div class="progress-metric" style="text-align:right">
              <span class="subtle">Change</span>
              <strong style="color:${Number(delta) <= 0 ? 'var(--lime)' : 'var(--accent)'}">${delta > 0 ? "+" : ""}${delta} kg</strong>
            </div>
          </div>
          <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Weekly weight progression">
            <defs>
              <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ff5c28" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#ff5c28" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <line x1="18" y1="${height - 18}" x2="${width - 18}" y2="${height - 18}" stroke="#1a2e48" stroke-width="1"/>
            <polyline fill="none" stroke="#ff5c28" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${polyline}"></polyline>
            ${points.map(point => `<circle cx="${point.x}" cy="${point.y}" r="4" fill="#00cba8" stroke="#060d18" stroke-width="2"></circle>`).join("")}
          </svg>
          <div class="progress-chart-labels">
            ${series.map(item => `<div>${escapeHtml(item.label)}<br/>${item.weight.toFixed(1)}</div>`).join("")}
          </div>
        </div>
      `;
    }

    function getExerciseHistory(logs, exerciseId){
      const list = Array.isArray(logs) ? logs : [];
      return list
        .map((log) => {
          const entry = log?.workout_json?.entries?.[exerciseId];
          const weight = Number(entry?.weight || 0);
          return weight > 0 ? {
            date: log.log_date || "",
            weight
          } : null;
        })
        .filter(Boolean)
        .sort((a, b) => String(a.date).localeCompare(String(b.date)))
        .slice(-6);
    }

    function renderExerciseSparkline(history){
      if(!history.length){
        return `<div class="exercise-history-meta">Log this exercise to build a progression trend.</div>`;
      }
      if(history.length === 1){
        return `<div class="exercise-history-meta">Only one workout logged so far.</div>`;
      }
      const min = Math.min(...history.map(item => item.weight));
      const max = Math.max(...history.map(item => item.weight));
      const width = 240;
      const height = 30;
      const points = history.map((item, index) => {
        const x = 8 + (index * ((width - 16) / Math.max(1, history.length - 1)));
        const y = height - 7 - (((item.weight - min) / Math.max(1, max - min || 1)) * (height - 14));
        return `${x},${y}`;
      }).join(" ");
      return `
        <svg class="exercise-sparkline" viewBox="0 0 ${width} ${height}" role="img" aria-label="Exercise progression">
          <polyline fill="none" stroke="#00cba8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${points}"></polyline>
          ${history.map((item, index) => {
            const x = 8 + (index * ((width - 16) / Math.max(1, history.length - 1)));
            const y = height - 7 - (((item.weight - min) / Math.max(1, max - min || 1)) * (height - 14));
            return `<circle cx="${x}" cy="${y}" r="2.5" fill="#ff5c28"></circle>`;
          }).join("")}
        </svg>
      `;
    }

                </div>
                <div class="client-panel">
                  <div class="client-panel-eyebrow">Macros (Auto-Calculated)</div>
                  <div class="client-stat-grid" style="margin-top:10px">
                    <div class="client-stat-card"><div class="client-stat-value"><input name="calories" value="${dailyLog.macros_json?.calories || 0}" readonly style="background:transparent;border:none;padding:0;text-align:center;font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--accent)"/></div><div class="client-stat-label">Calories</div></div>
                    <div class="client-stat-card"><div class="client-stat-value"><input name="protein" value="${dailyLog.macros_json?.protein || 0}" readonly style="background:transparent;border:none;padding:0;text-align:center;font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--teal)"/></div><div class="client-stat-label">Protein g</div></div>
                    <div class="client-stat-card"><div class="client-stat-value"><input name="carbs" value="${dailyLog.macros_json?.carbs || 0}" readonly style="background:transparent;border:none;padding:0;text-align:center;font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--gold)"/></div><div class="client-stat-label">Carbs g</div></div>
                  </div>
                  <div style="margin-top:10px"><input name="fat" value="${dailyLog.macros_json?.fat || 0}" readonly style="display:none"/></div>
                </div>
                <div class="client-panel">
                  <div class="client-panel-eyebrow">Activity</div>
                  <div class="grid cols-2" style="margin-top:10px">
                    <label><span>💧 Hydration (L)</span><input name="hydration" value="${dailyLog.hydration || 0}" type="number" step="0.1"/></label>
                    <label><span>👟 Steps</span><input name="steps" value="${dailyLog.steps || 0}" type="number"/></label>
                  </div>
                  <div class="grid" style="margin-top:12px">
                    <label><span>📝 Notes</span><textarea name="notes" placeholder="How did today go?">${escapeHtml(dailyLog.notes || "")}</textarea></label>
                    <button class="action-btn" type="submit" style="width:100%;justify-content:center">Save Diet Log</button>
                  </div>
                </div>
              </form>
            </div>
          `;

        } else if(path === "/app/workout"){
          const selectedWorkout = dailyLog.workout_json?.session || "";
          content = `
            <div class="grid">
              ${flash}
              <form class="grid" id="workout-log-form">
                <div class="client-panel">
                  <div class="client-panel-eyebrow">Workout Log</div>
                  <h3 style="margin-top:4px">Track Training</h3>
                  <p class="subtle" style="margin-top:4px;margin-bottom:14px">Pick today's session, tap completed sets, enter weights.</p>
                  <div class="grid">
                    <label><span>Date</span><input name="logDate" value="${dailyLog.log_date || today}" required/></label>
                    <label><span>Today's Session</span>${renderWorkoutSelect(app.plan, selectedWorkout)}</label>
                  </div>
                </div>
                <div class="grid" id="workout-cards">${renderWorkoutExerciseCards(app.plan, selectedWorkout, dailyLog.workout_json?.entries || {})}</div>
                <div class="client-panel">
                  <label><span>🏃 Cardio</span><input name="cardio" value="${escapeHtml(dailyLog.cardio || "")}" placeholder="e.g. 20 min walk"/></label>
                  <label style="margin-top:12px"><span>📝 Workout Notes</span><textarea name="workoutNotes" placeholder="How did the session feel?">${escapeHtml(dailyLog.workout_json?.notes || "")}</textarea></label>
                  <label style="margin-top:10px;display:flex;align-items:center;gap:8px"><input type="checkbox" name="workoutCompleted" ${dailyLog.workout_json?.completed ? "checked" : ""}/> <span style="display:inline;font-size:13.5px;color:var(--text);text-transform:none;letter-spacing:0">Workout completed</span></label>
                </div>
                <div class="workout-submit-bar">
                  <div class="workout-status" id="workout-draft-status">${workoutDraftStatus || "Tap sets and enter weight, then press Submit Workout."}</div>
                  <button class="action-btn" type="submit" style="width:100%;justify-content:center">Submit Workout →</button>
                </div>
              </form>
              <div class="grid cols-2">
                <div class="client-panel">
                  <div class="client-panel-eyebrow">Weekly Check-in</div>
                  <h3 style="margin-top:4px">Body Stats</h3>
                  <form class="grid" id="checkin-form" style="margin-top:12px">
                    <label><span>Date</span><input name="checkinDate" value="${today}" required/></label>
                    <div class="grid cols-2">
                      <label><span>⚖️ Weight (kg)</span><input name="weight"/></label>
                      <label><span>📊 Body fat %</span><input name="bodyFat"/></label>
                      <label><span>📏 Waist (cm)</span><input name="waist"/></label>
                      <label><span>📏 Hips (cm)</span><input name="hips"/></label>
                    </div>
                    <label><span>📝 Notes</span><textarea name="checkinNotes" style="min-height:70px"></textarea></label>
                    <button class="action-btn" type="submit" style="width:100%;justify-content:center">Save Check-in</button>
                  </form>
                </div>
                <div class="grid" style="gap:10px">
                  <div class="client-panel">
                    <div class="client-panel-eyebrow">Weekly Review</div>
                    <form class="grid" id="review-form" style="margin-top:8px">
                      <input name="weekKey" value="${app.weeklyReview?.week_key || currentWeekKey()}" style="display:none"/>
                      <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" name="reviewWeight" ${review.weight ? "checked" : ""}/><span style="display:inline;font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">⚖️ Weight tracked</span></label>
                      <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" name="reviewWorkouts" ${review.workouts ? "checked" : ""}/><span style="display:inline;font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">💪 Workouts done</span></label>
                      <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" name="reviewProtein" ${review.protein ? "checked" : ""}/><span style="display:inline;font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">🥩 Protein hit</span></label>
                      <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" name="reviewSleep" ${review.sleep ? "checked" : ""}/><span style="display:inline;font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">😴 Sleep target</span></label>
                      <button class="action-btn" type="submit" style="width:100%;justify-content:center">Save Review</button>
                    </form>
                  </div>
                  <div class="client-panel">
                    <div class="client-panel-eyebrow">Account</div>
                    <form class="grid" id="password-form" style="margin-top:8px">
                      <label><span>Current password</span><input type="password" name="currentPassword" required/></label>
                      <label><span>New password</span><input type="password" name="newPassword" required/></label>
                      <button class="ghost-btn" type="submit" style="width:100%;justify-content:center">Change Password</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          `;
        }
      }

      /* ─── SHELL WRAPPER ─── */
      root.innerHTML = isAdmin ? `
        <div class="app-shell">
          <div class="topbar">
            <div class="brand">
              <div class="brand-eyebrow">Admin Console</div>
              <h1>Fitness Platform</h1>
              <div class="brand-sub">Signed in as <strong>${state.me?.username || ""}</strong></div>
            </div>
            <div class="top-actions">
              <button class="ghost-btn" id="logout-btn">Sign Out</button>
            </div>
          </div>
          <div class="layout">
            <aside class="sidebar">
              <div class="sidebar-label">Navigation</div>
              <nav>
                ${nav.map(([href, label]) => `<button class="nav-btn ${path === href ? "active" : ""}" data-nav="${href}"><span class="nav-icon">${href === "/admin" ? "⬡" : "◈"}</span>${label}</button>`).join("")}
              </nav>
            </aside>
            <main>${content}</main>
          </div>
        </div>
      ` : `
        <div class="client-app">
          <div class="client-header">
            <div class="client-header-row">
              <div class="client-brand">
                <div class="client-brand-icon">🔥</div>
                <div class="client-brand-text">
                  <div class="client-kicker">${state.me?.username || "client"}</div>
                  <div class="client-title">FitnessLog</div>
                </div>
              </div>
              <div class="client-header-right">
                <div class="client-date">${new Date().toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}</div>
                <div class="client-chip">
                  <span class="chip-dot" style="background:${app?.plan ? 'var(--lime)' : 'var(--accent)'}"></span>
                  ${app?.plan ? "Plan Live" : "Plan Pending"}
                </div>
                <div><button class="client-logout" id="logout-btn">Sign Out</button></div>
              </div>
            </div>
          </div>
          <div class="client-main">${content}</div>
          <div class="bottom-tabs">
            ${nav.map(([href, label]) => `<button class="bottom-tab ${path === href ? "active" : ""}" data-nav="${href}"><span class="bottom-tab-icon">${clientTabIcon(href)}</span><span class="bottom-tab-label">${clientTabLabel(href)}</span></button>`).join("")}
          </div>
        </div>
      `;

      /* ─── BIND EVENTS ─── */
      document.querySelectorAll("[data-nav]").forEach(btn => btn.onclick = () => setRoute(btn.dataset.nav));
      const logoutBtn = document.getElementById("logout-btn");
      if(logoutBtn) logoutBtn.onclick = logout;

      if(isAdmin && path === "/admin"){
        document.getElementById("create-client-form").onsubmit = createClient;
        document.getElementById("export-all").onclick = () => exportSheets(null);
        document.querySelectorAll(".open-client").forEach(btn => btn.onclick = () => setRoute("/admin/clients/" + btn.dataset.clientId));
      }

      if(isAdmin && state.adminClientDetail){
        const clientId = state.adminClientDetail.client.id;
        const intakeForm = document.querySelector("#admin-intake-form form");
        if(intakeForm) intakeForm.onsubmit = (ev) => saveIntake(ev, clientId);
        document.getElementById("toggle-intake-edit").onclick = () => toggleIntakeEdit(clientId, state.adminClientDetail.client.status !== "intake_open");
        document.getElementById("reset-password").onclick = () => resetPassword(clientId);
        document.getElementById("generate-plan").onclick = () => generatePlan(clientId);
        document.getElementById("save-plan").onclick = () => { savePlanEdits(clientId); };
        document.getElementById("publish-plan").onclick = () => publishPlan(clientId, true);
        const unpublish = document.getElementById("unpublish-plan");
        if(unpublish) unpublish.onclick = () => publishPlan(clientId, false);
        document.getElementById("export-client").onclick = () => exportSheets(clientId);
        document.getElementById("delete-client").onclick = () => deleteClient(clientId, state.adminClientDetail.client.full_name);
        const planEditForm = document.getElementById("plan-edit-form");
        if(planEditForm){
          planEditForm.oninput = () => collectPlanEditForm();
          planEditForm.onchange = () => collectPlanEditForm();
        }
      }

      if(!isAdmin && path === "/app/intake"){
        const intakeForm = document.querySelector("main form");
        if(intakeForm && state.appData?.canEditIntake) intakeForm.onsubmit = saveIntake;
        if(intakeForm && !state.appData?.canEditIntake){
          intakeForm.querySelectorAll("input, textarea, button").forEach(node => node.disabled = true);
        }
      }
      if(!isAdmin && path === "/app/diet"){
        document.getElementById("diet-log-form").onsubmit = saveDietLog;
        attachDietLogEnhancements();
      }
      if(!isAdmin && path === "/app/workout"){
        document.getElementById("workout-log-form").onsubmit = saveWorkoutLog;
        document.getElementById("checkin-form").onsubmit = saveCheckin;
        document.getElementById("review-form").onsubmit = saveWeeklyReview;
        document.getElementById("password-form").onsubmit = changePassword;
        attachWorkoutLogEnhancements();
      }
    }

    function safeJson(value, fallback){
      try{ return typeof value === "string" ? JSON.parse(value) : value; }catch{ return fallback; }
    }

    bootstrap();
  </script>
</body>
</html>
