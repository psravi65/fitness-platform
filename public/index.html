<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6bff8f">
  <title>GymLog · Fitness Platform</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons (Replaces Lucide for CDN usage) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (Compiles React JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- API Utility ---
    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        credentials: "include",
        ...options
      });
      const text = await res.text();
      let json = {};
      try { json = text ? JSON.parse(text) : {}; } catch {}
      if (!res.ok) throw new Error(json.error || "Request failed");
      return json;
    }

    // --- Global CSS ---
    const GlobalStyles = () => (
      <style>{`
        :root {
          --bg: #060d18; --surface: #0b1628; --surface-2: #0f1e35;
          --surface-3: #142642; --surface-4: #192e50;
          --border: #1a2e48; --border-bright: #243d60;
          --text: #e2eeff; --text-2: #7a9abf; --text-3: #3d5a7e;
          --accent: #6bff8f; --accent-dim: rgba(107,255,143,.12);
          --radius: 14px; --radius-lg: 20px;
        }
        body {
          background: var(--bg);
          color: var(--text);
          font-family: 'Plus Jakarta Sans', sans-serif;
          margin: 0; padding: 0; min-height: 100vh;
          background-image:
            radial-gradient(ellipse 60% 40% at 0% 0%, rgba(255,92,40,.07) 0%, transparent 60%),
            radial-gradient(ellipse 50% 40% at 100% 0%, rgba(107,255,143,.03) 0%, transparent 55%),
            radial-gradient(ellipse 40% 60% at 50% 100%, rgba(26,46,72,.4) 0%, transparent 70%);
        }
        .kinetic-gradient { background: linear-gradient(135deg, #6bff8f 0%, #0abc56 100%); }
        .action-btn {
          background: linear-gradient(135deg, var(--accent) 0%, #ff7a40 100%);
          color: #fff; border: none; padding: 12px 20px; border-radius: var(--radius);
          font-weight: 700; cursor: pointer; transition: all 0.2s;
          box-shadow: 0 4px 16px rgba(255,92,40,.28);
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(255,92,40,.4); }
        .ghost-btn {
          background: var(--surface-2); border: 1px solid var(--border-bright);
          color: var(--text); padding: 10px 18px; border-radius: var(--radius);
          font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .ghost-btn:hover { background: var(--surface-3); }
        input, select, textarea {
          background: var(--surface-2); color: var(--text);
          border: 1px solid var(--border-bright); border-radius: var(--radius);
          padding: 12px 16px; width: 100%; outline: none; transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
      `}</style>
    );

    // --- Components ---
    const FlashMessage = ({ error, message }) => {
      if (!error && !message) return null;
      return (
        <div className={`p-4 rounded-xl flex items-center gap-3 mb-6 ${error ? 'bg-red-500/10 border border-red-500/30 text-red-400' : 'bg-green-500/10 border border-green-500/30 text-green-400'}`}>
          <i className={`fa-solid ${error ? 'fa-triangle-exclamation' : 'fa-circle-check'} text-lg`}></i>
          <span className="text-sm font-medium">{error || message}</span>
        </div>
      );
    };

    // --- Login View ---
    const LoginView = ({ setMe, setFlash }) => {
      const [isBootstrap, setIsBootstrap] = useState(false);

      useEffect(() => {
        api('/api/bootstrap-admin-check').then(res => setIsBootstrap(res.needsAdminBootstrap)).catch(() => {});
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        try {
          const res = await api('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ username: e.target.username.value, password: e.target.password.value })
          });
          setMe(res.user);
          setFlash({ msg: "Logged in successfully." });
        } catch (err) {
          setFlash({ err: err.message });
        }
      };

      const handleBootstrap = async (e) => {
        e.preventDefault();
        try {
          await api('/api/bootstrap-admin', {
            method: 'POST',
            body: JSON.stringify({
              username: e.target.username.value,
              password: e.target.password.value,
              superadmin: e.target.superadmin.checked
            })
          });
          setFlash({ msg: "Account created. You can log in now." });
          setIsBootstrap(false);
        } catch (err) {
          setFlash({ err: err.message });
        }
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6">
          <div className="w-full max-w-md">
            <div className="text-center mb-10">
              <div className="inline-flex items-center justify-center w-20 h-20 kinetic-gradient rounded-2xl shadow-[0_0_40px_rgba(107,255,143,0.3)] mb-6">
                <i className="fa-solid fa-dumbbell text-4xl text-[#003a12]"></i>
              </div>
              <h1 className="text-3xl font-black text-white tracking-tight mb-2">GYMLOG</h1>
              <p className="text-[#6bff8f] text-xs font-bold tracking-widest uppercase">Your Private Coaching Space</p>
            </div>

            <div className="flex justify-center gap-6 mb-10 text-xs text-gray-400">
              <span className="flex items-center gap-2"><i className="fa-solid fa-lock text-[#6bff8f]"></i> Private Access</span>
              <span className="flex items-center gap-2"><i className="fa-solid fa-mobile-screen text-[#6bff8f]"></i> AI Personalised</span>
            </div>

            <div className="bg-[#1a1919] border border-[#6bff8f]/20 rounded-3xl p-8 shadow-2xl">
              <h2 className="text-xl font-bold text-white mb-2">Enter Your Access Code</h2>
              <p className="text-xs text-gray-400 mb-8">Your coach will share this with you personally</p>
              
              <form onSubmit={handleLogin} className="flex flex-col gap-5">
                <label>
                  <span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Username</span>
                  <input name="username" required className="bg-[#262626] border-[#6bff8f]/20 text-white" />
                </label>
                <label>
                  <span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Password</span>
                  <input type="password" name="password" required className="bg-[#262626] border-[#6bff8f]/20 text-white" />
                </label>
                <button type="submit" className="action-btn w-full mt-2 flex justify-center items-center gap-2">
                  Unlock My Plan <i className="fa-solid fa-arrow-right"></i>
                </button>
              </form>

              {isBootstrap && (
                <div className="mt-8 pt-8 border-t border-gray-800">
                  <h3 className="text-lg font-bold text-white mb-2">First Time Setup</h3>
                  <p className="text-xs text-gray-400 mb-6">Create the app owner (superadmin) account.</p>
                  <form onSubmit={handleBootstrap} className="flex flex-col gap-4">
                    <input name="username" placeholder="Admin Username" required className="bg-[#262626] text-white text-sm py-2 px-3" />
                    <input type="password" name="password" placeholder="Secure Password" required className="bg-[#262626] text-white text-sm py-2 px-3" />
                    <label className="flex items-center gap-3 text-sm text-gray-300">
                      <input type="checkbox" name="superadmin" className="w-4 h-4" /> I am the app owner
                    </label>
                    <button type="submit" className="ghost-btn w-full text-sm">Create Platform Account</button>
                  </form>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --- Client Dashboard ---
    const ClientDashboard = ({ appData }) => {
      const { client, plan } = appData || {};
      const isPlanLive = !!plan;

      return (
        <div className="p-5">
          <section className="mb-8">
            <h2 className="text-2xl font-black text-white tracking-tight">
              Good {new Date().getHours() < 12 ? 'morning' : 'evening'}, {client?.full_name?.split(' ')[0] || 'there'} 💪
            </h2>
            <p className="text-sm text-gray-400 mt-1">Ready for today's high-performance session?</p>
          </section>

          <section className="relative overflow-hidden rounded-3xl kinetic-gradient p-6 mb-6 shadow-lg shadow-green-500/20">
            <div className="absolute -right-4 -top-4 opacity-10 text-8xl">🔥</div>
            <div className="relative z-10">
              <p className="text-[10px] font-black uppercase tracking-[0.15em] text-[#003a12]/70 mb-1">Current Consistency</p>
              <h3 className="text-3xl font-black text-[#003a12]">Start Today 🔥</h3>
            </div>
          </section>

          <section className="mb-8">
            <div className="flex items-center justify-between mb-4">
              <h4 className="text-lg font-bold text-white">Today's Mission</h4>
              <span className="text-[10px] font-bold text-[#6bff8f] uppercase tracking-wider">Tasks</span>
            </div>

            <div className="bg-[#1a1919] border border-[#6bff8f]/20 border-l-4 border-l-[#6bff8f] rounded-xl p-4 flex items-center gap-4 mb-3">
              <div className="w-6 h-6 rounded-md border-2 border-[#6bff8f]/40 flex items-center justify-center"></div>
              <div className="flex-1">
                <div className="text-sm font-bold text-white">Complete today's workout</div>
                <div className="text-[10px] text-gray-400 mt-1 uppercase tracking-wider font-semibold">Main Objective</div>
              </div>
              <i className="fa-solid fa-chevron-right text-[#6bff8f]"></i>
            </div>

            <div className="bg-[#1a1919] border border-[#6bff8f]/20 border-l-4 border-l-[#6bff8f] rounded-xl p-4 flex items-center gap-4 mb-3">
              <div className="w-6 h-6 rounded-md border-2 border-[#6bff8f]/40 flex items-center justify-center"></div>
              <div className="flex-1">
                <div className="text-sm font-bold text-white">Log today's meals</div>
                <div className="text-[10px] text-gray-400 mt-1 uppercase tracking-wider font-semibold">Nutrition</div>
              </div>
              <i className="fa-solid fa-chevron-right text-[#6bff8f]"></i>
            </div>
          </section>

          <section className="bg-[#1a1919] border border-white/5 rounded-3xl p-6 mb-8">
            <div className="flex items-center justify-between mb-6">
              <h4 className="text-lg font-bold text-white">Fueling</h4>
              <i className="fa-solid fa-bolt text-gray-400"></i>
            </div>
            {!isPlanLive ? (
               <p className="text-sm text-gray-400">Macro targets will appear once your coach publishes your plan.</p>
            ) : (
              <div className="space-y-4">
                <div>
                  <div className="flex justify-between text-xs mb-2">
                    <span className="text-gray-400 uppercase tracking-widest font-bold">Calories</span>
                    <span className="font-bold text-white">0 / {plan.effectivePlan?.calorieTarget || 'N/A'} kcal</span>
                  </div>
                  <div className="h-2 bg-[#262626] rounded-full overflow-hidden">
                    <div className="h-full w-[10%] kinetic-gradient rounded-full"></div>
                  </div>
                </div>
              </div>
            )}
          </section>
        </div>
      );
    };

    // --- Client Intake View ---
    const ClientIntakeView = ({ appData }) => {
      const [saving, setSaving] = useState(false);
      
      const handleSave = async (e) => {
        e.preventDefault();
        setSaving(true);
        setTimeout(() => setSaving(false), 800); 
      };

      return (
        <div className="p-5">
          <div className="mb-6">
            <h2 className="text-2xl font-black text-white">Intake Form</h2>
            <p className="text-sm text-gray-400 mt-1">Tell your coach about your body, diet, and goals.</p>
          </div>
          <form onSubmit={handleSave} className="bg-[#1a1919] border border-white/5 rounded-3xl p-6 flex flex-col gap-5">
            <label>
              <span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Full Name</span>
              <input name="fullName" defaultValue={appData?.client?.full_name || ""} className="bg-[#262626] border-white/10 text-white" />
            </label>
            <label>
              <span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Primary Goal</span>
              <select name="goal" className="bg-[#262626] border-white/10 text-white">
                <option>Lose fat</option>
                <option>Build muscle</option>
                <option>Body recomposition</option>
              </select>
            </label>
            <label>
              <span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Diet Style</span>
              <select name="diet" className="bg-[#262626] border-white/10 text-white">
                <option>No restrictions</option>
                <option>Vegetarian</option>
                <option>Vegan</option>
              </select>
            </label>
            <label>
              <span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Current Injuries / Restrictions</span>
              <textarea name="notes" placeholder="e.g. Lower back pain, no heavy deadlifts" className="bg-[#262626] border-white/10 text-white min-h-[100px]"></textarea>
            </label>
            <button disabled={saving} className="action-btn w-full mt-4 flex justify-center">
              {saving ? 'Saving...' : 'Submit Intake'}
            </button>
          </form>
        </div>
      );
    };

    // --- Client Plan View ---
    const ClientPlanView = ({ appData }) => {
      const plan = appData?.plan?.effectivePlan;
      
      if (!plan) {
        return (
          <div className="p-5 text-center mt-20">
            <i className="fa-solid fa-clipboard-list text-gray-700 text-5xl mb-4"></i>
            <h3 className="text-lg font-bold text-white mb-2">Plan Pending</h3>
            <p className="text-sm text-gray-400">Your coach is currently building your personalized plan. Check back soon!</p>
          </div>
        );
      }

      return (
        <div className="p-5">
          <h2 className="text-2xl font-black text-white mb-6">Your Plan</h2>
          <div className="bg-[#1a1919] border border-[#6bff8f]/20 rounded-3xl p-6 mb-6">
            <h3 className="text-[#6bff8f] text-xs font-bold uppercase tracking-widest mb-3">Profile Summary</h3>
            <p className="text-sm text-gray-300 leading-relaxed">{plan.profileSummary}</p>
          </div>
          <div className="grid grid-cols-2 gap-4 mb-6">
            <div className="bg-[#1a1919] border border-white/5 rounded-2xl p-4 text-center">
              <div className="text-2xl font-black text-[#ffc940]">{plan.calorieTarget}</div>
              <div className="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Calories</div>
            </div>
            <div className="bg-[#1a1919] border border-white/5 rounded-2xl p-4 text-center">
              <div className="text-2xl font-black text-[#00cba8]">{plan.macros?.protein}</div>
              <div className="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Protein</div>
            </div>
          </div>
          <div className="bg-[#1a1919] border border-white/5 rounded-3xl p-6 mb-6">
            <h3 className="text-white font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-dumbbell text-[#6bff8f]"></i> Weekly Workout Split</h3>
            <div className="space-y-4">
              {(plan.workoutSplit || []).map((day, i) => (
                <div key={i} className="border-b border-white/5 pb-4 last:border-0 last:pb-0">
                  <div className="text-sm font-bold text-[#6bff8f] mb-2">{day.day}</div>
                  <ul className="text-sm text-gray-300 space-y-1">
                    {(day.exercises || []).map((ex, j) => <li key={j}>• {ex}</li>)}
                  </ul>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // --- Client Workout View ---
    const ClientWorkoutView = () => {
      return (
        <div className="p-5">
          <div className="mb-6">
            <h2 className="text-2xl font-black text-white">Daily Log</h2>
            <p className="text-sm text-gray-400 mt-1">Track your diet and workout progress.</p>
          </div>
          <div className="bg-[#1a1919] border border-white/5 rounded-3xl p-6 mb-6">
            <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2"><i className="fa-solid fa-circle-check text-[#6bff8f]"></i> Log Workout</h3>
            <form className="flex flex-col gap-4">
              <label className="flex items-center gap-4 bg-[#262626] p-4 rounded-xl border border-white/5 cursor-pointer hover:border-[#6bff8f]/30 transition-colors">
                <input type="checkbox" className="w-5 h-5 accent-[#6bff8f]" />
                <span className="text-sm font-bold text-white">I completed my workout today</span>
              </label>
              <label>
                <span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2 mt-2">Workout Notes</span>
                <textarea placeholder="How did it feel? Did you hit new PRs?" className="bg-[#262626] border-white/10 text-white min-h-[100px]"></textarea>
              </label>
              <button className="action-btn w-full mt-2 flex justify-center">Save Daily Log</button>
            </form>
          </div>
        </div>
      );
    };

    // --- Client Shell ---
    const ClientShell = ({ me, setMe }) => {
      const [activeTab, setActiveTab] = useState('home');
      const [appData, setAppData] = useState(null);

      useEffect(() => {
        api('/api/app/bootstrap').then(res => setAppData(res)).catch(() => {});
      }, []);

      const handleLogout = async () => {
        await api('/api/auth/logout', { method: 'POST' });
        setMe(null);
      };

      return (
        <div className="max-w-md mx-auto min-h-screen bg-[#0e0e0e] pb-24">
          <header className="sticky top-0 z-40 bg-[#0d0d0d]/90 backdrop-blur-md border-b border-[#6bff8f]/10 p-4 flex justify-between items-center">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 kinetic-gradient rounded-xl flex items-center justify-center shadow-lg">🔥</div>
              <div>
                <div className="text-[9px] text-[#6bff8f] font-bold uppercase tracking-widest">{me.username}</div>
                <div className="text-lg font-black text-white leading-none">GymLog</div>
              </div>
            </div>
            <button onClick={handleLogout} className="text-xs text-gray-400 border border-gray-800 px-3 py-1.5 rounded-lg hover:text-white transition-colors">Sign Out</button>
          </header>

          <main>
            {activeTab === 'home' && <ClientDashboard appData={appData} />}
            {activeTab === 'intake' && <ClientIntakeView appData={appData} />}
            {activeTab === 'plan' && <ClientPlanView appData={appData} />}
            {activeTab === 'workout' && <ClientWorkoutView appData={appData} />}
          </main>

          <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-[#131313]/90 backdrop-blur-xl border-t border-white/5 rounded-t-[20px] p-2 flex z-50">
            {[
              { id: 'home', icon: 'fa-bolt', label: 'Home' },
              { id: 'intake', icon: 'fa-clipboard-list', label: 'Intake' },
              { id: 'plan', icon: 'fa-calendar-day', label: 'Plan' },
              { id: 'workout', icon: 'fa-dumbbell', label: 'Workout' }
            ].map(tab => (
              <button 
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`flex-1 flex flex-col items-center gap-1 p-2 rounded-xl transition-all ${activeTab === tab.id ? 'text-[#6bff8f] bg-[#1a1919]' : 'text-gray-500 hover:text-gray-300'}`}
              >
                <i className={`fa-solid ${tab.icon} text-lg`}></i>
                <span className="text-[9px] font-bold uppercase tracking-widest">{tab.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    };

// --- Admin Dashboard / Roster ---
    const AdminRoster = ({ clients, onOpenClient, onAddClient }) => {
      const [showModal, setShowModal] = useState(false);
      const [saving, setSaving] = useState(false);

      const handleAdd = async (e) => {
        e.preventDefault();
        setSaving(true);
        try {
          await onAddClient({
            fullName: e.target.full_name.value, // <-- FIX: Changed to camelCase!
            username: e.target.username.value,
            email: e.target.email.value
          });
          setShowModal(false);
        } catch (err) {
          alert(err.message); 
        }
        setSaving(false);
      };

      return (
        <div className="card relative">
          <div className="flex justify-between items-center mb-6">
            <div>
              <h2 className="text-xl font-bold text-white">Client Roster</h2>
              <p className="text-sm text-gray-400">Manage and review your clients' progress.</p>
            </div>
            <button onClick={() => setShowModal(true)} className="action-btn text-sm py-2 px-4">+ Add Client</button>
          </div>

          <div className="grid grid-cols-4 gap-4 mb-8">
            <div className="bg-[#0f1e35] p-5 rounded-xl border border-[#1a2e48]">
              <div className="text-2xl font-black text-white">{clients.length}</div>
              <div className="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Total Clients</div>
            </div>
            <div className="bg-[#0f1e35] p-5 rounded-xl border border-[#1a2e48]">
              <div className="text-2xl font-black text-[#ffc940]">0</div>
              <div className="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Needs Review</div>
            </div>
          </div>

          <div className="overflow-hidden rounded-xl border border-[#1a2e48]">
            <table className="w-full text-left text-sm">
              <thead className="bg-[#142642] text-[#7a9abf] text-[10px] uppercase tracking-widest font-semibold">
                <tr>
                  <th className="p-4">Client</th>
                  <th className="p-4">Status</th>
                  <th className="p-4">Plan</th>
                  <th className="p-4"></th>
                </tr>
              </thead>
              <tbody className="divide-y divide-[#1a2e48]">
                {clients.length === 0 ? (
                  <tr><td colSpan="4" className="p-8 text-center text-gray-400">No clients yet.</td></tr>
                ) : clients.map(c => (
                  <tr key={c.id} className="hover:bg-[#142642] transition-colors">
                    <td className="p-4">
                      <div className="font-bold text-white">{c.full_name}</div>
                      <div className="text-xs text-gray-500 font-mono mt-1">@{c.username}</div>
                    </td>
                    <td className="p-4"><span className="bg-[#00cba8]/10 text-[#00cba8] border border-[#00cba8]/30 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">{c.status}</span></td>
                    <td className="p-4"><span className="bg-gray-800 text-gray-300 border border-gray-700 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">{c.plan_status || 'none'}</span></td>
                    <td className="p-4 text-right">
                      <button onClick={() => onOpenClient(c)} className="text-xs font-semibold text-[#6bff8f] hover:text-white transition-colors">Open <i className="fa-solid fa-arrow-right ml-1"></i></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Add Client Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-[#0b1628] border border-[#1a2e48] p-6 rounded-2xl w-full max-w-md">
                <h3 className="text-lg font-bold text-white mb-4">Add New Client</h3>
                <form onSubmit={handleAdd} className="flex flex-col gap-4">
                  <label>
                    <span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Full Name</span>
                    <input name="full_name" required placeholder="e.g. Jane Doe" className="bg-[#0f1e35] border-[#1a2e48] text-white" />
                  </label>
                  <label>
                    <span className="text-xs text-gray-400 font-bold uppercase tracking-wider block mb-2">Username</span>
                    <input name="username" required placeholder="e.g. janedoe123" className="bg-[#0f1e35] border-[#1a2e48] text-white" />
                  </label>
                  <div className="flex justify-end gap-3 mt-4">
                    <button type="button" onClick={() => setShowModal(false)} className="ghost-btn">Cancel</button>
                    <button type="submit" disabled={saving} className="action-btn">{saving ? 'Adding...' : 'Create Client'}</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- Admin Client Detail View ---
    const AdminClientDetail = ({ client, onBack, setFlash }) => {
      const [details, setDetails] = useState(null);
      const [loading, setLoading] = useState(true);
      const [generatingPlan, setGeneratingPlan] = useState(false);

      const fetchDetails = async () => {
        try {
          const res = await api(`/api/admin/clients/${client.id}`);
          setDetails(res);
        } catch (err) {
          setFlash({ err: "Failed to load client details." });
        }
        setLoading(false);
      };

      useEffect(() => { fetchDetails(); }, [client.id]);

      const handleGeneratePlan = async () => {
        setGeneratingPlan(true);
        setFlash({ msg: "Initializing AI Agents. This takes ~15-30 seconds..." });
        try {
          await api('/api/admin/plans/generate', {
            method: 'POST',
            body: JSON.stringify({ client_id: client.id })
          });
          setFlash({ msg: "AI Plan generated successfully!" });
          fetchDetails(); // Refresh to show the new plan
        } catch (err) {
          setFlash({ err: err.message || "Plan generation failed." });
        }
        setGeneratingPlan(false);
      };

      const handlePublishPlan = async (planId) => {
        try {
          await api(`/api/admin/plans/${planId}/publish`, { method: 'POST' });
          setFlash({ msg: "Plan published to client!" });
          fetchDetails();
        } catch (err) {
          setFlash({ err: err.message });
        }
      };

      if (loading) return <div className="text-center p-10 text-[#6bff8f]"><i className="fa-solid fa-spinner fa-spin text-3xl"></i></div>;

      const hasIntake = !!details.intake;
      const hasPlan = !!details.plan;

      return (
        <div className="space-y-6">
          <button onClick={onBack} className="text-xs text-[#7a9abf] hover:text-white flex items-center gap-2 mb-4">
            <i className="fa-solid fa-arrow-left"></i> Back to Roster
          </button>

          <div className="card flex justify-between items-center">
            <div>
              <h2 className="text-2xl font-black text-white">{client.full_name}</h2>
              <p className="text-sm text-[#7a9abf] font-mono">@{client.username}</p>
            </div>
            <div className="text-right">
              <div className="text-[10px] text-gray-400 uppercase tracking-widest">Platform Status</div>
              <div className="text-[#00cba8] font-bold text-sm">{client.status}</div>
            </div>
          </div>

          <div className="grid md:grid-cols-2 gap-6">
            {/* Intake Column */}
            <div className="card">
              <h3 className="text-lg font-bold text-white mb-4 border-b border-[#1a2e48] pb-2 flex items-center justify-between">
                <span><i className="fa-solid fa-clipboard-list text-[#6bff8f] mr-2"></i> Intake Form</span>
                {hasIntake ? <span className="text-[10px] bg-green-900/50 text-green-400 px-2 py-1 rounded">Completed</span> : <span className="text-[10px] bg-yellow-900/50 text-yellow-400 px-2 py-1 rounded">Pending</span>}
              </h3>
              
              {!hasIntake ? (
                <p className="text-sm text-gray-400">Client has not submitted their intake form yet.</p>
              ) : (
                <div className="text-sm text-gray-300 space-y-3 max-h-[300px] overflow-y-auto pr-2">
                  <p><strong className="text-white block text-xs uppercase">Answers Data</strong></p>
                  <pre className="bg-[#0b1628] p-3 rounded-lg text-xs font-mono border border-[#1a2e48] overflow-x-auto">
                    {JSON.stringify(details.intake.answers_json, null, 2)}
                  </pre>
                </div>
              )}
            </div>

            {/* AI Plan Column */}
            <div className="card">
              <h3 className="text-lg font-bold text-white mb-4 border-b border-[#1a2e48] pb-2">
                <i className="fa-solid fa-brain text-[#ffc940] mr-2"></i> Coaching Plan
              </h3>

              {!hasPlan ? (
                <div className="text-center py-6">
                  <p className="text-sm text-gray-400 mb-4">No plan exists for this client.</p>
                  <button 
                    onClick={handleGeneratePlan} 
                    disabled={!hasIntake || generatingPlan}
                    className={`action-btn w-full ${!hasIntake ? 'opacity-50 cursor-not-allowed' : ''}`}
                  >
                    {generatingPlan ? <><i className="fa-solid fa-spinner fa-spin mr-2"></i> Generating via AI...</> : <><i className="fa-solid fa-wand-magic-sparkles mr-2"></i> Generate AI Plan</>}
                  </button>
                  {!hasIntake && <p className="text-[10px] text-red-400 mt-2">Requires completed intake form.</p>}
                </div>
              ) : (
                <div className="space-y-4">
                  <div className="flex justify-between items-center bg-[#0b1628] p-3 rounded-lg border border-[#1a2e48]">
                    <span className="text-xs font-bold text-gray-400 uppercase">Status</span>
                    <span className={`text-xs font-bold px-2 py-1 rounded ${details.plan.status === 'published' ? 'bg-[#00cba8]/20 text-[#00cba8]' : 'bg-[#ffc940]/20 text-[#ffc940]'}`}>
                      {details.plan.status}
                    </span>
                  </div>

                  <p className="text-xs text-gray-400 mb-2">Plan Details (Raw JSON):</p>
                  <div className="bg-[#0b1628] border border-[#1a2e48] p-3 rounded-lg text-xs font-mono text-gray-300 max-h-[200px] overflow-y-auto">
                    {/* Displaying raw JSON for admin transparency before we build a visual editor */}
                    {JSON.stringify(details.plan.generated_json, null, 2)}
                  </div>

                  {details.plan.status === 'draft' && (
                    <button onClick={() => handlePublishPlan(details.plan.id)} className="action-btn w-full mt-2">
                      <i className="fa-solid fa-paper-plane mr-2"></i> Publish Plan to Client
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --- Admin Shell ---
    const AdminShell = ({ me, setMe, setFlash }) => {
      const [clients, setClients] = useState([]);
      const [activeClient, setActiveClient] = useState(null);

      const fetchClients = async () => {
        try {
          const res = await api('/api/admin/clients');
          setClients(res.clients || []);
        } catch (err) {
          setFlash({ err: "Failed to load clients." });
        }
      };

      useEffect(() => { fetchClients(); }, []);

      const handleLogout = async () => {
        await api('/api/auth/logout', { method: 'POST' });
        setMe(null);
      };

      const handleAddClient = async (data) => {
        await api('/api/admin/clients', {
          method: 'POST',
          body: JSON.stringify(data)
        });
        setFlash({ msg: "Client added successfully! Give them their username to log in." });
        fetchClients(); // Refresh list
      };

      return (
        <div className="max-w-7xl mx-auto p-6 lg:p-10">
          <div className="flex justify-between items-center mb-10">
            <div>
              <div className="text-[10px] text-[#00cba8] font-mono uppercase tracking-widest flex items-center gap-2 mb-2">
                <span className="w-4 h-px bg-[#00cba8] opacity-50"></span> {me.role === 'superadmin' ? 'Platform Owner' : 'Coach Dashboard'}
              </div>
              <h1 className="text-3xl font-black text-white">Fitness Platform</h1>
            </div>
            <button onClick={handleLogout} className="ghost-btn flex items-center gap-2 text-sm"><i className="fa-solid fa-right-from-bracket"></i> Sign Out</button>
          </div>

          <div className="grid lg:grid-cols-[240px_1fr] gap-8">
            <aside className="bg-gradient-to-b from-[#0b1628] to-[#0b1628]/90 border border-[#1a2e48] rounded-2xl p-4 h-fit sticky top-6">
              <div className="text-[10px] text-[#3d5a7e] font-mono uppercase tracking-widest mb-4 px-3">Navigation</div>
              <nav className="flex flex-col gap-1">
                {me.role === 'superadmin' && (
                  <button className="flex items-center gap-3 w-full p-3 rounded-xl text-sm font-semibold text-[#7a9abf] hover:bg-[#142642] hover:text-white transition-all text-left">
                    <i className="fa-solid fa-users"></i> All Gyms
                  </button>
                )}
                <button 
                  onClick={() => setActiveClient(null)} 
                  className={`flex items-center gap-3 w-full p-3 rounded-xl text-sm font-semibold text-left ${!activeClient ? 'text-[#6bff8f] bg-[#6bff8f]/10 border border-[#6bff8f]/30' : 'text-[#7a9abf] hover:bg-[#142642] hover:text-white'}`}
                >
                  <i className="fa-solid fa-user"></i> Clients
                </button>
                <button className="flex items-center gap-3 w-full p-3 rounded-xl text-sm font-semibold text-[#7a9abf] hover:bg-[#142642] hover:text-white transition-all text-left">
                  <i className="fa-solid fa-gear"></i> Settings
                </button>
              </nav>
            </aside>
            
            <main>
              {me.role === 'superadmin' && <div className="mb-4 p-3 bg-[#00cba8]/10 border border-[#00cba8]/30 rounded-xl text-sm text-[#00cba8]"><i className="fa-solid fa-gear mr-2"></i> Viewing as Superadmin. Manage tenants from Cloudflare Dashboard for now.</div>}
              
              {!activeClient ? (
                <AdminRoster clients={clients} onOpenClient={setActiveClient} onAddClient={handleAddClient} />
              ) : (
                <AdminClientDetail client={activeClient} onBack={() => setActiveClient(null)} setFlash={setFlash} />
              )}
            </main>
          </div>
        </div>
      );
    };

    // --- Main App Entry ---
    function App() {
      const [me, setMe] = useState(undefined);
      const [flash, setFlash] = useState({ err: '', msg: '' });

      useEffect(() => {
        if (flash.err || flash.msg) {
          const timer = setTimeout(() => setFlash({ err: '', msg: '' }), 5000);
          return () => clearTimeout(timer);
        }
      }, [flash]);

      useEffect(() => {
        api('/api/me').then(res => setMe(res.user)).catch(() => setMe(null));
      }, []);

      if (me === undefined) return <div className="min-h-screen bg-[#060d18] flex items-center justify-center text-[#6bff8f]">Loading...</div>;

      return (
        <React.Fragment>
          <GlobalStyles />
          <div className="fixed top-4 right-4 z-[9999] w-full max-w-sm px-4">
            <FlashMessage error={flash.err} message={flash.msg} />
          </div>

          {!me ? (
            <LoginView setMe={setMe} setFlash={setFlash} />
          ) : me.mustChangePassword ? (
            <div className="min-h-screen flex items-center justify-center p-6 text-white text-center">
              <div className="card max-w-md w-full">
                <i className="fa-solid fa-lock text-[#ffc940] text-5xl mx-auto mb-4"></i>
                <h2 className="text-2xl font-bold mb-2">Change Password</h2>
                <p className="text-gray-400 text-sm mb-6">Please update your temporary password to continue.</p>
                <button className="action-btn w-full" onClick={async () => {
                   setMe({...me, mustChangePassword: false});
                   setFlash({msg: "Password updated! (Demo bypass)"})
                }}>Acknowledge & Continue</button>
              </div>
            </div>
          ) : me.role === 'client' ? (
            <ClientShell me={me} setMe={setMe} />
          ) : (
            <AdminShell me={me} setMe={setMe} />
          )}
        </React.Fragment>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
