                </div>
              )}
            </div>
          )}

          {/* ── Logs tab ── */}
          {activeTab === 'logs' && (
            <div className="card space-y-6">
              <h3 className="text-lg font-bold text-white">
                <i className="fa-solid fa-chart-line text-[#00cba8] mr-2"></i> Client Activity
              </h3>

              {noActivity ? (
                <p className="text-sm text-gray-400 text-center py-6">No activity recorded yet.</p>
              ) : (
                <>
                  {/* Most recent daily log */}
                  {hasLog && (() => {
                    const dl = details.dailyLog;
                    const foods = dl.meals_json?.loggedFoods || [];
                    const totalCals = foods.reduce((s,f) => s + (Number(f.calories)||0), 0);
                    const totalPro  = foods.reduce((s,f) => s + (Number(f.protein)||0), 0);
                    return (
                      <div>
                        <div className="text-xs text-[#ffc940] font-bold uppercase tracking-widest mb-3">
                          Latest Log — {dl.log_date}
                        </div>
                        <div className="grid grid-cols-3 gap-3 mb-4">
                          <div className="bg-[#0b1628] rounded-xl p-3 text-center border border-white/5">
                            <div className="text-sm font-black text-[#ffc940]">{totalCals} kcal</div>
                            <div className="text-[9px] text-gray-500 uppercase mt-1">Consumed</div>
                          </div>
                          <div className="bg-[#0b1628] rounded-xl p-3 text-center border border-white/5">
                            <div className="text-sm font-black text-[#00cba8]">{totalPro}g</div>
                            <div className="text-[9px] text-gray-500 uppercase mt-1">Protein</div>
                          </div>
                          <div className="bg-[#0b1628] rounded-xl p-3 text-center border border-white/5">
                            <div className="text-sm font-black text-[#6bff8f]">{dl.workout_json?.completed ? '✓' : '–'}</div>
                            <div className="text-[9px] text-gray-500 uppercase mt-1">Workout</div>
                          </div>
                        </div>
                        {foods.length > 0 && (
                          <div className="bg-[#0b1628] rounded-xl p-3 border border-white/5">
                            <div className="text-[10px] text-gray-400 font-bold uppercase mb-2">Foods Logged</div>
                            <ul className="text-xs text-gray-300 space-y-1">
                              {foods.map((f, i) => (
                                <li key={i} className="flex justify-between">
                                  <span>{f.name}</span>
                                  <span className="text-gray-500 font-mono">{f.calories > 0 ? `${f.calories} kcal` : 'custom'}</span>
                                </li>
                              ))}
                            </ul>
                          </div>
                        )}
                        {dl.notes && (
                          <div className="mt-3 bg-[#0b1628] rounded-xl p-3 border border-white/5">
                            <div className="text-[10px] text-gray-400 font-bold uppercase mb-1">Client Notes</div>
                            <p className="text-xs text-gray-300">{dl.notes}</p>
                          </div>
                        )}
                      </div>
                    );
                  })()}

                  {/* Check-ins */}
                  {hasCheckins && (
                    <div>
                      <div className="text-xs text-[#6bff8f] font-bold uppercase tracking-widest mb-3">Check-in History</div>
                      <div className="space-y-3">
                        {details.checkins.map((c, i) => (
                          <div key={i} className="bg-[#0b1628] rounded-xl p-3 border border-white/5 grid grid-cols-4 gap-2">
                            <div className="col-span-4 text-[10px] text-gray-500 font-mono mb-1">{c.checkin_date}</div>
                            {[['Weight', c.weight, 'kg'], ['Body Fat', c.body_fat, '%'], ['Waist', c.waist, 'cm'], ['Hips', c.hips, 'cm']].map(([l,v,u]) => v != null && (
                              <div key={l} className="text-center">
                                <div className="text-sm font-bold text-white">{v}{u}</div>
                                <div className="text-[9px] text-gray-500">{l}</div>
                              </div>
                            ))}
                            {c.notes && <p className="col-span-4 text-xs text-gray-400 border-t border-white/5 pt-2 mt-1">{c.notes}</p>}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
          )}
        </div>
      );
    };

    const AdminShell = ({ me, setMe, setFlash }) => {
      const [clients, setClients] = useState([]);
      const [activeClient, setActiveClient] = useState(null);
      const [adminView, setAdminView] = useState('clients'); // 'clients' | 'compliance'
      const fetchClients = async () => { try { const res = await api('/api/admin/clients'); setClients(res.clients || []); } catch (err) { setFlash({ err: "Failed to load clients." }); } };
      useEffect(() => { fetchClients(); }, []);
      const handleAddClient = async (data) => { await api('/api/admin/clients', { method: 'POST', body: JSON.stringify(data) }); setFlash({ msg: "Client added! Email sent." }); fetchClients(); };
      const handleOpenClient = (c) => { setActiveClient(c); setAdminView('clients'); };
      const NAV = [
        { id: 'clients', icon: 'fa-users', label: 'Clients' },
        { id: 'compliance', icon: 'fa-chart-pie', label: 'Compliance' },
      ];
      return (
        <div className="max-w-7xl mx-auto p-6 lg:p-10">
          <div className="flex justify-between items-center mb-10"><h1>Coach Dashboard</h1><button onClick={() => { api('/api/auth/logout', { method: 'POST' }).then(() => setMe(null)) }} className="ghost-btn text-sm">Sign Out</button></div>
          <div className="grid lg:grid-cols-[240px_1fr] gap-8">
            <aside className="bg-gradient-to-b from-[#0b1628] to-[#0b1628]/90 border border-[#1a2e48] rounded-2xl p-4 h-fit">
              <nav className="flex flex-col gap-1">
                {NAV.map(n => (
                  <button key={n.id} onClick={() => { setAdminView(n.id); setActiveClient(null); }} className={`flex items-center gap-3 w-full p-3 rounded-xl text-sm font-semibold text-left transition-all ${adminView === n.id && !activeClient ? 'text-[#6bff8f] bg-[#6bff8f]/10 border border-[#6bff8f]/30' : 'text-[#7a9abf] hover:bg-[#142642] hover:text-white'}`}>
                    <i className={`fa-solid ${n.icon}`}></i> {n.label}
                  </button>
                ))}
              </nav>
            </aside>
            <main>
              {activeClient
                ? <AdminClientDetail client={activeClient} onBack={() => setActiveClient(null)} setFlash={setFlash} />
                : adminView === 'compliance'
                  ? <ComplianceDashboard onOpenClient={handleOpenClient} setFlash={setFlash} />
                  : <AdminRoster clients={clients} onOpenClient={handleOpenClient} onAddClient={handleAddClient} />
              }
            </main>
          </div>
        </div>
      );
    };

    // ═══════════════════════════════════════════════════════════
    //  SUPERADMIN SHELL — Platform owner view (multi-tenant gyms)
    // ═══════════════════════════════════════════════════════════

    const SuperAdminGymDetail = ({ gymId, onBack, setFlash }) => {
      const [data, setData] = useState(null);
      const [resettingPwd, setResettingPwd] = useState(false);
      const [newPwd, setNewPwd] = useState(null);
      const [togglingStatus, setTogglingStatus] = useState(false);

      const load = async () => {
        try { const res = await api(`/api/superadmin/gyms/${gymId}`); setData(res); }
        catch (err) { setFlash({ err: err.message }); }
      };
      useEffect(() => { load(); }, [gymId]);

      const handleResetPwd = async () => {
        setResettingPwd(true);
        try {
          const res = await api(`/api/superadmin/gyms/${gymId}/reset-admin-password`, { method: 'POST' });
          setNewPwd(res.temporaryPassword);
          setFlash({ msg: "Admin password reset successfully." });
        } catch (err) { setFlash({ err: err.message }); }
        setResettingPwd(false);
      };

      const handleToggleStatus = async () => {
        if (!data) return;
        setTogglingStatus(true);
        const next = data.gym.status === 'active' ? 'inactive' : 'active';
        try {
          await api(`/api/superadmin/gyms/${gymId}`, { method: 'PATCH', body: JSON.stringify({ status: next }) });
          setFlash({ msg: `Gym marked as ${next}.` });
          load();
        } catch (err) { setFlash({ err: err.message }); }
        setTogglingStatus(false);
      };

      const handleClaimUnassigned = async () => {
        try {
          const res = await api(`/api/superadmin/gyms/${gymId}/claim-unassigned`, { method: 'POST' });
          setFlash({ msg: `${res.claimed} unassigned client(s) moved to this gym.` });
          load();
        } catch (err) { setFlash({ err: err.message }); }
      };

      if (!data) return <div className="text-center p-10"><i className="fa-solid fa-spinner fa-spin text-3xl text-[#6bff8f]"></i></div>;

      const { gym, clients, admin, unassignedCount } = data;

      return (
        <div className="space-y-6">
          <button onClick={onBack} className="text-xs text-[#7a9abf] hover:text-white flex items-center gap-2">
            <i className="fa-solid fa-arrow-left"></i> Back to Gyms
          </button>

          {/* Gym header */}
          <div className="card">
            <div className="flex justify-between items-start">
              <div>
                <h2 className="text-2xl font-black text-white">{gym.name}</h2>
                <p className="text-sm text-[#7a9abf] mt-1">{gym.owner_name} · {gym.city || 'No city'} · {gym.email || 'No email'}</p>
              </div>
              <span className={`text-xs font-bold px-3 py-1 rounded-full border ${gym.status === 'active' ? 'bg-[#00cba8]/10 text-[#00cba8] border-[#00cba8]/30' : 'bg-red-500/10 text-red-400 border-red-500/30'}`}>
                {gym.status === 'active' ? '🟢 Active' : '🔴 Inactive'}
              </span>
            </div>
          </div>

          {/* Admin account card */}
          <div className="card space-y-4">
            <h3 className="text-sm font-bold text-white uppercase tracking-widest">
              <i className="fa-solid fa-user-shield text-[#ffc940] mr-2"></i> Gym Admin Account
            </h3>
            {admin ? (
              <div className="flex justify-between items-center bg-[#0b1628] rounded-xl p-4 border border-[#1a2e48]">
                <div>
                  <div className="text-white font-bold font-mono">@{admin.username}</div>
                  <div className="text-xs text-gray-400 mt-0.5">Admin login</div>
                </div>
                <button onClick={handleResetPwd} disabled={resettingPwd} className="ghost-btn text-xs py-2 px-3">
                  {resettingPwd ? <i className="fa-solid fa-spinner fa-spin"></i> : '🔑 Reset Password'}
                </button>
              </div>
            ) : (
              <p className="text-sm text-gray-400">No admin assigned to this gym.</p>
            )}
            {newPwd && (
              <div className="bg-[#ffc940]/10 border border-[#ffc940]/30 rounded-xl p-4 text-sm">
                <div className="text-[#ffc940] font-bold mb-1">New Temporary Password (share via WhatsApp):</div>
                <code className="text-white font-mono text-lg tracking-widest">{newPwd}</code>
                <div className="text-xs text-gray-400 mt-2">Admin must change this on first login.</div>
              </div>
            )}
          </div>

          {/* Danger / control actions */}
          <div className="card space-y-3">
            <h3 className="text-sm font-bold text-white uppercase tracking-widest">
              <i className="fa-solid fa-gear text-gray-400 mr-2"></i> Gym Controls
            </h3>
            <div className="flex gap-3 flex-wrap">
              <button onClick={handleToggleStatus} disabled={togglingStatus}
                className={`ghost-btn text-sm py-2 px-4 ${gym.status === 'active' ? 'border-red-500/30 text-red-400 hover:bg-red-500/10' : 'border-[#6bff8f]/30 text-[#6bff8f] hover:bg-[#6bff8f]/10'}`}>
                {togglingStatus ? '...' : (gym.status === 'active' ? '⏸ Deactivate Gym' : '▶ Reactivate Gym')}
              </button>
              {unassignedCount > 0 && (
                <button onClick={handleClaimUnassigned} className="ghost-btn text-sm py-2 px-4 border-[#ffc940]/30 text-[#ffc940] hover:bg-[#ffc940]/10">
                  📥 Claim {unassignedCount} Unassigned Client{unassignedCount > 1 ? 's' : ''}
                </button>
              )}
            </div>
          </div>

          {/* Clients table */}
          <div className="card">
            <h3 className="text-sm font-bold text-white uppercase tracking-widest mb-4">
              <i className="fa-solid fa-users text-[#6bff8f] mr-2"></i> Clients ({clients.length})
            </h3>
            {clients.length === 0 ? (
              <p className="text-sm text-gray-400">No clients registered yet.</p>
            ) : (
              <div className="overflow-hidden rounded-xl border border-[#1a2e48]">
                <table className="w-full text-sm text-left">
                  <thead className="bg-[#142642] text-[#7a9abf] text-[10px] uppercase tracking-widest">
                    <tr>
                      <th className="p-3">Client</th>
                      <th className="p-3">Status</th>
                      <th className="p-3">Plan</th>
                      <th className="p-3">Last Log</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-[#1a2e48]">
                    {clients.map(c => (
                      <tr key={c.id} className="hover:bg-[#142642]/50 transition-colors">
                        <td className="p-3">
                          <div className="font-semibold text-white">{c.full_name}</div>
                          <div className="text-xs text-gray-500 font-mono">@{c.username}</div>
                        </td>
                        <td className="p-3">
                          <span className="bg-[#00cba8]/10 text-[#00cba8] border border-[#00cba8]/20 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase">{c.status}</span>
                        </td>
                        <td className="p-3">
                          <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${c.plan_status === 'published' ? 'bg-[#6bff8f]/10 text-[#6bff8f] border-[#6bff8f]/20' : c.plan_status === 'draft' ? 'bg-[#ffc940]/10 text-[#ffc940] border-[#ffc940]/20' : 'bg-white/5 text-gray-500 border-white/10'}`}>
                            {c.plan_status}
                          </span>
                        </td>
                        <td className="p-3 text-xs text-gray-400">{c.last_log_date || '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    };

    const SuperAdminShell = ({ me, setMe, setFlash }) => {
      const [gyms, setGyms] = useState([]);
      const [stats, setStats] = useState(null);
      const [activeGymId, setActiveGymId] = useState(null);
      const [showModal, setShowModal] = useState(false);
      const [saving, setSaving] = useState(false);
      const [newCredentials, setNewCredentials] = useState(null);

      const loadGyms = async () => {
        try {
          const res = await api('/api/superadmin/gyms');
          setGyms(res.gyms || []);
          setStats(res.stats || null);
        } catch (err) { setFlash({ err: err.message }); }
      };
      useEffect(() => { loadGyms(); }, []);

      const handleCreateGym = async (e) => {
        e.preventDefault();
        setSaving(true);
        const d = Object.fromEntries(new FormData(e.target).entries());
        try {
          const res = await api('/api/superadmin/gyms', {
            method: 'POST',
            body: JSON.stringify({
              gymName: d.gymName, ownerName: d.ownerName,
              email: d.email, phone: d.phone, city: d.city,
              adminUsername: d.adminUsername
            })
          });
          setNewCredentials({ username: d.adminUsername, password: res.temporaryPassword });
          setShowModal(false);
          loadGyms();
        } catch (err) { setFlash({ err: err.message }); }
        setSaving(false);
      };

      if (activeGymId) {
        return (
          <div className="max-w-5xl mx-auto p-6 lg:p-10">
            <SuperAdminGymDetail gymId={activeGymId} onBack={() => setActiveGymId(null)} setFlash={setFlash} />
          </div>
        );
      }

      return (
        <div className="max-w-6xl mx-auto p-6 lg:p-10 space-y-8">

          {/* Header */}
          <div className="flex justify-between items-center">
            <div>
              <div className="text-[10px] text-[#6bff8f] font-bold uppercase tracking-widest mb-1">Platform Owner</div>
              <h1 className="text-3xl font-black text-white">GymLog Command Centre</h1>
            </div>
            <button onClick={() => api('/api/auth/logout', { method: 'POST' }).then(() => setMe(null))} className="ghost-btn text-sm">
              Sign Out
            </button>
          </div>

          {/* Platform stats */}
          {stats && (
            <div className="grid grid-cols-3 gap-4">
              {[
                { label: 'Active Gyms',    val: stats.totalGyms,        icon: 'fa-building', color: '#6bff8f' },
                { label: 'Total Clients',  val: stats.totalClients,     icon: 'fa-users',    color: '#00cba8' },
                { label: 'Active Plans',   val: stats.totalActivePlans, icon: 'fa-brain',    color: '#ffc940' },
              ].map(s => (
                <div key={s.label} className="bg-[#0b1628] border border-[#1a2e48] rounded-2xl p-5 text-center">
                  <i className={`fa-solid ${s.icon} text-2xl mb-2`} style={{ color: s.color }}></i>
                  <div className="text-3xl font-black text-white">{s.val}</div>
                  <div className="text-[10px] text-gray-400 uppercase tracking-widest mt-1">{s.label}</div>
                </div>
              ))}
            </div>
          )}

          {/* New credentials banner (shown after creating a gym) */}
          {newCredentials && (
            <div className="bg-[#6bff8f]/10 border border-[#6bff8f]/30 rounded-2xl p-6 space-y-2">
              <div className="text-[#6bff8f] font-bold text-sm">✅ Gym created! Share these login credentials with the gym admin:</div>
              <div className="flex gap-6 mt-2">
                <div>
                  <div className="text-[10px] text-gray-400 uppercase">Username</div>
                  <code className="text-white font-mono text-base">{newCredentials.username}</code>
                </div>
                <div>
                  <div className="text-[10px] text-gray-400 uppercase">Temp Password</div>
                  <code className="text-[#ffc940] font-mono text-base tracking-widest">{newCredentials.password}</code>
                </div>
              </div>
              <button onClick={() => setNewCredentials(null)} className="text-xs text-gray-400 hover:text-white mt-2">Dismiss</button>
            </div>
          )}

          {/* Gyms list */}
          <div className="card">
            <div className="flex justify-between items-center mb-6">
              <h2 className="text-xl font-bold text-white">
                <i className="fa-solid fa-building text-[#6bff8f] mr-2"></i> All Gyms
              </h2>
              <button onClick={() => setShowModal(true)} className="action-btn text-sm py-2 px-5">
                + New Gym
              </button>
            </div>

            {gyms.length === 0 ? (
              <div className="text-center py-12">
                <i className="fa-solid fa-building text-gray-700 text-5xl mb-4"></i>
                <p className="text-gray-400 text-sm mb-4">No gyms yet. Create your first tenant gym.</p>
                <button onClick={() => setShowModal(true)} className="action-btn text-sm py-2 px-6">Create First Gym</button>
              </div>
            ) : (
              <div className="overflow-hidden rounded-xl border border-[#1a2e48]">
                <table className="w-full text-sm text-left">
                  <thead className="bg-[#142642] text-[#7a9abf] text-[10px] uppercase tracking-widest font-semibold">
                    <tr>
                      <th className="p-4">Gym / Owner</th>
                      <th className="p-4">City</th>
                      <th className="p-4 text-center">Clients</th>
                      <th className="p-4 text-center">Active Plans</th>
                      <th className="p-4 text-center">Status</th>
                      <th className="p-4"></th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-[#1a2e48]">
                    {gyms.map(gym => (
                      <tr key={gym.id} className="hover:bg-[#142642]/50 transition-colors">
                        <td className="p-4">
                          <div className="font-bold text-white">{gym.name}</div>
                          <div className="text-xs text-gray-400 mt-0.5">{gym.owner_name}</div>
                        </td>
                        <td className="p-4 text-gray-300">{gym.city || '—'}</td>
                        <td className="p-4 text-center">
                          <span className="text-white font-bold">{gym.client_count || 0}</span>
                        </td>
                        <td className="p-4 text-center">
                          <span className="text-[#6bff8f] font-bold">{gym.active_plans || 0}</span>
                        </td>
                        <td className="p-4 text-center">
                          <span className={`text-[10px] font-bold px-2 py-1 rounded-full border ${gym.status === 'active' ? 'bg-[#00cba8]/10 text-[#00cba8] border-[#00cba8]/30' : 'bg-red-500/10 text-red-400 border-red-500/30'}`}>
                            {gym.status}
                          </span>
                        </td>
                        <td className="p-4 text-right">
                          <button onClick={() => setActiveGymId(gym.id)} className="text-xs font-semibold text-[#6bff8f] hover:text-white transition-colors">
                            Manage <i className="fa-solid fa-arrow-right ml-1"></i>
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Create gym modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-[#0b1628] border border-[#1a2e48] rounded-2xl p-7 w-full max-w-lg space-y-5">
                <div className="flex justify-between items-center">
                  <h3 className="text-lg font-bold text-white">Create New Gym Tenant</h3>
                  <button onClick={() => setShowModal(false)} className="text-gray-400 hover:text-white">
                    <i className="fa-solid fa-xmark text-xl"></i>
                  </button>
                </div>
                <form onSubmit={handleCreateGym} className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <label className="block col-span-2">
                      <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1.5">Gym Name *</span>
                      <input name="gymName" required placeholder="e.g. FitZone Kerala" className="bg-[#0f1e35] border-[#1a2e48] text-white" />
                    </label>
                    <label className="block">
                      <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1.5">Owner Full Name *</span>
                      <input name="ownerName" required placeholder="Owner name" className="bg-[#0f1e35] border-[#1a2e48] text-white" />
                    </label>
                    <label className="block">
                      <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1.5">City</span>
                      <input name="city" placeholder="e.g. Kochi" className="bg-[#0f1e35] border-[#1a2e48] text-white" />
                    </label>
                    <label className="block">
                      <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1.5">Email</span>
                      <input type="email" name="email" placeholder="owner@email.com" className="bg-[#0f1e35] border-[#1a2e48] text-white" />
                    </label>
                    <label className="block">
                      <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1.5">Phone</span>
                      <input name="phone" placeholder="+91 98765 43210" className="bg-[#0f1e35] border-[#1a2e48] text-white" />
                    </label>
                    <label className="block col-span-2">
                      <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1.5">Admin Username * <span className="normal-case font-normal text-gray-500">(for gym owner to log in)</span></span>
                      <input name="adminUsername" required placeholder="e.g. fitzoneadmin" className="bg-[#0f1e35] border-[#1a2e48] text-white font-mono" />
                    </label>
                  </div>
                  <div className="bg-[#ffc940]/10 border border-[#ffc940]/20 rounded-xl p-3 text-xs text-[#ffc940]">
                    <i className="fa-solid fa-circle-info mr-2"></i>
                    A temporary password will be generated. Share it with the gym admin via WhatsApp.
                  </div>
                  <div className="flex justify-end gap-3 pt-2">
                    <button type="button" onClick={() => setShowModal(false)} className="ghost-btn">Cancel</button>
                    <button type="submit" disabled={saving} className="action-btn px-6">
                      {saving ? <><i className="fa-solid fa-spinner fa-spin mr-2"></i>Creating...</> : 'Create Gym'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- Main App Entry ---
    function App() {
      const [me, setMe] = useState(undefined);
      const [flash, setFlash] = useState({ err: '', msg: '' });
      useEffect(() => { if (flash.err || flash.msg) { const timer = setTimeout(() => setFlash({ err: '', msg: '' }), 5000); return () => clearTimeout(timer); } }, [flash]);
      useEffect(() => { api('/api/me').then(res => setMe(res.user)).catch(() => setMe(null)); }, []);
      const handlePasswordReset = async (e) => { e.preventDefault(); try { await api('/api/auth/change-password', { method: 'POST', body: JSON.stringify({ newPassword: e.target.newPassword.value }) }); setMe({ ...me, mustChangePassword: false }); setFlash({ msg: "Your password has been securely updated." }); } catch (err) { setFlash({ err: err.message || "Failed to update password." }); } };
      if (me === undefined) return <div className="min-h-screen bg-[#060d18] flex items-center justify-center"><i className="fa-solid fa-spinner fa-spin text-4xl text-[#6bff8f]"></i></div>;
      return (
        <React.Fragment>
          <GlobalStyles />
          <div className="fixed top-4 right-4 z-[9999] w-full max-w-sm px-4"><FlashMessage error={flash.err} message={flash.msg} /></div>
          {!me ? (<LoginView setMe={setMe} setFlash={setFlash} />) : me.mustChangePassword ? (<div className="min-h-screen flex items-center justify-center p-6 text-white text-center"><form onSubmit={handlePasswordReset} className="card max-w-md w-full space-y-4"><i className="fa-solid fa-lock text-[#ffc940] text-5xl mx-auto mb-4"></i><h2 className="text-2xl font-bold mb-2">Change Password</h2><p className="text-gray-400 text-sm mb-6">Please create a new, secure password to access your dashboard.</p><input type="password" name="newPassword" required placeholder="Enter new password" minLength="6" className="bg-[#0b1628] text-white border-white/10" /><button type="submit" className="action-btn w-full mt-4">Save & Continue</button></form></div>) : me.role === 'client' ? (<ClientShell me={me} setMe={setMe} setFlash={setFlash} />) : me.role === 'superadmin' ? (<SuperAdminShell me={me} setMe={setMe} setFlash={setFlash} />) : (<AdminShell me={me} setMe={setMe} setFlash={setFlash} />)}
        </React.Fragment>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
