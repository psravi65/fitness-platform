<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF5C28">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GymLog">
  <title>Fitness Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#060d18;
      --surface:#0b1628;
      --surface-2:#0f1e35;
      --surface-3:#142642;
      --surface-4:#192e50;
      --border:#1a2e48;
      --border-bright:#243d60;
      --text:#e2eeff;
      --text-2:#7a9abf;
      --text-3:#3d5a7e;
      --accent:#ff5c28;
      --accent-dim:rgba(255,92,40,.12);
      --accent-border:rgba(255,92,40,.28);
      --teal:#00cba8;
      --teal-dim:rgba(0,203,168,.1);
      --teal-border:rgba(0,203,168,.25);
      --lime:#5fde7a;
      --lime-dim:rgba(95,222,122,.1);
      --gold:#ffc940;
      --gold-dim:rgba(255,201,64,.1);
      --red:#ff4056;
      --red-dim:rgba(255,64,86,.1);
      --purple:#9d7cf4;
      --radius:14px;
      --radius-lg:20px;
      --radius-xl:26px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      min-height:100vh;
      font-family:'Plus Jakarta Sans',sans-serif;
      color:var(--text);
      background:var(--bg);
      background-image:
        radial-gradient(ellipse 60% 40% at 0% 0%, rgba(255,92,40,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 100% 0%, rgba(0,203,168,.06) 0%, transparent 55%),
        radial-gradient(ellipse 40% 60% at 50% 100%, rgba(26,46,72,.4) 0%, transparent 70%);
      -webkit-font-smoothing:antialiased;
    }
    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}

    /* ═══════════════════════════════════════════════
       SCROLLBAR
    ═══════════════════════════════════════════════ */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px}

    /* ═══════════════════════════════════════════════
       LAYOUT SHELL (ADMIN)
    ═══════════════════════════════════════════════ */
    .app-shell{max-width:1280px;margin:0 auto;padding:28px 24px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:32px}
    .brand{}
    .brand-eyebrow{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--teal);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
    .brand-eyebrow::before{content:'';width:18px;height:1px;background:var(--teal);opacity:.5}
    .brand h1{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--text)}
    .brand-sub{margin-top:4px;font-size:13px;color:var(--text-2)}
    .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .layout{display:grid;grid-template-columns:256px 1fr;gap:22px}

    /* ═══════════════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════════════ */
    .sidebar{
      background:linear-gradient(180deg, var(--surface) 0%, rgba(11,22,40,.92) 100%);
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      padding:20px 14px;
      align-self:start;
      position:sticky;
      top:24px;
    }
    .sidebar-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.14em;padding:0 10px;margin-bottom:8px}
    .sidebar nav{display:grid;gap:4px;margin-top:10px}
    .nav-btn{
      border:1px solid transparent;
      border-radius:var(--radius);
      padding:11px 14px;
      cursor:pointer;
      text-align:left;
      background:transparent;
      color:var(--text-2);
      font-weight:600;
      font-size:13.5px;
      transition:all .15s ease;
      display:flex;
      align-items:center;
      gap:9px;
    }
    .nav-btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border)}
    .nav-btn.active{
      background:var(--accent-dim);
      color:var(--accent);
      border-color:var(--accent-border);
    }
    .nav-btn .nav-icon{font-size:15px;opacity:.8;min-width:18px}

    /* ═══════════════════════════════════════════════
       PANEL
    ═══════════════════════════════════════════════ */
    .panel{
      background:linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      padding:26px;
    }
    .panel-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em}
    .panel-sub{margin-top:4px;font-size:13px;color:var(--text-2)}

    /* ═══════════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════════ */
    .action-btn,.ghost-btn,.nav-btn{border:none;cursor:pointer}
    .action-btn{
      display:inline-flex;align-items:center;gap:7px;
      background:linear-gradient(135deg, var(--accent) 0%, #ff7a40 100%);
      color:#fff;
      font-weight:700;
      font-size:13.5px;
      padding:11px 20px;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.08);
      transition:all .15s ease;
      box-shadow:0 4px 16px rgba(255,92,40,.28);
      white-space:nowrap;
    }
    .action-btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(255,92,40,.4)}
    .action-btn:active{transform:translateY(0)}
    .ghost-btn{
      display:inline-flex;align-items:center;gap:7px;
      background:var(--surface-2);
      border:1px solid var(--border-bright);
      color:var(--text);
      font-weight:600;
      font-size:13.5px;
      padding:11px 18px;
      border-radius:var(--radius);
      transition:all .15s ease;
      white-space:nowrap;
    }
    .ghost-btn:hover{background:var(--surface-3);border-color:var(--border-bright)}
    .ghost-btn.teal{color:var(--teal);border-color:var(--teal-border);background:var(--teal-dim)}
    .ghost-btn.teal:hover{background:rgba(0,203,168,.18)}
    .danger{
      background:var(--red-dim) !important;
      border-color:rgba(255,64,86,.3) !important;
      color:var(--red) !important;
      box-shadow:none !important;
    }
    .danger:hover{background:rgba(255,64,86,.2) !important}

    /* ═══════════════════════════════════════════════
       FORMS
    ═══════════════════════════════════════════════ */
    label{display:block}
    label span{
      display:block;
      font-family:'JetBrains Mono',monospace;
      font-size:10px;
      color:var(--text-2);
      margin-bottom:7px;
      text-transform:uppercase;
      letter-spacing:.1em;
      font-weight:500;
    }
    input,select,textarea{
      width:100%;
      background:var(--surface-2);
      color:var(--text);
      border:1px solid var(--border-bright);
      border-radius:var(--radius);
      padding:11px 14px;
      outline:none;
      font-size:14px;
      transition:border-color .15s ease, box-shadow .15s ease;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(255,92,40,.1);
    }
    input[readonly]{color:var(--text-2);background:var(--surface)}
    textarea{min-height:100px;resize:vertical;line-height:1.6}
    select{cursor:pointer}
    select option{background:var(--surface-2)}
    input[type="checkbox"]{
      width:auto;
      width:16px;height:16px;
      accent-color:var(--accent);
      cursor:pointer;
      vertical-align:middle;
      margin-right:6px;
    }
    code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface-3);padding:2px 6px;border-radius:6px;color:var(--gold)}

    /* ═══════════════════════════════════════════════
       CARDS & GRIDS
    ═══════════════════════════════════════════════ */
    .grid{display:grid;gap:16px}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:18px;
      transition:border-color .15s ease;
    }
    .card:hover{border-color:var(--border-bright)}
    .card h3{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;margin-bottom:10px}
    .stat{
      font-family:'Outfit',sans-serif;
      font-size:36px;
      font-weight:900;
      margin-top:6px;
      letter-spacing:-.02em;
    }
    .stat-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.1em}
    .split{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
    .inline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .subtle{color:var(--text-2);font-size:13px;line-height:1.6}
    .hide{display:none!important}

    /* ═══════════════════════════════════════════════
       BADGES / PILLS
    ═══════════════════════════════════════════════ */
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      padding:5px 12px;
      border-radius:999px;
      background:var(--teal-dim);
      border:1px solid var(--teal-border);
      color:var(--teal);
      font-family:'JetBrains Mono',monospace;
      font-size:10px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
    }
    .pill{
      display:inline-flex;align-items:center;gap:4px;
      padding:3px 9px;
      border-radius:999px;
      font-family:'JetBrains Mono',monospace;
      font-size:10px;
      font-weight:700;
      letter-spacing:.05em;
    }
    .pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
    .pill.draft{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(255,201,64,.2)}
    .pill.published{background:var(--lime-dim);color:var(--lime);border:1px solid rgba(95,222,122,.2)}
    .pill.active{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal-border)}
    .pill.alert{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,64,86,.2)}
    .pill.none{background:var(--surface-3);color:var(--text-3);border:1px solid var(--border)}

    /* ═══════════════════════════════════════════════
       NOTICES / FLASH
    ═══════════════════════════════════════════════ */
    .notice{
      padding:14px 16px;
      border-radius:var(--radius);
      border:1px solid var(--border);
      background:var(--surface-2);
      font-size:13.5px;
      line-height:1.5;
    }
    .notice.success{background:rgba(95,222,122,.07);border-color:rgba(95,222,122,.25);color:#a8edbc}
    .notice.warning{background:rgba(255,201,64,.07);border-color:rgba(255,201,64,.22);color:#ffe9a0}
    .success{color:var(--lime)}
    .error{color:var(--red);font-size:13.5px}
    .flash-success{
      background:rgba(95,222,122,.09);
      border:1px solid rgba(95,222,122,.25);
      color:#a8edbc;
      padding:12px 16px;
      border-radius:var(--radius);
      font-size:13.5px;
      display:flex;
      align-items:center;
      gap:9px;
    }
    .flash-error{
      background:rgba(255,64,86,.09);
      border:1px solid rgba(255,64,86,.25);
      color:#ff8a96;
      padding:12px 16px;
      border-radius:var(--radius);
      font-size:13.5px;
      display:flex;
      align-items:center;
      gap:9px;
    }

    /* ═══════════════════════════════════════════════
       TABLE
    ═══════════════════════════════════════════════ */
    .table{width:100%;border-collapse:collapse}
    .table th{
      font-family:'JetBrains Mono',monospace;
      font-size:9px;
      color:var(--text-3);
      text-transform:uppercase;
      letter-spacing:.12em;
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      text-align:left;
      font-weight:500;
    }
    .table td{
      padding:13px 12px;
      border-bottom:1px solid var(--border);
      vertical-align:middle;
      font-size:13.5px;
    }
    .table tbody tr{transition:background .1s ease}
    .table tbody tr:hover{background:var(--surface-3)}
    .table td .name{font-weight:700;color:var(--text)}
    .table td .username{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);margin-top:2px}

    /* ═══════════════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════════════ */
    .empty{
      padding:36px 20px;
      text-align:center;
      color:var(--text-3);
      border:1px dashed var(--border-bright);
      border-radius:var(--radius-lg);
      font-size:13px;
      line-height:1.6;
    }
    .empty::before{display:block;font-size:28px;margin-bottom:10px;opacity:.5}

    /* ═══════════════════════════════════════════════
       PRE / CODE BLOCKS
    ═══════════════════════════════════════════════ */
    pre{
      white-space:pre-wrap;word-break:break-word;
      background:var(--surface);
      border:1px solid var(--border);
      padding:16px;border-radius:var(--radius);
      color:#a8c4e8;
      font-family:'JetBrains Mono',monospace;
      font-size:12px;line-height:1.7;
    }

    /* ═══════════════════════════════════════════════
       PLAN DISPLAY
    ═══════════════════════════════════════════════ */
    .plan-section{display:grid;gap:10px}
    .plan-list{display:grid;gap:6px;margin-top:8px}
    .plan-list-item{
      background:var(--surface-3);
      border:1px solid var(--border);
      border-radius:10px;
      padding:9px 13px;
      font-size:13px;
      line-height:1.5;
      transition:border-color .12s;
    }
    .plan-list-item:hover{border-color:var(--border-bright)}
    .plan-section-head{
      font-family:'JetBrains Mono',monospace;
      font-size:10px;
      color:var(--text-2);
      text-transform:uppercase;
      letter-spacing:.1em;
      margin-bottom:4px;
    }
    .macro-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .macro-chip{
      background:var(--surface-3);
      border:1px solid var(--border-bright);
      border-radius:10px;
      padding:8px 14px;
      font-family:'JetBrains Mono',monospace;
      font-size:11px;
    }
    .macro-chip strong{display:block;font-size:20px;font-weight:800;margin-bottom:2px;font-family:'Outfit',sans-serif}

    /* ═══════════════════════════════════════════════
       LOGIN PAGE
    ═══════════════════════════════════════════════ */
    .login-wrap{max-width:440px;margin:10vh auto 0}
    .login-logo{text-align:center;margin-bottom:32px}
    .login-logo-mark{
      display:inline-flex;align-items:center;justify-content:center;
      width:56px;height:56px;
      background:linear-gradient(135deg, var(--accent), #ff7a40);
      border-radius:16px;
      font-size:26px;
      margin-bottom:14px;
      box-shadow:0 8px 24px rgba(255,92,40,.3);
    }
    .login-logo h2{font-family:'Outfit',sans-serif;font-size:26px;font-weight:900;letter-spacing:-.02em}
    .login-logo p{color:var(--text-2);font-size:13px;margin-top:4px}
    .login-card{
      background:linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%);
      border:1px solid var(--border-bright);
      border-radius:var(--radius-xl);
      padding:32px;
      box-shadow:0 24px 60px rgba(0,0,0,.4);
    }
    .footer-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3);text-align:center;margin-top:16px;line-height:1.6}

    /* ═══════════════════════════════════════════════
       DIVIDER
    ═══════════════════════════════════════════════ */
    .divider{height:1px;background:var(--border);margin:20px 0}
    .divider-label{
      display:flex;align-items:center;gap:12px;
      font-family:'JetBrains Mono',monospace;font-size:10px;
      color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;
      margin:20px 0;
    }
    .divider-label::before,.divider-label::after{content:'';flex:1;height:1px;background:var(--border)}

    /* ═══════════════════════════════════════════════
       SECTION HEADER
    ═══════════════════════════════════════════════ */
    .section-eyebrow{
      font-family:'JetBrains Mono',monospace;
      font-size:9px;
      color:var(--accent);
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:6px;
    }
    .section-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.01em}
    .section-sub{font-size:12.5px;color:var(--text-2);margin-top:3px;line-height:1.5}

    /* ═══════════════════════════════════════════════
       STAT CARDS (ADMIN DASHBOARD)
    ═══════════════════════════════════════════════ */
    .stat-card{
      background:var(--surface-2);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:20px;
      transition:border-color .15s ease, transform .15s ease;
    }
    .stat-card:hover{border-color:var(--border-bright);transform:translateY(-1px)}
    .stat-card .stat-icon{font-size:22px;margin-bottom:12px}
    .stat-card .stat-value{font-family:'Outfit',sans-serif;font-size:38px;font-weight:900;letter-spacing:-.03em;line-height:1}
    .stat-card .stat-name{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-2);text-transform:uppercase;letter-spacing:.12em;margin-top:6px}

    /* ═══════════════════════════════════════════════
       REVIEW FLAGS (NEEDS REVIEW)
    ═══════════════════════════════════════════════ */
    .review-client-row{
      background:var(--surface-3);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px 16px;
      display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;
      transition:border-color .15s;
    }
    .review-client-row:hover{border-color:var(--border-bright)}
    .review-client-name{font-weight:700;font-size:14px}
    .review-client-user{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);margin-top:2px}
    .review-flags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

    /* ═══════════════════════════════════════════════
       TEMP PASSWORD BOX
    ═══════════════════════════════════════════════ */
    .temp-password-box{
      background:rgba(95,222,122,.08);
      border:1px solid rgba(95,222,122,.22);
      border-radius:var(--radius);
      padding:14px 16px;
      margin-top:14px;
    }
    .temp-password-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--lime);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
    .temp-password-value{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:#cff5d8;letter-spacing:.06em}

    /* ═══════════════════════════════════════════════
       CLIENT APP (MOBILE)
    ═══════════════════════════════════════════════ */
    .client-app{
      max-width:480px;
      margin:0 auto;
      min-height:100vh;
      background:#060d18;
      color:var(--text);
      padding-bottom:82px;
    }
    .client-header{
      position:sticky;top:0;z-index:40;
      background:rgba(6,13,24,.94);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:13px 16px;
    }
    .client-header-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .client-brand{display:flex;align-items:center;gap:10px}
    .client-brand-icon{
      width:34px;height:34px;
      background:linear-gradient(135deg, var(--accent), #ff7a40);
      border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-size:17px;
      box-shadow:0 4px 12px rgba(255,92,40,.3);
    }
    .client-brand-text{}
    .client-kicker{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:.14em;text-transform:uppercase}
    .client-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.01em;line-height:1}
    .client-header-right{text-align:right}
    .client-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3)}
    .client-chip{
      display:inline-flex;align-items:center;gap:5px;
      margin-top:3px;
      background:var(--surface-2);
      border:1px solid var(--border-bright);
      border-radius:999px;
      padding:3px 9px;
      font-family:'JetBrains Mono',monospace;
      font-size:9px;
      color:var(--text-2);
    }
    .chip-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
    .client-logout{
      margin-top:5px;

<body>
  <div id="app"></div>
  <script>
    const state = {
      me: null,
      route: window.location.pathname,
      clients: [],
      selectedClient: null,
      adminClientDetail: null,
      appData: null,
      superadminData: null,
      superadminGymDetail: null,
      activeAdminGymId: null,
      loading: false,
      message: "",
      error: "",
      draftPassword: "",
      pendingPlanEdit: null,
      needsAdminBootstrap: false,
      autoSaveStatus: ""
    };
    let dailyLogAutoSaveTimer = null;
    let dayRolloverTimer = null;
    let workoutDraftStatus = "";

    // Field meta: [key, label, { type, options?, placeholder?, hint? }]
    const intakeSections = [
      { key: "profile", title: "👤 Profile", fields: [
        ["fullName",  "Full name",      { type:"text",   placeholder:"e.g. Priya Sharma",          hint:"Your full name as the coach should address you" }],
        ["age",       "Age",            { type:"number", placeholder:"e.g. 28",                    hint:"In years" }],
        ["heightCm",  "Height",         { type:"number", placeholder:"e.g. 165",                   hint:"In centimetres (cm)" }],
        ["weightKg",  "Current weight", { type:"number", placeholder:"e.g. 72",                    hint:"In kilograms (kg) — measure fasted, first thing in the morning" }],
        ["sex",       "Biological sex", { type:"select", options:["Male","Female","Other / Prefer not to say"] }],
        ["location",  "Location",       { type:"text",   placeholder:"e.g. Mumbai, India",         hint:"City and country — helps with food options and climate context" }]
      ]},
      { key: "bodyComposition", title: "📊 Body Composition", fields: [
        ["bodyFat",       "Current body fat %", { type:"number", placeholder:"e.g. 22", hint:"% — leave blank if unsure, coach can estimate from photos or measurements" }],
        ["targetBodyFat", "Target body fat %",  { type:"number", placeholder:"e.g. 15", hint:"% — your goal; lean = 10–15%, athletic = 15–20%, healthy = 20–25%" }],
        ["goalType",      "Primary goal",       { type:"select", options:["Lose fat","Build muscle","Body recomposition (lose fat + gain muscle)","Improve overall fitness","Maintain current physique","Sports performance"] }]
      ]},
      { key: "training", title: "🏋️ Training", fields: [
        ["daysPerWeek",      "Training days / week", { type:"select", options:["2 days","3 days","4 days","5 days","6 days"] }],
        ["sessionDuration",  "Session length",       { type:"select", options:["30 minutes","45 minutes","60 minutes","75 minutes","90 minutes","2 hours"] }],
        ["trainingTime",     "Preferred time",       { type:"select", options:["Early morning (5–7 AM)","Morning (7–10 AM)","Midday (10 AM–1 PM)","Afternoon (1–4 PM)","Evening (4–7 PM)","Night (7–10 PM)"] }],
        ["gymAccess",        "Gym access",           { type:"select", options:["Full commercial gym","Home gym (with weights)","Bodyweight / resistance bands only","Gym + home combined","Outdoor / park only"] }],
        ["cardioPreference", "Cardio preference",    { type:"select", options:["None — I prefer lifting only","Walking","Running / jogging","Cycling","Swimming","HIIT","Mixed cardio (variety)"] }]
      ]},
      { key: "injuriesMedical", title: "🩺 Injuries & Medical", fields: [
        ["injuries",         "Current injuries",     { type:"textarea", placeholder:"e.g. Lower back tightness, right knee pain\nOr type None if none", hint:"List any pain, old injuries or surgeries — be specific about location and severity" }],
        ["rehabConstraints", "Movement restrictions",{ type:"textarea", placeholder:"e.g. Avoid heavy deadlifts, no overhead pressing\nOr type None", hint:"Exercises or movement patterns to avoid entirely" }],
        ["medications",      "Medications",          { type:"text",     placeholder:"e.g. Metformin, thyroid meds — or None",                           hint:"Medications that could affect training, metabolism or diet" }],
        ["supplements",      "Current supplements",  { type:"text",     placeholder:"e.g. Whey protein, creatine, vitamin D — or None",                 hint:"What you already take so the coach won't duplicate" }]
      ]},
      { key: "diet", title: "🥗 Diet", fields: [
        ["dietStyle",   "Diet style",      { type:"select",   options:["No restrictions","Vegetarian","Vegan","Eggetarian","Keto / low carb","Intermittent fasting","High protein focus","Jain","Other (add details in notes)"] }],
        ["cuisineStyle","Cuisine style",   { type:"text",     placeholder:"e.g. South Indian, North Indian, Continental", hint:"Your everyday cooking style — helps build realistic meal options you'll actually eat" }],
        ["mealsPerDay", "Meals per day",   { type:"select",   options:["2 meals","3 meals","4 meals","5 meals","6 meals"] }],
        ["allergies",   "Food allergies",  { type:"text",     placeholder:"e.g. Lactose intolerant, nut allergy — or None", hint:"Foods that cause reactions, discomfort, or that you must completely avoid" }],
        ["preferences", "Food preferences",{ type:"textarea", placeholder:"e.g. Prefer home-cooked food, dislike fish, love eggs and paneer, hate broccoli", hint:"Likes, dislikes, foods you absolutely will not eat — the more detail the better" }]
      ]},
      { key: "lifestyle", title: "🌙 Lifestyle", fields: [
        ["sleepHours",    "Avg sleep per night", { type:"select", options:["Less than 5 hours","5–6 hours","6–7 hours","7–8 hours","More than 8 hours"] }],
        ["activityLevel", "Daily activity",      { type:"select", options:["Sedentary — desk job, mostly sitting all day","Lightly active — short walks, some standing","Moderately active — active job or regular daily walks","Very active — physical job or intense daily exercise"] }],
        ["workPattern",   "Work pattern",        { type:"select", options:["9–5 office job","Work from home","Shift work (rotating hours)","Freelance / flexible hours","Manual / physical labour","Student","Other"] }]
      ]},
      { key: "notes", title: "📝 Notes for Coach", fields: [
        ["coachNotes", "Anything else?", { type:"textarea", placeholder:"e.g. I travel monthly, struggle with weekends, high stress job, tried dieting before but always bounce back...", hint:"Goals, concerns, past experience, lifestyle context — the more detail the better for your plan" }]
      ]}
    ];

    function setRoute(path){
      state.route = path;
      history.pushState({}, "", path);
      render();
      void bootstrapForRoute();
    }

    window.addEventListener("popstate", () => {
      state.route = window.location.pathname;
      render();
      void bootstrapForRoute();
    });

    function el(strings, ...values){
      return strings.reduce((acc, str, i) => acc + str + (values[i] ?? ""), "");
    }

    async function api(path, options = {}){
      const actingGymHeader = (state.me && state.me.role === "superadmin" && state.route && state.route.startsWith("/admin") && state.activeAdminGymId)
        ? { "X-Acting-Gym-Id": state.activeAdminGymId } : {};
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json", ...actingGymHeader, ...(options.headers || {}) },
        credentials: "include",
        ...options
      });
      const text = await res.text();
      let json = {};
      try { json = text ? JSON.parse(text) : {}; } catch {}
      if(!res.ok){
        throw new Error(json.error || "Request failed");
      }
      return json;
    }

    function setFlash(message, isError = false){
      state.message = isError ? "" : message;
      state.error = isError ? message : "";
      render();
    }

    function updateAutoSaveStatus(text){
      state.autoSaveStatus = text;
      const node = document.getElementById("autosave-status");
      if(node) node.textContent = text;
    }

    function updateWorkoutDraftStatus(text){
      workoutDraftStatus = text;
      const node = document.getElementById("workout-draft-status");
      if(node) node.textContent = text;
    }

    function requireAuth(role){
      if(!state.me){ setRoute("/login"); return false; }
      if(role === "admin" && state.me.role === "superadmin") return true;
      if(role && state.me.role !== role){
        if(state.me.role === "superadmin") setRoute("/superadmin");
        else if(state.me.role === "admin") setRoute("/admin");
        else setRoute("/app");
        return false;
      }
      return true;
    }

    async function bootstrap(){
      try{
        const res = await api("/api/me", { method: "GET", headers: {} });
        state.me = res.user;
        if(!state.me){
          const bootstrap = await api("/api/bootstrap-admin-check", { method: "GET", headers: {} });
          state.needsAdminBootstrap = !!bootstrap.needsAdminBootstrap;
        } else {
          state.needsAdminBootstrap = false;
        }
      }catch{
        state.me = null;
        try{
          const bootstrap = await api("/api/bootstrap-admin-check", { method: "GET", headers: {} });
          state.needsAdminBootstrap = !!bootstrap.needsAdminBootstrap;
        }catch{}
      }
      render();
      await bootstrapForRoute();
    }

    async function bootstrapForRoute(){
      const path = state.route;
      if(path === "/login") return;
      if(state.me?.mustChangePassword) return;
      if(path.startsWith("/superadmin")){
        if(!requireAuth("superadmin")) return;
        const gymMatch = path.match(/^\/superadmin\/gyms\/([^/]+)$/);
        if(gymMatch){
          state.superadminGymDetail = await api("/api/superadmin/gyms/" + gymMatch[1], { method: "GET", headers: {} });
          state.superadminData = null;
        } else {
          state.superadminData = await api("/api/superadmin/gyms", { method: "GET", headers: {} });
          state.superadminGymDetail = null;
        }
      } else if(path.startsWith("/admin")){
        if(!requireAuth("admin")) return;
        if(state.me && state.me.role === "superadmin" && !state.activeAdminGymId && state.superadminData && state.superadminData.gyms && state.superadminData.gyms[0]){
          state.activeAdminGymId = state.superadminData.gyms[0].id;
        }
        state.clients = (await api("/api/admin/clients", { method: "GET", headers: {} })).clients;
        const match = path.match(/^\/admin\/clients\/([^/]+)$/);
        if(match){
          state.adminClientDetail = await api("/api/admin/clients/" + match[1], { method: "GET", headers: {} });
          state.pendingPlanEdit = normalizeEditablePlan(state.adminClientDetail.plan?.effectivePlan || state.adminClientDetail.plan?.generated_json || {});
        } else {
          state.adminClientDetail = null;
        }
      } else if(path.startsWith("/app")){
        if(!requireAuth("client")) return;
        state.appData = await api("/api/app/bootstrap", { method: "GET", headers: {} });
      } else {
        if(state.me){
          if(state.me.role === "superadmin") setRoute("/superadmin");
          else if(state.me.role === "admin") setRoute("/admin");
          else setRoute("/app");
          return;
        }
        setRoute("/login");
        return;
      }
      render();
    }

    async function handleLogin(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      try{
        const res = await api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            username: form.get("username"),
            password: form.get("password")
          })
        });
        state.me = res.user;
        setFlash("Logged in.");
        const dest = state.me.mustChangePassword ? "/app/password"
          : state.me.role === "superadmin" ? "/superadmin"
          : state.me.role === "admin" ? "/admin"
          : "/app";
        setRoute(dest);
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function markPlanSeen(){
      try{
        await api("/api/app/mark-plan-seen", { method: "POST", body: "{}" });
        if(state.appData?.plan) state.appData.plan.plan_notified = 1;
        render();
      }catch(e){ render(); }
    }

    function selectMealCard(el){
      const picker = el.closest(".meal-card-picker");
      if(!picker) return;
      picker.querySelectorAll(".meal-option-card").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");
      const hidden = picker.querySelector("input[type='hidden']");
      if(hidden){ hidden.value = el.dataset.value || ""; hidden.dispatchEvent(new Event("change",{bubbles:true})); }
      const form = picker.closest("form");
      if(form && typeof updateMacroInputsFromMeals === "function") updateMacroInputsFromMeals(form);
    }
    function bindSetCounters(){
      document.querySelectorAll(".set-check:not([data-bound])").forEach(cb => {
        cb.dataset.bound = "1";
        cb.addEventListener("change", () => {
          const exId = cb.dataset.exerciseId; if(!exId) return;
          const container = cb.closest(".exercise-card"); if(!container) return;
          const allChecks = container.querySelectorAll(`.set-check[data-exercise-id="${exId}"]`);
          const states = Array.from(allChecks).map(c => c.checked);
          const hidden = container.querySelector(`input[name="sets_${exId}"]`);
          if(hidden) hidden.value = JSON.stringify(states);
          allChecks.forEach(c => c.closest(".set-toggle-wrap")?.classList.toggle("active", c.checked));
          const counter = document.getElementById(`set-counter-${exId}`);
          if(counter){ const d=states.filter(Boolean).length,t=states.length; counter.textContent=d>0?`${d}/${t} done`:`${t} sets`; counter.style.color=d===t&&t>0?"var(--lime)":d>0?"var(--gold)":"var(--text-3)"; }
        });
      });
      document.querySelectorAll(".cardio-done-check:not([data-bound])").forEach(cb => {
        cb.dataset.bound="1";
        cb.addEventListener("change",()=>{ const exId=cb.dataset.exerciseId; if(!exId) return; const h=cb.closest(".exercise-card")?.querySelector(`input[name="sets_${exId}"]`); if(h) h.value=JSON.stringify([cb.checked]); });
      });
    }
    function bindIntakeScrollProgress(){
      const bar=document.getElementById("intake-progress-bar"), label=document.getElementById("intake-section-label"), sections=document.querySelectorAll("[data-section-index]");
      if(!bar||!sections.length) return;
      const total=sections.length;
      const obs=new IntersectionObserver(entries=>{ let max=0; entries.forEach(e=>{if(e.isIntersecting) max=Math.max(max,Number(e.target.dataset.sectionIndex));}); bar.style.width=Math.round(((max+1)/total)*100)+"%"; const t=sections[max]?.dataset.sectionTitle||""; if(label) label.textContent=`Section ${max+1} of ${total}${t?" — "+t:""}`; },{threshold:0.3});
      sections.forEach(s=>obs.observe(s));
    }
        async function bootstrapAdmin(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      try{
        await api("/api/bootstrap-admin", {
          method: "POST",
          body: JSON.stringify({
            username: form.get("username"),
            password: form.get("password"),
            superadmin: form.get("superadmin") === "on"
          })
        });
        setFlash("Account created. You can log in now.");
        state.needsAdminBootstrap = false;
        render();
      }catch(err){
        setFlash(err.message, true);
      }
    }

    async function createGym(ev){
      ev.preventDefault();
      const form = new FormData(ev.target);
      const btn = ev.target.querySelector('button[type="submit"]');
      const orig = btn ? btn.textContent : "";
      if(btn){ btn.disabled = true; btn.textContent = "Creating…"; }
      try{
        const res = await api("/api/superadmin/gyms", {
          method: "POST",
          body: JSON.stringify({
            gymName: form.get("gymName"),
            ownerName: form.get("ownerName"),
            email: form.get("email"),
            phone: form.get("phone"),
            city: form.get("city"),
            adminUsername: form.get("adminUsername")
          })
        });
        state.draftPassword = res.temporaryPassword;
        setFlash("Gym created. Save the admin password now.");
        await bootstrapForRoute();
      }catch(err){
        if(btn){ btn.disabled = false; btn.textContent = orig; }
        setFlash(err.message, true);
      }
    }

    async function toggleGymStatus(gymId, currentStatus){
      const newStatus = currentStatus === "active" ? "suspended" : "active";
      try{
        await api("/api/superadmin/gyms/" + gymId, {
          method: "PATCH",
          body: JSON.stringify({ status: newStatus })

      const current = state.appData?.dailyLog || {};
      return {
        log_date: date || current.log_date || new Date().toISOString().slice(0, 10),
        meals_json: current.meals_json || {},
        workout_json: current.workout_json || {},
        macros_json: current.macros_json || {},

    async function persistDailyLog(date, next, showFlash, successMessage){

          body: JSON.stringify({
            meals: next.meals_json || {},
            workout: next.workout_json || {},

        if(state.appData){

    function attachDietLogEnhancements(){
      const form = document.getElementById("diet-log-form");
      if(!form) return;
      if(dailyLogAutoSaveTimer) clearTimeout(dailyLogAutoSaveTimer);
      if(dayRolloverTimer) clearInterval(dayRolloverTimer);
      const scheduleAutoSave = () => {
        updateMacroInputsFromMeals(form);
        updateAutoSaveStatus("Saving...");
        clearTimeout(dailyLogAutoSaveTimer);
        dailyLogAutoSaveTimer = setTimeout(() => {
          const liveForm = document.getElementById("diet-log-form");
          if(liveForm){
            const data = new FormData(liveForm);
            const date = data.get("logDate");
            const meals = {
              breakfast: data.get("breakfast") || "",
              lunch: data.get("lunch") || "",
              dinner: data.get("dinner") || "",
              snacks: data.get("snacks") || ""
            };
            const autoMacros = calcMealMacros(state.appData?.plan, meals);
            const current = currentDailyPayload(date);
            const next = {
              ...current,
              meals_json: meals,
              macros_json: autoMacros,
              hydration: Number(data.get("hydration") || 0),
              steps: Number(data.get("steps") || 0),
              notes: data.get("notes") || ""
            };
            void persistDailyLog(date, next, false, "");
          }
        }, 1200);
      };
      form.querySelectorAll("input, textarea, select").forEach((field) => {
        field.addEventListener("input", scheduleAutoSave);
        field.addEventListener("change", scheduleAutoSave);
      });
      updateMacroInputsFromMeals(form);
      dayRolloverTimer = setInterval(() => {
        const liveForm = document.getElementById("diet-log-form");
        if(!liveForm) return;
        const dateInput = liveForm.querySelector('input[name="logDate"]');
        const today = new Date().toISOString().slice(0, 10);
        if(dateInput && dateInput.value !== today){
          const event = { preventDefault(){}, target: liveForm };
          void saveDietLog(event).finally(async () => { await bootstrapForRoute(); });
        }
      }, 60000);
    }

    async function showHouseholdLinkModal(clientId){
      try{
        const res = await api("/api/admin/clients/all-for-household", { method: "GET", headers: {} });
        const others = (res.clients || []).filter(c => c.id !== clientId);
        if(!others.length){
          setFlash("No other clients to link.", true);
          return;
        }
        const options = others.map(c => `${c.full_name} (@${c.username})`).join("\n");
        const choice = window.prompt(
          "Enter the full name or username of the client to link as household member:\n\n" +
          others.map((c,i) => `${i+1}. ${c.full_name} (@${c.username})`).join("\n")
        );
        if(!choice) return;
        const idx = parseInt(choice) - 1;
        const picked = others[idx] || others.find(c =>
          c.full_name.toLowerCase().includes(choice.toLowerCase()) ||
          (c.username || "").toLowerCase().includes(choice.toLowerCase())
        );
        if(!picked){ setFlash("Client not found.", true); return; }
        // Use existing household_id or create new one
        const householdId = picked.household_id || "new";
        await linkHousehold(clientId, householdId);
        // Also link the other client to the same household
        const detail = state.adminClientDetail;
        const myHouseholdId = detail?.client?.household_id;
        if(myHouseholdId && myHouseholdId !== "new"){
          await api("/api/admin/clients/" + picked.id + "/household", {
            method: "POST",
            body: JSON.stringify({ householdId: myHouseholdId })
          });
        }
      }catch(err){
        setFlash(err.message, true);
      }
    }

    function bindWorkoutSetButtons(form){
      const container = document.getElementById("workout-cards");
      if(!container) return;
      container.onchange = (ev) => {
        const check = ev.target.closest(".set-check");
        if(!check || !container.contains(check)) return;
        check.closest(".set-toggle-wrap")?.classList.toggle("active", check.checked);
        const exerciseId = check.dataset.exerciseId;
        const setIndex = Number(check.dataset.setIndex);
        const hidden = form.querySelector(`[name="sets_${exerciseId}"]`);
        const exercise = getWorkoutExercises(state.appData?.plan, form.querySelector('[name="workoutSession"]')?.value || "").find(item => item.id === exerciseId);
        const current = exercise ? readExerciseSetState(form, exercise) : safeJson(hidden?.value, []);
        if(hidden) hidden.value = JSON.stringify(current);
        syncWorkoutFormToState(form);
        updateWorkoutDraftStatus(`Set ${setIndex + 1} ${check.checked ? "completed" : "cleared"}. Tap all sets then press Save Session.`);
      };
    }

    function readExerciseSetState(form, exercise){
      return Array.from({ length: exercise.sets }).map((_, idx) => {
        const node = form.querySelector(`[name="set_${exercise.id}_${idx}"]`);
        return !!node?.checked;
      });
    }

    function syncWorkoutFormToState(form){
      if(!form || !state.appData) return;
      const date = form.querySelector('[name="logDate"]')?.value || state.appData.dailyLog?.log_date || new Date().toISOString().slice(0, 10);
      const workoutSession = form.querySelector('[name="workoutSession"]')?.value || "";
      const base = currentDailyPayload(date);
      const existingEntries = { ...(base.workout_json?.entries || {}) };
      getWorkoutExercises(state.appData?.plan, workoutSession).forEach((exercise) => {
        const hidden = form.querySelector(`[name="sets_${exercise.id}"]`);
        const weight = form.querySelector(`[name="weight_${exercise.id}"]`);
        const sets = readExerciseSetState(form, exercise);
        if(hidden) hidden.value = JSON.stringify(sets);
        existingEntries[exercise.id] = {
          sets,
          weight: weight?.value || ""
        };
      });
      state.appData.dailyLog = {
        ...base,
        log_date: date,
        cardio: form.querySelector('[name="cardio"]')?.value || base.cardio || "",
        workout_json: {
          ...(base.workout_json || {}),
          session: workoutSession,
          exercises: getWorkoutSession(state.appData?.plan, workoutSession)?.exercises || [],
          entries: existingEntries,
          completed: !!form.querySelector('[name="workoutCompleted"]')?.checked,
          notes: form.querySelector('[name="workoutNotes"]')?.value || ""
        }
      };
    }

    function collectPlanEditForm(){
      const form = document.getElementById("plan-edit-form");
      if(!form) return normalizeEditablePlan(state.pendingPlanEdit || {});
      const data = new FormData(form);
      const parseList = (value) => String(value || "").split("\n").map(item => item.trim()).filter(Boolean);
      const parseSectioned = (value, keyName, valueName, mapItem = (item) => item) => String(value || "")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const separator = line.indexOf(":");
          const head = separator >= 0 ? line.slice(0, separator).trim() : line;
          const tail = separator >= 0 ? line.slice(separator + 1) : "";
          return {
            [keyName]: head,
            [valueName]: tail.split("|").map(item => item.trim()).filter(Boolean).map(mapItem)
          };
        })
        .filter(item => item[keyName]);
      const edited = {
        profileSummary: String(data.get("profileSummary") || "").trim(),
        calorieTarget: String(data.get("calorieTarget") || "").trim(),
        macros: {
          protein: String(data.get("macroProtein") || "").trim(),
          carbs: String(data.get("macroCarbs") || "").trim(),
          fat: String(data.get("macroFat") || "").trim()
        },
        mealOptions: parseSectioned(data.get("mealOptions"), "meal", "options", parseMealOptionText),
        weeklyMealStructure: parseList(data.get("weeklyMealStructure")),
        supplements: parseList(data.get("supplements")),
        workoutSplit: parseSectioned(data.get("workoutSplit"), "day", "_rawExercises").map(item => {
          const warmup = [], exercises = [], cooldown = [];
          let mode = "exercises";
          (item._rawExercises || []).forEach(ex => {
            const t = ex.trim();
            if(t.startsWith("[warmup]")) { mode = "warmup"; warmup.push(...t.replace("[warmup]","").trim().split("|").map(s=>s.trim()).filter(Boolean)); }
            else if(t.startsWith("[cooldown]")) { mode = "cooldown"; cooldown.push(...t.replace("[cooldown]","").trim().split("|").map(s=>s.trim()).filter(Boolean)); }
            else { exercises.push(t); }
          });
          return { day: item.day, warmup, exercises, cooldown };
        }),
        periodisation: String(data.get("periodisation") || "").trim(),
        deloadProtocol: String(data.get("deloadProtocol") || "").trim(),
        progressionProtocol: String(data.get("progressionProtocol") || "").trim(),
        progressMilestones: parseList(data.get("progressMilestones")),
        successRules: parseList(data.get("successRules")),
        cautions: parseList(data.get("cautions"))
      };
      state.pendingPlanEdit = edited;
      return edited;
    }

    /* ── INTAKE DRAFT: localStorage auto-save ── */
    function intakeDraftKey(clientId){
      return clientId ? `intake_draft_client_${clientId}` : `intake_draft_self`;
    }

    function saveIntakeDraft(form, clientId){
      try{
        const data = new FormData(form);
        const draft = {};
        for(const section of intakeSections){
          draft[section.key] = {};
          for(const [field] of section.fields){
            draft[section.key][field] = data.get(section.key + "." + field) || "";
          }
        }
        localStorage.setItem(intakeDraftKey(clientId), JSON.stringify(draft));
        const indicator = document.getElementById("intake-draft-indicator");
        if(indicator){
          indicator.textContent = "Draft saved locally · " + new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
          indicator.style.color = "var(--teal)";
        }
      }catch(e){}
    }

    function loadIntakeDraft(clientId){
      try{
        const raw = localStorage.getItem(intakeDraftKey(clientId));
        return raw ? JSON.parse(raw) : null;
      }catch(e){ return null; }
    }

    function clearIntakeDraft(clientId){
      try{ localStorage.removeItem(intakeDraftKey(clientId)); }catch(e){}
    }

    function attachIntakeDraftSave(formEl, clientId){
      if(!formEl) return;
      const draft = loadIntakeDraft(clientId);
      const indicator = document.getElementById("intake-draft-indicator");
      if(draft){
        // Restore saved draft values into form fields
        let restored = 0;
        for(const section of intakeSections){
          for(const [field] of section.fields){
            const input = formEl.querySelector(`[name="${section.key}.${field}"]`);
            const savedVal = draft[section.key]?.[field];
            if(input && savedVal && !input.value){
              input.value = savedVal;
              restored++;
            }
          }
        }
        if(indicator && restored > 0){
          indicator.textContent = `↩ Draft restored (${restored} fields) · saved locally`;
          indicator.style.color = "var(--gold)";
        }
      }
      // Auto-save on every keystroke and select change
      formEl.querySelectorAll("input, textarea, select").forEach(field => {
        field.addEventListener("input", () => saveIntakeDraft(formEl, clientId));
        field.addEventListener("change", () => saveIntakeDraft(formEl, clientId));
      });
    }

    function escapeHtml(value){
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function normalizeMealSection(section){
      return {
        meal: section?.meal || "",
        options: Array.isArray(section?.options) ? section.options.map(normalizeMealOption).filter(Boolean) : []
      };
    }

    function normalizeMealOption(option){
      if(!option) return null;
      if(typeof option === "string") return { label: option, calories: 0, protein: 0, carbs: 0, fat: 0 };
      return {
        label: option.label || option.name || "",
        calories: Number(option.calories || 0),
        protein: Number(option.protein || 0),
        carbs: Number(option.carbs || 0),
        fat: Number(option.fat || 0)
      };
    }

    function formatMealOptionLine(option){
      const item = normalizeMealOption(option) || { label: "" };
      const macroText = `${item.calories || 0} kcal, P${item.protein || 0} C${item.carbs || 0} F${item.fat || 0}`;
      return `${item.label || ""} [${macroText}]`;
    }

    function parseMealOptionText(text){
      const raw = String(text || "").trim();
      const match = raw.match(/^(.*?)\s*\[(.*?)\]\s*$/);
      if(!match) return { label: raw, calories: 0, protein: 0, carbs: 0, fat: 0 };
      const label = match[1].trim();
      const meta = match[2];
      const read = (pattern) => {
        const found = meta.match(pattern);
        return found ? Number(found[1]) : 0;
      };
      return {
        label,
        calories: read(/(\d+(?:\.\d+)?)\s*kcal/i),
        protein: read(/P\s*(\d+(?:\.\d+)?)/i),
        carbs: read(/C\s*(\d+(?:\.\d+)?)/i),
        fat: read(/F\s*(\d+(?:\.\d+)?)/i)
      };
    }

    function getPlanMealSection(plan, mealName){
      const data = plan?.effectivePlan || plan || {};
      return (data.mealOptions || []).map(normalizeMealSection).find(section => section.meal?.toLowerCase() === mealName.toLowerCase()) || null;
    }

    function renderMealSelect(name, section, selectedValue){
      const options = (section?.options || []).map(o => typeof o === "string" ? { label: o, calories: 0, protein: 0, carbs: 0, fat: 0 } : o);

            const norm = opt.label || opt.name || "";
            const cal = Number(opt.calories||0), pro = Number(opt.protein||0), carb = Number(opt.carbs||0), fat = Number(opt.fat||0);
            const sel = norm === selectedValue;
            return `<div class="meal-option-card ${sel?'selected':''}" data-value="${escapeAttr(norm)}" onclick="selectMealCard(this)">
                <div style="font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:7px">${escapeHtml(norm)}</div>
                <div style="display:flex;flex-wrap:wrap;gap:5px">
                  ${cal>0?`<span style="font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:99px;background:rgba(255,92,40,.12);color:var(--accent)">${cal} kcal</span>`:""}
                  ${pro>0?`<span style="font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:99px;background:rgba(0,203,168,.12);color:var(--teal)">P ${pro}g</span>`:""}

    function findMealOption(plan, mealName, label){
      const section = getPlanMealSection(plan, mealName);
      if(!section) return null;
      return (section.options || []).find(option => option.label === label) || null;
    }

    function getWorkoutSessions(plan){
      const data = plan?.effectivePlan || plan || {};
      return Array.isArray(data.workoutSplit) ? data.workoutSplit : [];
    }

    function getWorkoutSession(plan, dayName){
      return getWorkoutSessions(plan).find(item => item.day === dayName) || null;
    }

    function slugify(value){
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    const CARDIO_KEYWORDS = /\b(cardio|treadmill|run|jog|walk|cycling|bike|cycle|swim|hiit|elliptical|rowing|skip|jump rope|stair|stepper|sprint|min |minute|km|miles?)\b/i;
    const STRETCH_KEYWORDS = /\b(stretch|pose|mobility|foam roll|cool.?down|warm.?up|yoga|pigeon|cobra|child|downward|quad|hamstring|hip flexor|calf|shoulder roll|neck|spine|twist|lunge stretch|seated|lying|standing stretch|flexibility|hold)\b/i;

    function parseWorkoutExercise(raw, index){
      const text = String(raw || "").trim();
      const match = text.match(/^(.*?)(?:\s+(\d+)\s*[x×]\s*([0-9A-Za-z+\-\/ ]+))?(?:\s*@\s*(.+))?$/);
      const name = (match?.[1] || text).trim();
      const sets = Number(match?.[2] || 3);
      const reps = (match?.[3] || "8-12").trim();
      const target = (match?.[4] || "").trim();
      const isCardio = CARDIO_KEYWORDS.test(text);
      const isStretch = STRETCH_KEYWORDS.test(text);
      return { id: `${slugify(name)}-${index}`, name, sets, reps, target, isCardio, isStretch };
    }

    function getWorkoutExercises(plan, dayName){
      const session = getWorkoutSession(plan, dayName);
      if(!session) return [];
      return (session.exercises || []).map((exercise, index) => parseWorkoutExercise(exercise, index));
    }

    function renderWorkoutSelect(plan, selectedValue){
      const sessions = getWorkoutSessions(plan);
      return `
        <select name="workoutSession">

    function renderWorkoutExerciseCards(plan, selectedWorkout, entries = {}){

            ${session.cooldown.map((c, i) => `
              <label style="display:flex;align-items:center;gap:12px;cursor:pointer;padding:9px 12px;background:var(--surface-2);border:1px solid rgba(157,124,244,.15);border-radius:10px">
                <input type="checkbox" name="cooldown_${i}" style="width:16px;height:16px;accent-color:var(--purple);flex-shrink:0"/>
                <span style="font-size:13px;color:var(--text-2);line-height:1.4">${escapeHtml(c)}</span>
              </label>
            `).join("")}
          </div>
        </div>` : "";

      const exerciseCards = exercises.map((exercise) => {
        const entry = entries[exercise.id] || { sets: Array(exercise.sets).fill(false), weight: exercise.target || "" };
        const history = getExerciseHistory(state.appData?.recentWorkoutLogs, exercise.id);
        const lastWeight = history.length ? history[history.length - 1].weight : "";

        if(exercise.isStretch){
          return `
            <div class="exercise-card" style="border-left:3px solid var(--purple)">
              <div style="display:flex;justify-content:space-between;gap:8px;align-items:center">
                <div style="flex:1">
                  <div class="exercise-name">${escapeHtml(exercise.name)}</div>
                  <div class="exercise-meta" style="color:var(--purple)">${exercise.reps ? escapeHtml(exercise.reps) : "Hold & breathe"}</div>
                </div>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 14px;background:var(--surface-2);border:1px solid rgba(157,124,244,.2);border-radius:10px;flex-shrink:0">

    }

    function calcMealMacros(plan, meals){
      const totals = { calories: 0, protein: 0, carbs: 0, fat: 0 };
      ["breakfast","lunch","dinner"].forEach((mealName) => {
        const option = findMealOption(plan, mealName, meals?.[mealName] || "");
        if(option){
          totals.calories += Number(option.calories || 0);
          totals.protein += Number(option.protein || 0);
          totals.carbs += Number(option.carbs || 0);
          totals.fat += Number(option.fat || 0);
        }
      });
      return totals;
    }

    function updateMacroInputsFromMeals(formEl){
      if(!formEl) return;
      const meals = {
        breakfast: formEl.querySelector('[name="breakfast"]')?.value || "",
        lunch: formEl.querySelector('[name="lunch"]')?.value || "",
        dinner: formEl.querySelector('[name="dinner"]')?.value || ""
      };
      const totals = calcMealMacros(state.appData?.plan, meals);
      const setField = (name, value) => {
        const input = formEl.querySelector(`[name="${name}"]`);
        if(input) input.value = value;
      };
      setField("calories", totals.calories);
      setField("protein", totals.protein);
      setField("carbs", totals.carbs);
      setField("fat", totals.fat);
    }

    function currentWeekKey(){
      const now = new Date();
      return now.getFullYear() + "-W" + Math.ceil((((now - new Date(now.getFullYear(),0,1)) / 86400000) + new Date(now.getFullYear(),0,1).getDay() + 1) / 7);
    }

    function weekLabelFromDate(value){
      const date = new Date(value);
      if(Number.isNaN(date.getTime())) return "Week";
      return date.toLocaleDateString("en-IN", { day: "numeric", month: "short" });
    }

    function buildWeeklyProgressSeries(checkins){
      const list = Array.isArray(checkins) ? [...checkins] : [];
      list.sort((a, b) => String(a.checkin_date || "").localeCompare(String(b.checkin_date || "")));
      const byWeek = new Map();
      list.forEach((item) => {
        const date = new Date(item.checkin_date || item.updated_at || "");
        if(Number.isNaN(date.getTime())) return;
        const start = new Date(date);
        const day = start.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        start.setDate(start.getDate() + diff);
        const key = start.toISOString().slice(0, 10);
        byWeek.set(key, {
          key,
          label: weekLabelFromDate(start),
          weight: Number(item.weight || 0),
          bodyFat: Number(item.body_fat || 0),
          sourceDate: item.checkin_date || ""
        });
      });
      return Array.from(byWeek.values()).filter(item => item.weight > 0).slice(-8);
    }

    function renderProgressChart(checkins){
      const series = buildWeeklyProgressSeries(checkins);
      if(series.length < 2){
        return '<div class="empty">Add at least two weekly check-ins to see your progression graph.</div>';
      }
      const weights = series.map(item => item.weight);
      const min = Math.min(...weights);
      const max = Math.max(...weights);
      const pad = Math.max(1, (max - min) * 0.18);
      const chartMin = min - pad;
      const chartMax = max + pad;
      const width = 320;
      const height = 140;
      const points = series.map((item, index) => {
        const x = 18 + (index * ((width - 36) / Math.max(1, series.length - 1)));
        const y = height - 18 - (((item.weight - chartMin) / Math.max(1, chartMax - chartMin)) * (height - 40));
        return { ...item, x, y };
      });
      const polyline = points.map(point => `${point.x},${point.y}`).join(" ");
      const latest = series[series.length - 1];
      const first = series[0];
      const delta = (latest.weight - first.weight).toFixed(1);
      return `
        <div class="progress-chart">
          <div class="progress-meta">
            <div class="progress-metric">
              <span class="subtle">Latest weight</span>
              <strong>${latest.weight.toFixed(1)} kg</strong>
            </div>
            <div class="progress-metric" style="text-align:right">
              <span class="subtle">Change</span>
              <strong style="color:${Number(delta) <= 0 ? 'var(--lime)' : 'var(--accent)'}">${delta > 0 ? "+" : ""}${delta} kg</strong>
            </div>
          </div>
          <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Weekly weight progression">
            <defs>
              <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ff5c28" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#ff5c28" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <line x1="18" y1="${height - 18}" x2="${width - 18}" y2="${height - 18}" stroke="#1a2e48" stroke-width="1"/>
            <polyline fill="none" stroke="#ff5c28" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${polyline}"></polyline>
            ${points.map(point => `<circle cx="${point.x}" cy="${point.y}" r="4" fill="#00cba8" stroke="#060d18" stroke-width="2"></circle>`).join("")}
          </svg>
          <div class="progress-chart-labels">
            ${series.map(item => `<div>${escapeHtml(item.label)}<br/>${item.weight.toFixed(1)}</div>`).join("")}
          </div>
        </div>
      `;
    }

    function getExerciseHistory(logs, exerciseId){
      const list = Array.isArray(logs) ? logs : [];
      return list
        .map((log) => {
          const entry = log?.workout_json?.entries?.[exerciseId];
          const weight = Number(entry?.weight || 0);
          return weight > 0 ? {
            date: log.log_date || "",
            weight
          } : null;
        })
        .filter(Boolean)
        .sort((a, b) => String(a.date).localeCompare(String(b.date)))
        .slice(-6);
    }

    function renderExerciseSparkline(history){
      if(!history.length){
        return `<div class="exercise-history-meta">Log this exercise to build a progression trend.</div>`;
      }
      if(history.length === 1){
        return `<div class="exercise-history-meta">Only one workout logged so far.</div>`;
      }
      const min = Math.min(...history.map(item => item.weight));
      const max = Math.max(...history.map(item => item.weight));
      const width = 240;
      const height = 30;
      const points = history.map((item, index) => {
        const x = 8 + (index * ((width - 16) / Math.max(1, history.length - 1)));
        const y = height - 7 - (((item.weight - min) / Math.max(1, max - min || 1)) * (height - 14));
        return `${x},${y}`;
      }).join(" ");
      return `
        <svg class="exercise-sparkline" viewBox="0 0 ${width} ${height}" role="img" aria-label="Exercise progression">
          <polyline fill="none" stroke="#00cba8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${points}"></polyline>
          ${history.map((item, index) => {
            const x = 8 + (index * ((width - 16) / Math.max(1, history.length - 1)));
            const y = height - 7 - (((item.weight - min) / Math.max(1, max - min || 1)) * (height - 14));
            return `<circle cx="${x}" cy="${y}" r="2.5" fill="#ff5c28"></circle>`;
          }).join("")}
        </svg>
      `;
    }

        const linkHouseholdBtn = document.getElementById("link-household");
        if(linkHouseholdBtn) linkHouseholdBtn.onclick = () => showHouseholdLinkModal(clientId);
        document.querySelectorAll(".unlink-household").forEach(btn => {
          btn.onclick = () => linkHousehold(btn.dataset.clientId, null);
        });
        const planEditForm = document.getElementById("plan-edit-form");
        if(planEditForm){
          planEditForm.oninput = () => collectPlanEditForm();
          planEditForm.onchange = () => collectPlanEditForm();
        }
      }

      if(!isAdmin && path === "/app/intake"){
        const intakeForm = document.querySelector(".client-main form[data-intake-clientid]");
        if(intakeForm && state.appData?.canEditIntake){
          intakeForm.onsubmit = saveIntake;
          attachIntakeDraftSave(intakeForm, null);
        }
        if(intakeForm && !state.appData?.canEditIntake){
          intakeForm.querySelectorAll("input, textarea, button").forEach(node => node.disabled = true);
        }
      }
      if(!isAdmin && path === "/app/diet"){
        document.getElementById("diet-log-form").onsubmit = saveDietLog;
        attachDietLogEnhancements();
      }
      if(!isAdmin && path === "/app/workout"){
        document.getElementById("workout-log-form").onsubmit = saveWorkoutLog;
        document.getElementById("checkin-form").onsubmit = saveCheckin;
        document.getElementById("review-form").onsubmit = saveWeeklyReview;
        document.getElementById("password-form").onsubmit = changePassword;
        attachWorkoutLogEnhancements();
      }
    }

    function safeJson(value, fallback){
      try{ return typeof value === "string" ? JSON.parse(value) : value; }catch{ return fallback; }
    }

    bootstrap();
  </script>
</body>
</html>
